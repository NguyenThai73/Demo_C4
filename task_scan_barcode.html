<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">スキャン作業 | Silica Link</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --green:   #2ecc71;
            --blue:    #3498db;
            --danger:  #e74c3c;
            --warn:    #e67e22;
            --bg:      #f4f7f9;
            --dark:    #333;
            --muted:   #666;
            --label:   #888;
            --border:  #e0e0e0;
        }

        * { box-sizing: border-box; }
        body {
            background: var(--bg); margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", Meiryo, sans-serif;
            color: var(--dark);
        }

        /* ── Header ── */
        .scan-header {
            background: white; padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #eee;
            position: sticky; top: 0; z-index: 100;
        }
        .task-id-label { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .task-id-label span { color: var(--green); }
        .progress-label { color: var(--warn); font-size: 14px; font-weight: 800; }
        .type-badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; border: 1px solid; }

        /* ── Layout ── */
        .scan-container { padding: 15px; max-width: 500px; margin: 0 auto; padding-bottom: 120px; }

        /* ── Product Card ── */
        .product-card {
            background: white; border: 2px solid var(--green);
            padding: 16px; border-radius: 12px; margin-bottom: 18px;
        }
        .sku-code   { color: var(--green); font-weight: 800; font-size: 14px; margin-bottom: 4px; }
        .prod-name  { font-weight: 800; font-size: 16px; margin-bottom: 10px; }
        .req-qty    { color: var(--danger); font-weight: 800; font-size: 14px; }

        /* ── Step Card ── */
        .step-card {
            background: white; border-radius: 12px; padding: 18px 16px;
            margin-bottom: 14px; border: 2px solid var(--border);
        }
        .step-card.active   { border-color: var(--blue); }
        .step-card.done     { border-color: var(--green); }

        .step-header {
            display: flex; align-items: center; gap: 12px;
            font-weight: 800; font-size: 14px; color: var(--dark);
        }
        .step-num {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            background: #f0f0f0; color: #999;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 800;
        }
        .step-card.done .step-num { background: var(--green); color: white; }
        .step-card.done .step-num::before { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; }
        .step-card.done .step-num .num-text { display: none; }

        .step-body { margin-top: 14px; }

        /* ── Scan Input Row ── */
        .input-row { display: flex; gap: 10px; align-items: center; }
        .scan-field {
            flex: 1; display: flex; align-items: center; gap: 10px;
            border: 1.5px solid #ccc; border-radius: 8px;
            padding: 10px 14px; background: white;
        }
        .scan-field i    { color: #bbb; font-size: 15px; flex-shrink: 0; }
        .scan-field input { border: none; outline: none; width: 100%; font-size: 14px; font-weight: 700; color: var(--dark); background: transparent; }
        .scan-field input::placeholder { font-weight: 400; color: #bbb; }
        .cam-btn {
            width: 48px; height: 48px; border-radius: 8px; flex-shrink: 0;
            background: var(--green); color: white; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: opacity .15s;
        }
        .cam-btn:active { opacity: .75; }

        /* ── Qty Picker ── */
        .qty-row { display: flex; align-items: center; justify-content: center; gap: 24px; margin: 18px 0 14px; }
        .qty-btn-circle { width: 48px; height: 48px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; cursor: pointer; }
        .btn-minus { background: #eee; color: var(--muted); }
        .btn-plus  { background: var(--blue); color: white; }
        .qty-box {
            border: 2px solid var(--blue); border-radius: 8px; width: 100px; height: 56px;
            display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800; color: var(--dark); background: white;
        }
        .quick-btns { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .quick-btn {
            padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 20px; background: white; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer;
        }

        /* ── History ── */
        .history-wrap { margin-top: 25px; border-top: 1px solid #e3e7e8; padding-top: 15px; }
        .history-title { font-size: 14px; font-weight: 800; margin-bottom: 12px; color: #555; }
        .scan-row { background: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; border-left: 4px solid var(--blue); margin-bottom: 8px; font-size: 13px; }

        /* ── Footer ── */
        .footer-action { position: fixed; bottom: 0; left: 0; width: 100%; padding: 14px 20px; background: white; border-top: 1px solid #eee; box-shadow: 0 -4px 10px rgba(0,0,0,.04); }
        .btn-confirm-next {
            width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: not-allowed; background: #ccc; color: white;
        }
        .btn-confirm-next.ready { background: var(--blue); cursor: pointer; }
        .btn-picking-done {
            width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 800; display: none; align-items: center; justify-content: center; gap: 10px; cursor: pointer; background: var(--green); color: white;
        }

        /* ── Modal Overlay ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-card { background: white; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; padding: 30px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal-icon { width: 60px; height: 60px; border-radius: 50%; background: #e8f5e9; color: var(--green); display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; }
        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
        .modal-body { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.6; }
        .modal-footer { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; }
        .btn-modal-cancel { background: #eee; color: #333; }
        .btn-modal-submit { background: var(--green); color: white; }
    </style>
</head>
<body>

<div class="scan-header">
    <div class="task-id-label">
        <span class="type-badge" id="type-badge">入荷</span>
        T-<span>527</span>
    </div>
    <div class="progress-label">進捗: <span id="header-progress">0</span> / <span id="header-target">3</span> 箱</div>
</div>

<div class="scan-container">
    <!-- Item Source/Dest Info -->
    <div id="shipment-info" style="display: none; background: #fffde7; border: 1px solid #ffd54f; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px;">
        <div><i class="fas fa-truck" style="margin-right: 8px; color: #f57c00;"></i> <strong>出荷情報 (販売)</strong></div>
        <div style="margin-top: 4px; color: #666;">配送業者: ヤマト運輸 / 注文ID: 0012</div>
    </div>

    <div class="product-card">
        <div class="sku-code">CER-BASE-01</div>
        <div class="prod-name">セラミック基板用素材 PREMIUM</div>
        <div class="req-qty" id="qty-label">必要数量: <span id="req-qty-val">3</span> 箱</div>
    </div>

    <div id="picking-steps">
        <div class="step-card active" id="step1">
            <div class="step-header"><div class="step-num"><span class="num-text">1</span></div><span id="step1-label">ステップ1: 棚番号をスキャン</span></div>
            <div class="step-body"><div class="input-row"><div class="scan-field"><i class="fas fa-location-dot"></i><input type="text" id="shelf-input" placeholder="棚コード" onchange="checkStep1()"></div><button class="cam-btn" onclick="simulateScan('shelf-input', 'A-03-2')"><i class="fas fa-camera"></i></button></div></div>
        </div>
        <div class="step-card" id="step2">
            <div class="step-header"><div class="step-num"><span class="num-text">2</span></div><span>ステップ2: 商品・資材SKUをスキャン</span></div>
            <div class="step-body"><div class="input-row"><div class="scan-field"><i class="fas fa-cube"></i><input type="text" id="sku-input" placeholder="商品コード" onchange="checkStep2()"></div><button class="cam-btn" onclick="simulateScan('sku-input', 'CER-BASE-01')"><i class="fas fa-camera"></i></button></div></div>
        </div>
        <div class="step-card" id="step3">
            <div class="step-header"><div class="step-num"><span class="num-text">3</span></div><span>ステップ3: ロット番号を入力</span></div>
            <div class="step-body"><div class="input-row"><div class="scan-field"><i class="fas fa-hashtag"></i><input type="text" id="lot-input" placeholder="LOT番号" onchange="checkStep3()"></div><button class="cam-btn" onclick="simulateScan('lot-input', 'LOT-2026-001')"><i class="fas fa-camera"></i></button></div></div>
        </div>
        <div class="step-card" id="step4">
            <div class="step-header"><div class="step-num"><span class="num-text">4</span></div><span id="step4-label">ステップ4: 入荷数量入力</span></div>
            <div class="step-body">
                <div class="qty-row"><button class="qty-btn-circle btn-minus" onclick="changeQty(-1)">−</button><div class="qty-box" id="qty-display">0</div><button class="qty-btn-circle btn-plus" onclick="changeQty(1)">＋</button></div>
                <div class="quick-btns"><button class="quick-btn" onclick="addQty(1)">+1</button><button class="quick-btn" onclick="addQty(5)">+5</button><button class="quick-btn" onclick="addQty(10)">+10</button></div>
            </div>
        </div>
    </div>

    <div class="history-wrap"><div class="history-title">今回の作業履歴</div><div id="scan-history"><div style="color:#999; font-style:italic; font-size:12px; text-align:center; padding:10px;">履歴はありません</div></div></div>
</div>

<div class="footer-action">
    <button class="btn-confirm-next" id="confirm-btn" onclick="confirmAndNext()"><i class="fas fa-circle-check"></i><span>確認してスキャン継続</span></button>
    <button class="btn-picking-done" id="done-btn" onclick="openConfirmModal()"><i class="fas fa-flag-checkered"></i><span id="finish-btn-text">入荷完了</span></button>
</div>

<div class="modal-overlay" id="confirm-modal">
    <div class="modal-card">
        <div class="modal-icon"><i class="fas fa-check"></i></div>
        <div id="modal-title" class="modal-title">入荷を完了しますか？</div>
        <div id="modal-body" class="modal-body">スキャンした全てのデータを保存し、終了します。</div>
        <div class="modal-footer"><button class="btn-modal btn-modal-cancel" onclick="closeConfirmModal()">戻る</button><button class="btn-modal btn-modal-submit" onclick="finishPicking()">確定する</button></div>
    </div>
</div>

<script>
    let currentQty = 0; let totalPicked = 0;
    const params = new URLSearchParams(window.location.search);
    const taskType = params.get('type') || 'receive';
    const target = parseInt(document.getElementById('req-qty-val').textContent);
    
    function initUI() {
        const badge = document.getElementById('type-badge');
        const pageTitle = document.getElementById('page-title');
        const shipmentInfo = document.getElementById('shipment-info');
        const step1Label = document.getElementById('step1-label');
        const step4Label = document.getElementById('step4-label');
        const finishBtnText = document.getElementById('finish-btn-text');
        const modalTitle = document.getElementById('modal-title');
        const qtyLabel = document.getElementById('qty-label');

        if (taskType === 'receive') {
            badge.textContent = '入荷'; badge.style.backgroundColor = '#e8f5e9'; badge.style.color = '#2e7d32'; badge.style.borderColor = '#c8e6c9';
            pageTitle.textContent = '入荷作業 | Silica Link';
            step1Label.textContent = 'ステップ1: 入荷棚をスキャン';
            step4Label.textContent = 'ステップ4: 入荷数量入力';
            finishBtnText.textContent = '入荷完了';
            modalTitle.textContent = '入荷作業を完了しますか？';
            qtyLabel.innerHTML = `入荷予定数: <span id="req-qty-val">${target}</span> 箱`;
        } else {
            // Shipment or Other outgoing
            badge.textContent = '出荷 (販売)'; badge.style.backgroundColor = '#e3f2fd'; badge.style.color = '#1565c0'; badge.style.borderColor = '#bbdefb';
            pageTitle.textContent = '出荷作業 | Silica Link';
            shipmentInfo.style.display = 'block';
            step1Label.textContent = 'ステップ1: 移動元棚をスキャン';
            step4Label.textContent = 'ステップ4: ピッキング数量入力';
            finishBtnText.textContent = 'ピッキング完了';
            modalTitle.textContent = 'ピッキングを完了しますか？';
            qtyLabel.innerHTML = `出荷予定数: <span id="req-qty-val">${target}</span> 箱`;
        }
    }

    window.onload = function() {
        initUI();
    };

    function changeQty(delta) { currentQty = Math.max(0, currentQty + delta); refreshQtyDisplay(); }
    function addQty(n) { currentQty += n; refreshQtyDisplay(); }
    function refreshQtyDisplay() {
        document.getElementById('qty-display').textContent = currentQty;
        const btn = document.getElementById('confirm-btn');
        if (currentQty > 0) btn.classList.add('ready'); else btn.classList.remove('ready');
    }

    function checkStep1() { if (document.getElementById('shelf-input').value.trim()) document.getElementById('step1').classList.add('done'); }
    function checkStep2() { if (document.getElementById('sku-input').value.trim()) document.getElementById('step2').classList.add('done'); }
    function checkStep3() { if (document.getElementById('lot-input').value.trim()) document.getElementById('step3').classList.add('done'); }
    function simulateScan(inputId, value) { const el = document.getElementById(inputId); el.value = value; el.dispatchEvent(new Event('change')); }

    function confirmAndNext() {
        if (currentQty <= 0) return;
        totalPicked += currentQty;
        const shelf = document.getElementById('shelf-input').value || '—';
        const sku   = document.getElementById('sku-input').value  || '—';
        const lot   = document.getElementById('lot-input').value  || '—';

        const histEl = document.getElementById('scan-history');
        if (histEl.querySelector('div[style]')) histEl.innerHTML = '';
        histEl.insertAdjacentHTML('afterbegin', `<div class="scan-row"><div><span style="font-weight:800;">棚: ${shelf} / SKU: ${sku}</span><br><span style="color:#666;">LOT: ${lot}</span></div><div style="font-size:16px; font-weight:800; color:var(--blue);">+ ${currentQty}</div></div>`);
        document.getElementById('header-progress').textContent = totalPicked;

        if (totalPicked < target) {
            document.getElementById('shelf-input').value = ''; document.getElementById('sku-input').value   = ''; document.getElementById('lot-input').value   = '';
            ['step1','step2','step3'].forEach(id => document.getElementById(id).classList.remove('done'));
            currentQty = 0; refreshQtyDisplay();
        } else {
            document.getElementById('confirm-btn').style.display = 'none'; document.getElementById('done-btn').style.display = 'flex';
            document.getElementById('picking-steps').style.opacity = '0.7'; document.getElementById('picking-steps').style.pointerEvents = 'none';
            ['step1','step2','step3'].forEach(id => document.getElementById(id).classList.add('done'));
        }
    }

    function openConfirmModal() {
        document.getElementById('confirm-modal').style.display = 'flex';
    }
    function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    function finishPicking() { location.href = 'task_detail.html?status=finished&type=' + taskType; }
</script>
</body>
</html>
