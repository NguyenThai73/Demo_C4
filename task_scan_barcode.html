<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スキャン作業 | Silica Link</title>
    <!-- Font Awesome 6.x CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --portal-header-bg: #2c3e50;
            --credie-bg: #f4f7f9;
            --kintone-blue: #3498db;
            --kintone-success: #2ecc71;
            --kintone-warning: #f39c12;
            --kintone-danger: #e74c3c;
            --text-dark: #333;
            --text-muted: #666;
            --text-label: #888;
        }

        body { 
            background-color: var(--credie-bg); 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; 
            color: var(--text-dark);
        }

        .scan-header {
            background: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #eee;
            position: sticky; top: 0; z-index: 100;
        }

        .task-id-text { font-size: 18px; font-weight: 800; }
        .task-id-text span { color: #2e7d32; }
        .progress-text { color: #e67e22; font-size: 14px; font-weight: 800; }

        .scan-container { padding: 15px; max-width: 500px; margin: 0 auto; }

        /* Product Card - Matching Agency's Process Card Style */
        .product-card {
            background: #fffaf0; border: 1.5px solid #ffedcc;
            padding: 15px; border-radius: 12px; margin-bottom: 20px;
        }
        .sku-code { color: #2e7d32; font-weight: 800; font-size: 14px; margin-bottom: 8px; }
        .product-name { font-weight: 800; font-size: 18px; margin-bottom: 12px; color: var(--text-dark); }
        .required-qty { color: var(--kintone-danger); font-weight: 800; font-size: 14px; }

        /* Step Card */
        .step-card {
            background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid transparent;
        }
        .step-card.active { border: 2px solid var(--kintone-success); }
        
        .step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; font-weight: 800; font-size: 14px; color: var(--text-dark); }
        .step-num { 
            background: #f0f0f0; color: #999; width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800;
        }
        .step-card.completed .step-num { background: var(--kintone-success); color: white; }
        .step-card.completed .step-num::before { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; }
        .step-card.completed .step-num span { display: none; }

        .input-group { display: flex; gap: 10px; }
        .input-field { 
            flex: 1; border: 1.5px solid #333; border-radius: 8px; padding: 12px 15px;
            font-size: 14px; display: flex; align-items: center; gap: 12px; background: #fff;
        }
        .input-field input { border: none; outline: none; width: 100%; font-size: 14px; font-weight: 800; color: var(--text-dark); }
        .camera-btn { 
            background: var(--kintone-success); color: white; width: 48px; height: 48px;
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px;
            cursor: pointer; transition: 0.2s;
        }
        .camera-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* Qty Picker */
        .qty-picker { display: flex; align-items: center; justify-content: center; gap: 25px; margin: 20px 0; }
        .qty-btn { 
            width: 48px; height: 48px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .btn-minus { background: #eee; color: #666; }
        .btn-plus { background: var(--kintone-blue); color: white; }
        .btn-minus:active, .btn-plus:active { transform: scale(0.9); }

        .qty-display { 
            border: 2px solid var(--kintone-blue); border-radius: 8px; width: 100px; height: 55px;
            display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800;
            color: var(--text-dark); background: white;
        }
        
        .quick-qty-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .quick-btn { 
            background: #f1f3f4; border: none; padding: 10px 0; border-radius: 8px;
            font-size: 13px; font-weight: 800; cursor: pointer; color: var(--text-dark); transition: 0.2s;
        }
        .quick-btn:active { background: #e0e2e4; }

        /* Footer Action */
        .footer-action {
            position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px;
            background: white; border-top: 1px solid #eee; box-sizing: border-box;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
        }
        .btn-confirm {
            background: #ddd; color: white; width: 100%; border: none; padding: 15px;
            border-radius: 10px; font-weight: 800; font-size: 16px; cursor: not-allowed;
            display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s;
        }
        .btn-confirm.ready { background: var(--kintone-success); cursor: pointer; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2); }
    </style>
</head>
<body>

<div class="scan-header">
    <div class="task-id-text">Task ID: <span>527</span></div>
    <div class="progress-text">進捗: 0 / 1 行</div>
</div>

<div class="scan-container">
    <!-- Product Info - Match Agency Product Card Colors -->
    <div class="product-card">
        <div class="sku-code">CER-BASE-01</div>
        <div class="product-name">セラミック基板用素材 PREMIUM</div>
        <div class="required-qty">必要数量: 3 箱</div>
    </div>

    <!-- Step 1: Shelf -->
    <div class="step-card completed">
        <div class="step-header">
            <div class="step-num"><span>1</span></div>
            <span>ステップ1: 棚番号をスキャン</span>
        </div>
        <div class="input-group">
            <div class="input-field">
                <i class="fas fa-location-dot" style="color: #bbb;"></i>
                <input type="text" value="A-01-02" readonly>
            </div>
            <div class="camera-btn"><i class="fas fa-camera"></i></div>
        </div>
    </div>

    <!-- Step 2: SKU -->
    <div class="step-card active">
        <div class="step-header">
            <div class="step-num"><span>2</span></div>
            <span>ステップ2: 商品・資材SKUをスキャン</span>
        </div>
        <div class="input-group">
            <div class="input-field">
                <i class="fas fa-box-open" style="color: #bbb;"></i>
                <input type="text" placeholder="商品コード" id="sku-input">
            </div>
            <div class="camera-btn" onclick="simulateScan('sku')"><i class="fas fa-camera"></i></div>
        </div>
    </div>

    <!-- Step 3: Lot -->
    <div class="step-card">
        <div class="step-header">
            <div class="step-num"><span>3</span></div>
            <span>ステップ3: ロット番号を入力</span>
        </div>
        <div class="input-group">
            <div class="input-field">
                <i class="fas fa-hashtag" style="color: #bbb;"></i>
                <input type="text" placeholder="LOT番号">
            </div>
            <div class="camera-btn"><i class="fas fa-camera"></i></div>
        </div>
    </div>

    <!-- Step 4: Qty -->
    <div class="step-card" id="step-qty" style="border: 2px solid var(--kintone-success); background-color: #fafffa;">
        <div class="step-header">
            <i class="fas fa-check-circle" style="color: var(--kintone-success); font-size: 22px;"></i>
            <span>ステップ4: 実際にピッキングした数量</span>
        </div>
        
        <div class="qty-picker">
            <button class="qty-btn btn-minus" onclick="changeQty(-1)">−</button>
            <div class="qty-display" id="current-qty">0</div>
            <button class="qty-btn btn-plus" onclick="changeQty(1)">＋</button>
        </div>

        <div class="quick-qty-grid">
            <button class="quick-btn" onclick="addQty(1)">+1</button>
            <button class="quick-btn" onclick="addQty(5)">+5</button>
            <button class="quick-btn" onclick="addQty(10)">+10</button>
            <button class="quick-btn" onclick="addQty(20)">+20</button>
            <button class="quick-btn" onclick="addQty(50)">+50</button>
        </div>
    </div>

    <div style="height: 120px;"></div> <!-- Spacer -->
</div>

<div class="footer-action">
    <button class="btn-confirm" id="confirm-btn" onclick="finishScan()">
        <i class="fas fa-check"></i> 確認して次へ <span id="footer-qty">0</span> / 3
    </button>
</div>

<script>
    let qty = 0;
    const target = 3;

    function simulateScan(type) {
        if(type === 'sku') {
            document.getElementById('sku-input').value = 'CER-BASE-01';
            updateQtyUI();
        }
    }

    function changeQty(v) {
        qty = Math.max(0, qty + v);
        updateQtyUI();
    }

    function addQty(v) {
        qty = qty + v;
        updateQtyUI();
    }

    function updateQtyUI() {
        document.getElementById('current-qty').innerText = qty;
        document.getElementById('footer-qty').innerText = qty;
        
        const btn = document.getElementById('confirm-btn');
        if(qty >= target) {
            btn.classList.add('ready');
        } else {
            btn.classList.remove('ready');
        }
    }

    function finishScan() {
        if(qty >= target) {
            location.href = 'task_detail.html?status=in-progress';
        }
    }
</script>

</body>
</html>
