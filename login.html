<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富士屋本店 - スタッフログイン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            width: 880px;
            height: 640px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        /* Left Panel */
        .login-form-panel {
            width: 50%;
            background: #f5f3ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: #2d3a2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .store-name {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .store-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 36px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
            color: #333;
        }

        .input-wrapper input:focus {
            border-color: #2d3a2e;
        }

        .input-wrapper input::placeholder {
            color: #bbb;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #999;
        }

        .eye-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #999;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            margin-top: 6px;
            margin-bottom: 24px;
        }

        .forgot-password a {
            font-size: 13px;
            color: #666;
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2d3a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #3a4a3b;
        }

        /* Right Panel */
        .hero-panel {
            width: 50%;
            position: relative;
            background: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&q=80') center center / cover no-repeat;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(30,40,30,0.4) 0%, rgba(30,40,30,0.75) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 48px 40px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #ddd;
            margin-bottom: 16px;
            width: fit-content;
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .hero-desc {
            font-size: 14px;
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .hero-stats {
            display: flex;
            gap: 40px;
        }

        .stat-item .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .stat-item .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Left: Login Form -->
        <div class="login-form-panel">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v9a2 2 0 01-2 2H5a2 2 0 01-2-2v-9zm3-7h2v3H6V4zm10 0h2v3h-2V4zm-5 9h2v2h-2v-2z"/></svg>
            </div>
            <div class="store-name">富士屋本店</div>
            <div class="store-subtitle">スタッフログイン</div>

            <form style="width:100%;" onsubmit="window.location.href='dashboard.html'; return false;">
                <div class="form-group">
                    <label>ログインID</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm0 5h18v9a2 2 0 01-2 2H5a2 2 0 01-2-2v-9zm3-7h2v3H6V4zm10 0h2v3h-2V4z"/></svg>
                        <input type="text" placeholder="IDを入力" value="staff001">
                    </div>
                </div>

                <div class="form-group">
                    <label>パスワード</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 2a5 5 0 00-5 5v3H6a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2v-8a2 2 0 00-2-2h-1V7a5 5 0 00-5-5zm-3 5a3 3 0 116 0v3H9V7zm3 8a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/></svg>
                        <input type="password" id="passwordInput" value="password123">
                        <svg class="eye-icon" viewBox="0 0 24 24" onclick="togglePassword()"><path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
                    </div>
                </div>

                <div class="forgot-password">
                    <a href="#">パスワードを忘れた場合?</a>
                </div>

                <button type="submit" class="login-btn">ログイン</button>
            </form>
        </div>

        <!-- Right: Hero -->
        <div class="hero-panel">
            <div class="hero-overlay">
                <div class="badge">
                    <span class="badge-dot"></span>
                    24時間365日稼働
                </div>
                <div class="hero-title">次世代店舗オペレーション</div>
                <div class="hero-desc">
                    注文・会計・顧客管理をひとつのプラットフォームで。<br>
                    効率的な店舗運営を実現します。
                </div>
                <div class="hero-stats">
                    <div class="stat-item">
                        <div class="stat-value">500+</div>
                        <div class="stat-label">導入店舗</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">10万+</div>
                        <div class="stat-label">デイリーオーダー</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
