<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lumina Gastronomy - Start Ordering</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans',
                 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    height: 100vh;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ipad-frame {
    width: 880px;
    height: 640px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 12px;
  }

  /* ── Context Bar ── */
  .context-bar {
    background: #2d3a2e;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 24px;
    font-size: 12px;
    flex-shrink: 0;
  }
  .context-left { display: flex; gap: 16px; align-items: center; }
  .context-item { display: flex; align-items: center; gap: 5px; }
  .context-label { color: rgba(255,255,255,0.55); font-weight: 400; }
  .context-value { font-weight: 700; letter-spacing: 0.3px; }
  .context-divider { width: 1px; height: 14px; background: rgba(255,255,255,0.2); }
  .context-date { color: rgba(255,255,255,0.5); font-size: 11px; }

  /* ── Main ── */
  .main-content {
    flex: 1;
    background: #f0ece4;
    display: flex;
    padding: 20px 28px 18px;
    gap: 20px;
    overflow: hidden;
  }

  /* ── Left: AI Hero ── */
  .hero-side {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .ai-card {
    flex: 1;
    background: #fff;
    border-radius: 14px;
    padding: 22px 22px 18px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    border: 2.5px solid #2d3a2e;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .ai-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); }

  /* Pulse ring animation */
  .mic-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    position: relative;
    height: 72px;
  }
  .mic-ring {
    position: absolute;
    border-radius: 50%;
    background: rgba(45,58,46,0.07);
    animation: pulse-ring 2s ease-out infinite;
  }
  .mic-ring:nth-child(1) { width: 68px; height: 68px; animation-delay: 0s; }
  .mic-ring:nth-child(2) { width: 52px; height: 52px; animation-delay: 0.35s; }
  @keyframes pulse-ring {
    0%   { transform: scale(0.85); opacity: 0.6; }
    70%  { transform: scale(1.15); opacity: 0; }
    100% { transform: scale(1.15); opacity: 0; }
  }
  .mic-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #2d3a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  .mic-btn .material-symbols-outlined {
    font-size: 22px;
    color: #fff;
    font-variation-settings: 'FILL' 1;
  }

  .ai-card-title {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: -0.2px;
  }
  .ai-card-sub {
    font-size: 11.5px;
    color: #666;
    text-align: center;
    line-height: 1.5;
  }

  /* Language cards */
  .lang-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    color: #999;
    text-align: center;
    margin: 14px 0 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .lang-section-label .material-symbols-outlined { font-size: 13px; color: #2d3a2e; font-variation-settings: 'FILL' 1; }

  .lang-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .lang-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 10px 6px;
    border-radius: 10px;
    border: 2px solid #e8e4de;
    background: #f7f5f2;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .lang-card:hover {
    border-color: #2d3a2e;
    background: #f0f5f0;
  }
  .lang-card.active {
    background: #2d3a2e;
    border-color: #2d3a2e;
    box-shadow: 0 2px 10px rgba(45,58,46,0.2);
  }
  .lang-flag {
    font-size: 22px;
    line-height: 1;
  }
  .lang-name {
    font-size: 11.5px;
    font-weight: 700;
    color: #333;
    line-height: 1.2;
  }
  .lang-card.active .lang-name { color: #fff; }
  .lang-native {
    font-size: 9.5px;
    color: #999;
    font-weight: 500;
  }
  .lang-card.active .lang-native { color: rgba(255,255,255,0.65); }

  /* Voice / Chat toggle */
  .method-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .method-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 0;
    border-radius: 8px;
    border: 1.5px solid #ddd;
    background: #f7f5f2;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: #444;
    transition: all 0.15s;
    font-family: inherit;
  }
  .method-btn .material-symbols-outlined { font-size: 16px; }
  .method-btn.active {
    background: #2d3a2e;
    border-color: #2d3a2e;
    color: #fff;
  }

  /* ── Right: Settings + Normal ── */
  .right-side {
    width: 260px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Normal card */
  .normal-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    border: 2px solid #e0dcd4;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .normal-card:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .normal-card.selected { border-color: #2d3a2e; }

  .normal-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .normal-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #f0ece4;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .normal-icon .material-symbols-outlined { font-size: 18px; color: #444; }
  .normal-card-label { font-size: 13px; font-weight: 700; color: #1a1a1a; }
  .normal-card-sub { font-size: 11px; color: #888; line-height: 1.45; }

  /* Settings panel */
  .settings-panel {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .setting-row-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #888;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 8px;
  }
  .setting-row-label .material-symbols-outlined { font-size: 13px; }

  /* Guest counter */
  .guest-row { display: flex; gap: 8px; }
  .guest-counter {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f7f5f2;
    border-radius: 8px;
    padding: 4px 6px;
  }
  .counter-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
    color: #444;
  }
  .counter-btn:hover { background: #e5e2dc; }
  .counter-btn.plus { background: #2d3a2e; color: #fff; }
  .counter-btn.plus:hover { background: #3a4d3b; }
  .counter-btn .material-symbols-outlined { font-size: 15px; }
  .counter-label { font-size: 11.5px; font-weight: 700; color: #1a1a1a; text-align: center; }

  /* CTA lang highlight */
  .cta-lang-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 2px 8px 2px 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  /* ── CTA ── */
  .cta-wrap {
    padding: 0 28px 18px;
    background: #f0ece4;
    flex-shrink: 0;
  }
  .cta-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 10px;
    border: none;
    background: #2d3a2e;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .cta-btn:hover { background: #3a4d3b; }
  .cta-btn:active { transform: scale(0.99); }
  .cta-btn .material-symbols-outlined { font-size: 20px; font-variation-settings: 'FILL' 1; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>
<body>
<div class="ipad-frame">

  <!-- Context Bar -->
  <div class="context-bar">
    <div class="context-left">
      <div class="context-item">
        <span class="context-label">卓番:</span>
        <span class="context-value" id="ctxTable">T-01, T-02</span>
      </div>
      <div class="context-divider"></div>
      <div class="context-item">
        <span class="context-label">端末:</span>
        <span class="context-value" id="ctxTerminal">iPad-03</span>
      </div>
      <div class="context-divider"></div>
      <div class="context-item">
        <span class="context-label">受付番号:</span>
        <span class="context-value" id="ctxReception">#0042</span>
      </div>
    </div>
    <div class="context-date" id="ctxDate"></div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Left: AI Card -->
    <div class="hero-side">
      <div class="ai-card" id="ai-card" onclick="selectMode('ai')">

        <!-- Mic Visual -->
        <div class="mic-wrap">
          <div class="mic-ring"></div>
          <div class="mic-ring"></div>
          <div class="mic-btn">
            <span class="material-symbols-outlined">mic</span>
          </div>
        </div>

        <p class="ai-card-title">AIで注文する</p>
        <p class="ai-card-sub">話しかけるだけ — メニューを探さなくてもOK</p>

        <!-- Language Cards -->
        <div class="lang-section-label">
          <span class="material-symbols-outlined">language</span>
          話しかける言語を選んでください
        </div>
        <div class="lang-cards">
          <button class="lang-card active" onclick="selectLang(this, event)" data-lang="日本語">
            <span class="lang-flag">🇯🇵</span>
            <span class="lang-name">日本語</span>
            <span class="lang-native">Japanese</span>
          </button>
          <button class="lang-card" onclick="selectLang(this, event)" data-lang="English">
            <span class="lang-flag">🇺🇸</span>
            <span class="lang-name">English</span>
            <span class="lang-native">英語</span>
          </button>
          <button class="lang-card" onclick="selectLang(this, event)" data-lang="한국어">
            <span class="lang-flag">🇰🇷</span>
            <span class="lang-name">한국어</span>
            <span class="lang-native">韓国語</span>
          </button>
          <button class="lang-card" onclick="selectLang(this, event)" data-lang="中文">
            <span class="lang-flag">🇨🇳</span>
            <span class="lang-name">中文</span>
            <span class="lang-native">中国語</span>
          </button>
        </div>

        <!-- Voice / Chat -->
        <div class="method-row">
          <button class="method-btn active" id="voice-btn" onclick="selectMethod('voice', event)">
            <span class="material-symbols-outlined">mic</span>
            音声
          </button>
          <button class="method-btn" id="chat-btn" onclick="selectMethod('chat', event)">
            <span class="material-symbols-outlined">chat_bubble</span>
            チャット
          </button>
        </div>

      </div>
    </div>

    <!-- Right: Normal + Settings -->
    <div class="right-side">

      <!-- Normal Order Card -->
      <div class="normal-card" id="normal-card" onclick="selectMode('normal')">
        <div class="normal-card-top">
          <div class="normal-icon">
            <span class="material-symbols-outlined">restaurant_menu</span>
          </div>
          <span class="normal-card-label">通常メニュー</span>
        </div>
        <p class="normal-card-sub">メニューを見ながら自分で選んで注文</p>
      </div>

      <!-- Settings -->
      <div class="settings-panel">

        <!-- Guests -->
        <div>
          <div class="setting-row-label">
            <span class="material-symbols-outlined">group</span>
            人数
          </div>
          <div class="guest-row">
            <div class="guest-counter">
              <button class="counter-btn" onclick="changeGuest('adult', -1)">
                <span class="material-symbols-outlined">remove</span>
              </button>
              <span class="counter-label" id="adultLabel">大人 2</span>
              <button class="counter-btn plus" onclick="changeGuest('adult', 1)">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
            <div class="guest-counter">
              <button class="counter-btn" onclick="changeGuest('child', -1)">
                <span class="material-symbols-outlined">remove</span>
              </button>
              <span class="counter-label" id="childLabel">子供 0</span>
              <button class="counter-btn plus" onclick="changeGuest('child', 1)">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div><!-- /main-content -->

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="cta-btn" id="primary-cta" onclick="startOrder()">
      <span class="material-symbols-outlined" id="cta-icon">mic</span>
      <span id="cta-text">音声で注文を始める</span>
      <span class="cta-lang-badge" id="cta-lang-badge">🇯🇵 日本語</span>
    </button>
  </div>

</div><!-- /ipad-frame -->

<script>
  let currentMode = 'ai';
  let currentMethod = 'voice';
  let adultCount = 2;
  let childCount = 0;

  function selectMode(mode) {
    currentMode = mode;
    const aiCard = document.getElementById('ai-card');
    const normalCard = document.getElementById('normal-card');
    const ctaIcon = document.getElementById('cta-icon');
    const ctaText = document.getElementById('cta-text');

    if (mode === 'ai') {
      aiCard.style.borderColor = '#2d3a2e';
      normalCard.classList.remove('selected');
      ctaIcon.innerText = currentMethod === 'voice' ? 'mic' : 'chat_bubble';
      ctaText.innerText = currentMethod === 'voice' ? '音声で注文を始める' : 'チャットで注文を始める';
    } else {
      normalCard.classList.add('selected');
      aiCard.style.borderColor = '#e0dcd4';
      ctaIcon.innerText = 'restaurant_menu';
      ctaText.innerText = '通常注文で開始';
    }
  }

  function selectMethod(method, event) {
    event.stopPropagation();
    currentMethod = method;
    selectMode('ai');
    document.getElementById('voice-btn').classList.toggle('active', method === 'voice');
    document.getElementById('chat-btn').classList.toggle('active', method === 'chat');
  }

  function changeGuest(type, delta) {
    if (type === 'adult') {
      adultCount = Math.max(1, adultCount + delta);
      document.getElementById('adultLabel').textContent = '大人 ' + adultCount;
    } else {
      childCount = Math.max(0, childCount + delta);
      document.getElementById('childLabel').textContent = '子供 ' + childCount;
    }
  }

  const langFlags = { '日本語': '🇯🇵', 'English': '🇺🇸', '한국어': '🇰🇷', '中文': '🇨🇳' };

  function selectLang(btn, event) {
    if (event) event.stopPropagation();
    document.querySelectorAll('.lang-card').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const lang = btn.dataset.lang;
    currentLang = lang;
    // Update CTA badge
    const badge = document.getElementById('cta-lang-badge');
    if (badge) badge.textContent = (langFlags[lang] || '') + ' ' + lang;
    // Keep AI mode selected
    selectMode('ai');
  }

  let currentLang = '日本語';

  function startOrder() {
    const isAI = currentMode === 'ai';
    const session = {
      tables: JSON.parse(localStorage.getItem('selectedTables') || '[]'),
      adults: adultCount,
      children: childCount,
      totalGuests: adultCount + childCount,
      language: currentLang,
      orderMode: isAI ? 'ai' : 'manual',
      aiMethod: currentMethod,
      terminal: localStorage.getItem('terminalId') || 'iPad-03',
      reception: localStorage.getItem('receptionNo') || '0042',
      startedAt: new Date().toISOString()
    };
    localStorage.setItem('currentSession', JSON.stringify(session));
    if (isAI) {
      sessionStorage.setItem('showAiWelcome', 'yes');
      window.location.href = 'menu_ai.html';
    } else {
      window.location.href = 'menu.html';
    }
  }

  (function initContext() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('ctxDate').textContent = y + '/' + m + '/' + d + ' ' + hh + ':' + mm;
    const tables = JSON.parse(localStorage.getItem('selectedTables') || '[]');
    if (tables.length > 0) document.getElementById('ctxTable').textContent = tables.join(', ');
    document.getElementById('ctxTerminal').textContent = localStorage.getItem('terminalId') || 'iPad-03';
    document.getElementById('ctxReception').textContent = '#' + (localStorage.getItem('receptionNo') || '0042');
  })();
</script>
</body>
</html>
