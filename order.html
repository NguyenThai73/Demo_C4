<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Lumina Gastronomy - Start Ordering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      height: 100vh;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ipad-frame {
      width: 1705.72px;
      height: 1144.13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
      background: #F9F8F2;
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
      position: relative;
      transform-origin: center center;
      will-change: transform;
    }

    .ipad-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 202px;
      background: #F9F8F2;
      z-index: 0;
    }

    /* ── Context Bar ── */
    .context-bar {
      display: none !important;
    }

    .restaurant-header {
      position: relative;
      width: 100%;
      height: 53px;
      margin: 40px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      font-size: 44px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      color: #333333;
      flex-shrink: 0;
      z-index: 20;
    }

    .restaurant-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 53px;
    }

    .context-left {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .context-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .context-label {
      color: rgba(255, 255, 255, 0.55);
      font-weight: 400;
    }

    .context-value {
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .context-divider {
      width: 1px;
      height: 16px;
      background: rgba(255, 255, 255, 0.2);
    }

    .context-date {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }

    /* ── Main ── */
    .main-content {
      flex: 0 0 auto;
      width: 1189px;
      margin: 0 auto;
      background: #F9F8F2;
      display: flex;
      align-items: stretch;
      padding: 54px 0 0;
      gap: 32px;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    /* ── Left: AI Hero ── */
    .hero-side {
      width: 620px;
      flex: 0 0 620px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ai-card {
      flex: 0 0 auto;
      background: #fff;
      border-radius: 28px;
      padding: 38px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      height: 610px;
      cursor: pointer;
      border: 1px solid #E2DDD4;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
      box-shadow: none;
    }

    .ai-card:hover {
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }

    /* Pulse ring animation */
    .mic-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
      height: 100px;
    }

    .mic-ring {
      position: absolute;
      border-radius: 50%;
      background: rgba(45, 58, 46, 0.1);
      animation: pulse-ring 2s ease-out infinite;
    }

    .mic-ring:nth-child(1) {
      width: 90px;
      height: 90px;
      animation-delay: 0s;
    }

    .mic-ring:nth-child(2) {
      width: 70px;
      height: 70px;
      animation-delay: 0.35s;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(0.85);
        opacity: 0.6;
      }

      70% {
        transform: scale(1.3);
        opacity: 0;
      }

      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }

    .mic-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #18324C;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .mic-btn .material-symbols-outlined {
      font-size: 32px;
      color: #fff;
      font-variation-settings: 'FILL' 1;
    }

    .ai-card-title {
      font-size: 38px;
      font-weight: 400;
      color: #333333;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .ai-card-sub {
      font-size: 23px;
      color: #6F6B64;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    /* Language cards */
    .lang-section-label {
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .lang-section-label .material-symbols-outlined {
      font-size: 18px;
      color: #18324C;
    }

    .lang-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .lang-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px 8px;
      border-radius: 18px;
      border: 1px solid #E2DDD4;
      background: #FFFFFF;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      position: relative;
    }

    .lang-card:hover {
      border-color: #18324C;
      background: #F7F6F1;
    }

    .lang-card.active {
      background: #18324C;
      border-color: #18324C;
      box-shadow: 0 2px 10px rgba(45, 58, 46, 0.2);
    }

    .lang-card.disabled {
      background: #F2EFE8;
      border-color: #DDD7CE;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .lang-card.disabled:hover {
      border-color: #DDD7CE;
      background: #F2EFE8;
      transform: none;
    }

    .lang-card.disabled .lang-name,
    .lang-card.disabled .lang-native {
      color: #8f8a81;
    }

    .lang-soon {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #E7E2D9;
      color: #7a6f62;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }

    .lang-flag {
      font-size: 24px;
      line-height: 1;
    }

    .lang-name {
      font-size: 16px;
      font-weight: 400;
      color: #333333;
      line-height: 1.2;
    }

    .lang-card.active .lang-name {
      color: #fff;
    }

    .lang-native {
      font-size: 12px;
      color: #8E877D;
      font-weight: 400;
    }

    .lang-card.active .lang-native {
      color: rgba(255, 255, 255, 0.65);
    }

    /* Voice / Chat toggle */
    .method-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .method-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 0;
      border-radius: 16px;
      border: 1px solid #E2DDD4;
      background: #FFFFFF;
      cursor: pointer;
      font-size: 18px;
      font-weight: 400;
      color: #444;
      transition: all 0.15s;
      font-family: inherit;
    }

    .method-btn .material-symbols-outlined {
      font-size: 20px;
    }

    .method-btn.active {
      background: #18324C;
      border-color: #18324C;
      color: #fff;
    }

    /* ── Right: Settings + Normal ── */
    .right-side {
      width: 537px;
      flex: 0 0 537px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      height: 100%;
    }

    /* Normal card */
    .normal-card {
      background: #fff;
      border-radius: 28px;
      padding: 32px 32px;
      border: 1px solid #E2DDD4;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: none;
    }

    .normal-card:hover {
      border-color: #C9C2B7;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .normal-card.selected {
      border-color: #18324C;
      background: #fdfdfd;
    }

    .normal-card-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .normal-icon {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      background: #EAE8E2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .normal-icon .material-symbols-outlined {
      font-size: 24px;
      color: #18324C;
    }

    .normal-card-label {
      font-size: 27px;
      font-weight: 400;
      color: #333333;
    }

    .normal-card-sub {
      font-size: 18px;
      color: #6F6B64;
      line-height: 1.5;
    }

    /* Settings panel */
    .settings-panel {
      background: #fff;
      border-radius: 28px;
      padding: 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: none;
      border: 1px solid #E2DDD4;
    }

    .setting-row-label {
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8E877D;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .setting-row-label .material-symbols-outlined {
      font-size: 18px;
    }

    /* Guest counter */
    .guest-row {
      display: flex;
      gap: 8px;
    }

    .guest-counter {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #FFFFFF;
      border-radius: 8px;
      padding: 4px 6px;
    }

    .counter-label {
      font-size: 11.5px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
    }

    /* Number Buttons */
    .number-btns {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }

    .num-btn {
      flex: 1;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid #E2DDD4;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 400;
      color: #444;
      cursor: pointer;
      transition: all 0.15s;
    }

    .num-btn:hover {
      border-color: #18324C;
      background: #F7F6F1;
    }

    .num-btn.active {
      background: #18324C;
      border-color: #18324C;
      color: #fff;
      box-shadow: 0 4px 12px rgba(45, 58, 46, 0.25);
    }

    /* Visit Frequency */
    .visit-row {
      display: flex;
      gap: 10px;
    }

    .visit-btn {
      flex: 1;
      height: 62px;
      border-radius: 14px;
      border: 1px solid #E2DDD4;
      background: #fff;
      font-family: inherit;
      font-size: 18px;
      font-weight: 400;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }

    .visit-btn.active {
      background: #18324C;
      border-color: #18324C;
      color: #fff;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: #fff;
      width: 520px;
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      transform: translateY(20px);
      animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes slideUp {
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 28px;
      font-weight: 900;
      color: #2d3a2e;
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 18px;
      color: #888;
      margin-bottom: 24px;
    }

    .modal-input-wrap {
      margin-bottom: 24px;
    }

    .modal-input {
      width: 100%;
      height: 92px;
      border-radius: 16px;
      border: 2.5px solid #2d3a2e;
      font-size: 52px;
      font-weight: 800;
      text-align: center;
      color: #2d3a2e;
      background: #f9f8f4;
      font-family: 'Outfit', sans-serif;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      height: 56px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .modal-btn-cancel {
      background: #F9F8F2;
      color: #666;
    }

    .modal-btn-confirm {
      background: #18324C;
      color: #fff;
    }

    .modal-btn-confirm:hover { background: #3a4d3b; }

    /* CTA lang highlight */
    .cta-lang-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 2px 8px 2px 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    /* ── CTA ── */
    .cta-wrap {
      width: 1189px;
      margin: 60px auto 0;
      padding: 0 0 16px;
      background: #F9F8F2;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
    }

    .cta-btn {
      width: 475.73px;
      height: 89.13px;
      border-radius: 14px;
      border: none;
      background: #18324C;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }

    .cta-btn:hover {
      background: #10263A;
      transform: translateY(-1px);
    }

    .cta-btn:active {
      transform: scale(0.98);
    }

    .cta-btn .material-symbols-outlined {
      font-size: 20px;
      font-variation-settings: 'FILL' 1;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body>
  <div class="ipad-frame">

    <!-- Context Bar -->
    <div class="context-bar">
      <div class="context-left">
        <div class="context-item">
          <span class="context-label">卓番:</span>
          <span class="context-value" id="ctxTable">T-01, T-02</span>
        </div>
        <div class="context-divider"></div>
        <div class="context-item">
          <span class="context-label">端末:</span>
          <span class="context-value" id="ctxTerminal">iPad-03</span>
        </div>
        <div class="context-divider"></div>
        <div class="context-item">
          <span class="context-label">受付番号:</span>
          <span class="context-value" id="ctxReception">#0042</span>
        </div>
      </div>
      <div class="context-date" id="ctxDate"></div>
    </div>

    <div class="restaurant-header">
      <div class="restaurant-title">富士屋本店</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Left: AI Card -->
      <div class="hero-side">
        <div class="ai-card" id="ai-card" onclick="selectMode('ai')">

          <!-- Mic Visual -->
          <div class="mic-wrap">
            <div class="mic-ring"></div>
            <div class="mic-ring"></div>
            <div class="mic-btn">
              <span class="material-symbols-outlined">mic</span>
            </div>
          </div>

          <p class="ai-card-title">AIで注文する</p>
          <p class="ai-card-sub">話しかけるだけ — メニューを探さなくてもOK</p>

          <!-- Language Cards -->
          <div class="lang-section-label">
            <span class="material-symbols-outlined">language</span>
            話しかける言語を選んでください
          </div>
          <div class="lang-cards">
            <button class="lang-card active" onclick="selectLang(this, event)" data-lang="日本語">
              <span class="lang-flag">🇯🇵</span>
              <span class="lang-name">日本語</span>
              <span class="lang-native">Japanese</span>
            </button>
            <button class="lang-card" onclick="selectLang(this, event)" data-lang="English">
              <span class="lang-flag">🇺🇸</span>
              <span class="lang-name">English</span>
              <span class="lang-native">英語</span>
            </button>
            <button class="lang-card disabled" onclick="selectLang(this, event)" data-lang="한국어" disabled aria-disabled="true">
              <span class="lang-soon">準備中</span>
              <span class="lang-flag">🇰🇷</span>
              <span class="lang-name">한국어</span>
              <span class="lang-native">Coming Soon</span>
            </button>
            <button class="lang-card disabled" onclick="selectLang(this, event)" data-lang="中文" disabled aria-disabled="true">
              <span class="lang-soon">準備中</span>
              <span class="lang-flag">🇨🇳</span>
              <span class="lang-name">中文</span>
              <span class="lang-native">Coming Soon</span>
            </button>
          </div>

          <!-- Voice / Chat -->
          <div class="method-row">
            <button class="method-btn active" id="voice-btn" onclick="selectMethod('voice', event)">
              <span class="material-symbols-outlined">mic</span>
              音声
            </button>
            <button class="method-btn" id="chat-btn" onclick="selectMethod('chat', event)">
              <span class="material-symbols-outlined">chat_bubble</span>
              チャット
            </button>
          </div>

        </div>
      </div>

      <!-- Right: Normal + Settings -->
      <div class="right-side">

        <!-- Normal Order Card -->
        <div class="normal-card" id="normal-card" onclick="selectMode('normal')">
          <div class="normal-card-top">
            <div class="normal-icon">
              <span class="material-symbols-outlined">restaurant_menu</span>
            </div>
            <span class="normal-card-label">通常メニュー</span>
          </div>
          <p class="normal-card-sub">メニューを見ながら自分で選んで注文</p>
        </div>

        <!-- Settings -->
        <div class="settings-panel">

          <!-- Guests -->
          <div style="display: flex; flex-direction: column; gap: 24px;">
            <div>
              <div class="setting-row-label">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
                大人 (Adult)
              </div>
              <div class="number-btns" id="adultBtns">
                <button class="num-btn" onclick="setGuest('adult', 1)">1</button>
                <button class="num-btn active" onclick="setGuest('adult', 2)">2</button>
                <button class="num-btn" onclick="setGuest('adult', 3)">3</button>
                <button class="num-btn" onclick="setGuest('adult', 4)">4</button>
                <button class="num-btn" onclick="openGuestModal('adult')">5+</button>
              </div>
            </div>

            <div>
              <div class="setting-row-label">
                <span class="material-symbols-outlined">child_care</span>
                子供 (Child)
              </div>
              <div class="number-btns" id="childBtns">
                <button class="num-btn active" onclick="setGuest('child', 0)">0</button>
                <button class="num-btn" onclick="setGuest('child', 1)">1</button>
                <button class="num-btn" onclick="setGuest('child', 2)">2</button>
                <button class="num-btn" onclick="setGuest('child', 3)">3</button>
                <button class="num-btn" onclick="openGuestModal('child')">4+</button>
              </div>
            </div>

            <!-- Visit Frequency -->
            <div>
              <div class="setting-row-label">
                <span class="material-symbols-outlined">history</span>
                ご来店状況 (Visit Frequency)
              </div>
              <div class="visit-row">
                <button class="visit-btn active" id="visit-1st" onclick="setVisit(1)">初めて (1st Time)</button>
                <button class="visit-btn" id="visit-2nd" onclick="setVisit(2)">2回目以降 (2nd+ Time)</button>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /main-content -->

    <!-- CTA -->
    <div class="cta-wrap">
      <button class="cta-btn" id="primary-cta" onclick="startOrder()">
        <span class="material-symbols-outlined" id="cta-icon">mic</span>
        <span id="cta-text">この設定で音声注文を開始</span>
        <span class="cta-lang-badge" id="cta-lang-badge">🇯🇵 日本語</span>
      </button>
    </div>

    <!-- Guest Modal -->
    <div class="modal-overlay" id="guestModal">
      <div class="modal-content">
        <p class="modal-title" id="modalTitle">大人数の入力</p>
        <p class="modal-sub" id="modalSub">正確な人数を半角数字で入力してください</p>
        <div class="modal-input-wrap">
          <input type="number" class="modal-input" id="guestInput" placeholder="0" min="1">
        </div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel" onclick="closeGuestModal()">キャンセル</button>
          <button class="modal-btn modal-btn-confirm" onclick="confirmGuestModal()">確定</button>
        </div>
      </div>
    </div>

  </div><!-- /ipad-frame -->

  <script>
    const FRAME_WIDTH = 1705.72;
    const FRAME_HEIGHT = 1144.13;
    let currentMode = 'ai';
    let currentMethod = 'voice';
    let adultCount = 2;
    let childCount = 0;
    let visitFrequency = 1; // 1: 1st time, 2: 2nd+ time
    let activeModalType = 'adult';

    function fitFrame() {
      const frame = document.querySelector('.ipad-frame');
      if (!frame) return;
      const scale = Math.min(window.innerWidth / FRAME_WIDTH, window.innerHeight / FRAME_HEIGHT);
      frame.style.transform = `scale(${Math.min(scale, 1)})`;
    }

    function selectMode(mode) {
      currentMode = mode;
      const aiCard = document.getElementById('ai-card');
      const normalCard = document.getElementById('normal-card');
      const ctaIcon = document.getElementById('cta-icon');
      const ctaText = document.getElementById('cta-text');

      if (mode === 'ai') {
        aiCard.style.borderColor = '#18324C';
        normalCard.classList.remove('selected');
        ctaIcon.innerText = currentMethod === 'voice' ? 'mic' : 'chat_bubble';
        ctaText.innerText = currentMethod === 'voice' ? '音声で注文を始める' : 'チャットで注文を始める';
      } else {
        normalCard.classList.add('selected');
        aiCard.style.borderColor = '#E2DDD4';
        ctaIcon.innerText = 'restaurant_menu';
        ctaText.innerText = '通常注文で開始';
      }
    }

    function selectMethod(method, event) {
      event.stopPropagation();
      currentMethod = method;
      selectMode('ai');
      document.getElementById('voice-btn').classList.toggle('active', method === 'voice');
      document.getElementById('chat-btn').classList.toggle('active', method === 'chat');
    }

    function setGuest(type, val) {
      if (type === 'adult') {
        adultCount = val;
        const btns = document.getElementById('adultBtns').querySelectorAll('.num-btn');
        btns.forEach((b, i) => {
          const isActive = (i < 4 && (i + 1) === val) || (i === 4 && val >= 5);
          b.classList.toggle('active', isActive);
          if (i === 4) b.textContent = val >= 5 ? val + '+' : '5+';
        });
      } else {
        childCount = val;
        const btns = document.getElementById('childBtns').querySelectorAll('.num-btn');
        btns.forEach((b, i) => {
          const isActive = (i < 4 && i === val) || (i === 4 && val >= 4);
          b.classList.toggle('active', isActive);
          if (i === 4) b.textContent = val >= 4 ? val + '+' : '4+';
        });
      }
    }

    function setVisit(val) {
      visitFrequency = val;
      document.getElementById('visit-1st').classList.toggle('active', val === 1);
      document.getElementById('visit-2nd').classList.toggle('active', val === 2);
    }

    function openGuestModal(type) {
      activeModalType = type;
      const modal = document.getElementById('guestModal');
      const title = document.getElementById('modalTitle');
      const input = document.getElementById('guestInput');
      
      title.innerText = type === 'adult' ? '大人数の入力 (大人)' : '大人数の入力 (子供)';
      input.value = type === 'adult' ? (adultCount >= 5 ? adultCount : 5) : (childCount >= 4 ? childCount : 4);
      
      modal.style.display = 'flex';
      setTimeout(() => input.focus(), 100);
    }

    function closeGuestModal() {
      document.getElementById('guestModal').style.display = 'none';
    }

    function confirmGuestModal() {
      const val = parseInt(document.getElementById('guestInput').value, 10);
      if (!isNaN(val) && val > 0) {
        setGuest(activeModalType, val);
        closeGuestModal();
      }
    }

    const langFlags = { '日本語': '🇯🇵', 'English': '🇺🇸', '한국어': '🇰🇷', '中文': '🇨🇳' };
    let currentLang = '日本語';

    function selectLang(btn, event) {
      if (event) event.stopPropagation();
      if (btn.disabled || btn.classList.contains('disabled')) return;
      document.querySelectorAll('.lang-card').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const lang = btn.dataset.lang;
      currentLang = lang;
      const badge = document.getElementById('cta-lang-badge');
      if (badge) badge.textContent = (langFlags[lang] || '') + ' ' + lang;
      selectMode('ai');
    }

    function startOrder() {
      const isAI = currentMode === 'ai';
      const session = {
        tables: JSON.parse(localStorage.getItem('selectedTables') || '[]'),
        adults: adultCount,
        children: childCount,
        visitFrequency: visitFrequency === 1 ? '1st' : '2nd+',
        totalGuests: adultCount + childCount,
        language: currentLang,
        orderMode: isAI ? 'ai' : 'manual',
        aiMethod: currentMethod,
        terminal: localStorage.getItem('terminalId') || 'iPad-03',
        reception: localStorage.getItem('receptionNo') || '0042',
        startedAt: new Date().toISOString()
      };
      localStorage.setItem('currentSession', JSON.stringify(session));
      if (isAI) {
        sessionStorage.setItem('showAiWelcome', 'yes');
        window.location.href = 'menu_ai.html';
      } else {
        window.location.href = 'menu_ai.html';
      }
    }
    (function initContext() {
      fitFrame();
      const update = () => {
        const now = new Date();
        const y = now.getFullYear();
        const mo = String(now.getMonth() + 1).padStart(2, '0');
        const da = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const dateEl = document.getElementById('ctxDate');
        if (dateEl) dateEl.innerText = `${y}/${mo}/${da} ${hh}:${mm}`;
        
        const tables = JSON.parse(localStorage.getItem('selectedTables') || '[]');
        const tableEl = document.getElementById('ctxTable');
        if (tableEl && tables.length > 0) tableEl.innerText = tables.join(', ');
        
        const termEl = document.getElementById('ctxTerminal');
        if (termEl) termEl.innerText = localStorage.getItem('terminalId') || 'iPad-03';
        
        const recepEl = document.getElementById('ctxReception');
        if (recepEl) recepEl.innerText = '#' + (localStorage.getItem('receptionNo') || '0042');
      };
      update();
      setInterval(update, 1000);
    })();
    window.addEventListener('resize', fitFrame);
  </script>
</body>

</html>
