<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – AI Dessert Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #F9F8F2;
            --card-bg: #ffffff;
            --footer-bg: #EAE8E2;
            --border: #e0dcd4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: #EAE8E2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            position: relative;
        }

        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .context-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .context-value {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .context-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
        }

        .context-date {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
        }

        .ai-banner {
            background: #EAE8E2;
            padding: 0 20px;
            height: 52px;
            display: none;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            z-index: 100;
            margin-bottom: 8px;
        }


        .banner-speaker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(51, 51, 51, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .banner-speaker::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1.5px solid rgba(51, 51, 51, 0.18);
            animation: spk-pulse 2.2s ease-out infinite;
        }

        .banner-speaker svg {
            width: 20px;
            height: 20px;
            fill: #333333;
        }

        @keyframes spk-pulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        .banner-staff {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .banner-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .banner-staff-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(51, 51, 51, 0.12);
            display: block;
        }

        .banner-avatar-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7ecb8f;
            border: 2px solid var(--bg);
            animation: dot-blink 1.4s ease-in-out infinite;
        }

        @keyframes dot-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        .banner-staff-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .banner-staff-name {
            font-size: 15px;
            font-weight: 700;
            color: #333333;
            line-height: 1;
        }

        .banner-staff-label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(51, 51, 51, 0.48);
            letter-spacing: 0.03em;
        }

        .banner-divider {
            width: 1px;
            height: 26px;
            background: rgba(51, 51, 51, 0.14);
            flex-shrink: 0;
        }

        .banner-ticker {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .ticker-text {
            font-size: 16px;
            font-weight: 500;
            color: #333333;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .ticker-text.fading {
            opacity: 0;
        }

        .ticker-text.streaming::after {
            content: '▋';
            display: inline-block;
            font-size: 13px;
            margin-left: 2px;
            vertical-align: middle;
            animation: cur-blink 0.6s step-end infinite;
        }

        @keyframes cur-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .category-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 20px 12px;
            flex-shrink: 0;
            background: #EAE8E2;
        }

        .cat-tab {
            padding: 7px 22px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #666;
            background: transparent;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .cat-tab:hover {
            color: var(--primary);
        }

        .cat-tab.active {
            background: #333333;
            color: #fff;
            border-color: #333333;
        }

        .section-label {
            display: none;
        }

        .section-label.visible {
            display: none;
        }

        .section-label-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label-badge {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.04em;
        }

        .section-label-text {
            font-size: 13px;
            font-weight: 600;
            color: #888;
        }

        .menu-grid-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 12px 28px 20px;
        }

        .menu-grid-wrapper::-webkit-scrollbar {
            width: 4px;
        }

        .menu-grid-wrapper::-webkit-scrollbar-thumb {
            background: #d0ccc4;
            border-radius: 4px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .menu-card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1.5px solid var(--border);
            transition: 0.18s, opacity 0.6s, filter 0.6s;
        }

        .menu-card.blurring {
            opacity: 0.18;
            filter: blur(3px);
        }

        .menu-card.revealed {
            animation: card-pop 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes card-pop {
            from {
                opacity: 0.18;
                filter: blur(3px);
                transform: translateY(10px) scale(0.97);
            }

            to {
                opacity: 1;
                filter: blur(0px);
                transform: translateY(0) scale(1);
            }
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.1);
        }

        .menu-card-img-wrap {
            position: relative;
            width: 100%;
            padding-top: 72%;
            overflow: hidden;
        }

        .menu-card-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #f5f3ef;
        }

        .ai-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(20, 28, 20, 0.78) 0%, rgba(20, 28, 20, 0) 100%);
            color: #fff;
            font-size: 11.5px;
            font-weight: 600;
            padding: 22px 10px 9px;
            display: flex;
            align-items: flex-end;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.4s 0.2s;
        }

        .menu-card.revealed .ai-badge {
            opacity: 1;
        }

        .ai-badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #7ecb8f;
            flex-shrink: 0;
            margin-bottom: 2px;
            animation: dot-blink 1.4s infinite;
        }

        .menu-card-body {
            padding: 11px 13px 13px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .menu-card-name {
            font-size: 14px;
            font-weight: 700;
            color: #2e3335;
            margin-bottom: 6px;
        }

        .menu-card-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 10px;
            flex: 1;
        }

        .menu-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-card-price {
            font-size: 18px;
            font-weight: 700;
        }

        .menu-card-price::before {
            content: '¥';
            font-size: 12px;
            margin-right: 1px;
        }

        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #fff;
            color: #2e3335;
            border: 1.5px solid #d0ccc6;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        .add-btn:hover {
            border-color: var(--primary);
            background: #f5f3ef;
        }

        .bottom-nav {
            display: flex;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 10px 0 20px;
            width: 100%;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #888;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-icon-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cart-count-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: #d92d20;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            line-height: 18px;
            text-align: center;
            box-shadow: 0 3px 8px rgba(217, 45, 32, 0.28);
            display: none;
        }

        .cart-count-badge.show {
            display: block;
        }

        .voice-guide-container {
            position: absolute;
            bottom: 86px;
            right: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 150;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
        }

        .voice-guide-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .voice-order-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 6px 24px rgba(45, 58, 46, 0.38);
            transition: 0.15s;
        }

        .voice-order-btn::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.28);
            pointer-events: none;
        }

        .voice-order-btn::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(45, 58, 46, 0.28);
            animation: voice-pulse 2.2s ease-out infinite;
        }

        @keyframes voice-pulse {
            0% {
                transform: scale(1);
                opacity: 0.55;
            }

            100% {
                transform: scale(1.45);
                opacity: 0;
            }
        }

        .voice-order-btn svg {
            width: 36px;
            height: 36px;
            fill: rgba(255, 255, 255, 0.88);
        }

        .voice-order-text {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.82);
            letter-spacing: 0.06em;
            line-height: 1.25;
            text-align: center;
        }

        .chat-switch-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid #d8d4cc;
            background: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            transition: 0.15s;
        }

        .chat-switch-link:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: #fff;
        }

        .replay-btn {
            position: absolute;
            top: 62px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(45, 58, 46, 0.08);
            border: 1.5px solid var(--primary);
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            transition: 0.15s;
            z-index: 5;
        }

        .replay-btn:hover {
            background: rgba(45, 58, 46, 0.12);
        }

        /* Cart Alert Message */
        .cart-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(45, 58, 46, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .cart-alert.show {
            opacity: 1;
        }

        /* LowCal filter styles */
        .lowcal-filtered {
            filter: blur(4px) !important;
            opacity: 0.4 !important;
            pointer-events: none !important;
        }

        .lowcal-highlighted {
            transform: scale(1.04) !important;
            border-color: rgba(45, 58, 46, 0.4) !important;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.12) !important;
            z-index: 10 !important;
        }
    </style>
</head>

<body>
    <div class="ipad-frame">
        <div class="ai-banner" id="aiBanner">
            <div class="banner-speaker"><svg viewBox="0 0 24 24">
                    <path
                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                </svg></div>
            <div class="banner-staff">
                <div class="banner-avatar-wrap">
                    <img class="banner-staff-avatar"
                        src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=200&h=200&fit=crop&q=80"
                        alt="さくら">
                    <div class="banner-avatar-dot"></div>
                </div>
                <div class="banner-staff-text">
                    <span class="banner-staff-name">さくら</span>
                    <span class="banner-staff-label">AIスタッフ</span>
                </div>
            </div>
            <div class="banner-divider"></div>
            <div class="banner-ticker"><span class="ticker-text" id="tickerText"></span></div>
        </div>

        <div class="context-bar">
            <div class="context-left">
                <div class="context-item"><span class="context-label">卓番</span><span class="context-value">T-01,
                        T-02</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">端末</span><span
                        class="context-value">iPad-03</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">受付番号</span><span
                        class="context-value">#0042</span></div>
            </div>
            <div class="context-date" id="ctxDate"></div>
        </div>

        <div class="category-tabs">
            <button class="cat-tab" onclick="window.location.href='menu_ai.html'">おすすめ</button>
            <button class="cat-tab">前菜</button>
            <button class="cat-tab">麺類</button>
            <button class="cat-tab">ドリンク</button>
            <button class="cat-tab">サラダ</button>
            <button class="cat-tab active">デザート</button>
        </div>

        <div class="section-label" id="sectionLabel">
            <div class="section-label-inner">
                <span class="section-label-badge">✦ AIがご提案</span>
                <span class="section-label-text">食後にぴったりなデザート 6 選</span>
            </div>
        </div>

        <div class="menu-grid-wrapper">
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="window.location.href='menu_ai.html'"><i
                    class="fa-solid fa-utensils"></i><span>メニュー</span></div>
            <div class="nav-item" onclick="window.location.href='cart.html'">
                <div class="nav-icon-wrap">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-count-badge" id="cartCountBadge">0</span>
                </div>
                <span>カート</span>
            </div>
            <div class="nav-item" onclick="window.location.href='order_status.html'"><i
                    class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></div>
            <div class="nav-item" onclick="window.location.href='chat_ai_en.html'"><i
                    class="fa-solid fa-comment-dots"></i><span>会話</span></div>
            <div class="nav-item"><i class="fa-solid fa-globe"></i><span>English</span></div>
        </div>

        <button class="replay-btn" onclick="runDemo()"><i class="fa-solid fa-rotate-right"></i> デモ再生</button>

        <div class="voice-guide-container" id="voiceGuide">
            <button class="voice-order-btn" id="voiceOrderBtn" onclick="startVoiceInput()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />

                <span class="voice-order-text" id="voiceOrderText">ボイス<br>オーダー</span>
            </button>
            <a class="chat-switch-link" id="chatLink" onclick="window.location.href='chat_ai_en.html'">
                <i class="fa-regular fa-comment-dots"></i>Chat
            </a>
        </div>
    </div>

    <script>
        const CART_COUNT_STORAGE_KEY = 'posSpeakCartCount';
        const dessertItems = [
            { name: 'とろけるフォンダンショコラ', desc: '中から温かいチョコが溢れ出す、至福のひんやりバニラ添える。', price: '980', img: 'https://images.unsplash.com/photo-1541920443744-71cbe00d5855?w=600&q=80', reason: '🍫 濃厚チョコ' },
            { name: '季節のフルーツタルト', desc: '旬のフルーツを贅沢に使った、彩り豊かな自家製タルト。', price: '850', img: 'https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=600&q=80', reason: '🍓 爽やか' },
            { name: '自家製クレームブリュレ', desc: 'パリパリのキャラメリゼと、濃厚なカスタードのハーモニー。', price: '780', img: 'https://images.unsplash.com/photo-1470333841576-5146244844e3?w=600&q=80', reason: '🍮 定番人気' },
            { name: 'とろける杏仁豆腐', desc: '口当たりの良い滑らかな杏仁豆腐。クコの実を添えてサッパリと。', price: '450', img: 'https://images.unsplash.com/photo-1759277513351-3c6aefc0bb0d?auto=format&fit=crop&w=900&q=80', reason: '🍨 さっぱり' },
            { name: '自家製マンゴープリン', desc: '完熟マンゴーをたっぷり使った濃厚な味わい。', price: '520', img: 'https://images.unsplash.com/photo-1767429013015-8ea007ccf002?auto=format&fit=crop&w=900&q=80', reason: '🥭 濃厚な甘み' },
            { name: '和風抹茶アイスパフェ', desc: '厳選された宇治抹茶のアイスと小豆、白玉の華やかなパフェ。', price: '680', img: 'https://images.unsplash.com/photo-1753463813133-6b3fb0d5e303?auto=format&fit=crop&w=900&q=80', reason: '✨ 宇治抹茶使用' }
        ];

        function syncCartBadgeFromStorage() {
            const badge = document.getElementById('cartCountBadge');
            if (!badge) return;
            const storedCount = parseInt(localStorage.getItem(CART_COUNT_STORAGE_KEY) || '0', 10);
            const count = Number.isNaN(storedCount) ? 0 : storedCount;
            badge.textContent = String(count);
            badge.classList.toggle('show', count > 0);
        }

        function incrementCartBadge() {
            const storedCount = parseInt(localStorage.getItem(CART_COUNT_STORAGE_KEY) || '0', 10);
            const nextCount = (Number.isNaN(storedCount) ? 0 : storedCount) + 1;
            localStorage.setItem(CART_COUNT_STORAGE_KEY, String(nextCount));
            const badge = document.getElementById('cartCountBadge');
            if (!badge) return;
            badge.textContent = String(nextCount);
            badge.classList.toggle('show', nextCount > 0);
        }

        function renderCards(items) {
            document.getElementById('menuGrid').innerHTML = items.map((item, i) => `
                <div class="menu-card" id="card${i}" onclick="window.location.href='menu_ai_detail.html'">
                    <div class="menu-card-img-wrap">
                        <img class="menu-card-img" src="${item.img}" alt="${item.name}">
                        ${item.reason ? `<div class="ai-badge"><div class="ai-badge-dot"></div>${item.reason}</div>` : ''}
                    </div>
                    <div class="menu-card-body">
                        <div class="menu-card-name">${item.name}</div>
                        <div class="menu-card-desc">${item.desc}</div>
                        <div class="menu-card-footer">
                            <span class="menu-card-price">${item.price}</span>
                            <button class="add-btn" onclick="event.stopPropagation(); showCartAlert()"><i class="fa-solid fa-cart-shopping"></i>追加</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function streamText(text, delay, pause, onDone) {
            const el = document.getElementById('tickerText');
            el.classList.add('fading');
            setTimeout(() => {
                el.textContent = ''; el.classList.remove('fading'); el.classList.add('streaming');
                let i = 0;
                const tid = setInterval(() => {
                    if (i < text.length) { el.textContent += text[i++]; }
                    else { clearInterval(tid); el.classList.remove('streaming'); if(onDone) setTimeout(onDone, pause); }
                }, delay);
            }, 420);
        }

        function showCartAlert() {
            incrementCartBadge();
            const a = document.createElement('div');
            a.className = 'cart-alert';
            a.textContent = 'カートに追加しました。';
            document.body.appendChild(a);
            setTimeout(() => a.classList.add('show'), 10);
            setTimeout(() => {
                a.classList.remove('show');
                setTimeout(() => a.remove(), 300);
            }, 2000);
        }

        function showVoiceGuide() {
            document.getElementById('voiceGuide').classList.add('show');
        }

        function showUserSpeechBubble(text) {
            // Remove existing bubbles first to prevent duplication
            const existingBubbles = document.querySelectorAll('.user-speech-bubble');
            existingBubbles.forEach(b => b.remove());

            const sub = document.createElement('div');
            sub.className = 'user-speech-bubble';
            sub.styleContent = "position:absolute; bottom:220px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; padding:14px 32px; border-radius:40px; font-weight:700; font-size:18px; z-index:9000; animation: bubble-up 0.4s forwards; box-shadow: 0 10px 40px rgba(0,0,0,0.3);";
            sub.style = sub.styleContent; // Fix potential typo in previous code if any
            sub.textContent = text;
            document.querySelector('.ipad-frame').appendChild(sub);
            if (!document.getElementById('bubble-style')) {
                const s = document.createElement('style'); s.id = 'bubble-style';
                s.innerHTML = "@keyframes bubble-up { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }";
                document.head.appendChild(s);
            }
            setTimeout(() => { sub.style.opacity = '0'; sub.style.transition = 'opacity 0.5s'; setTimeout(() => sub.remove(), 500); }, 3000);
        }

        let voiceStep = 0;

        function startVoiceInput() {
            const btn = document.getElementById('voiceOrderBtn');
            const lbl = document.getElementById('voiceOrderText');
            btn.style.background = '#a0a0a0';
            lbl.innerHTML = '聞き取り中';
            
            if (voiceStep === 0) {
                // Step 1: Order Tart
                setTimeout(() => {
                    btn.style.background = '';
                    lbl.innerHTML = 'ボイス<br>オーダー';
                    showUserSpeechBubble('One seasonal fruit tart, please.');
                    streamText('Certainly. I will add one seasonal fruit tart. Would you like anything else?', 45, 0, () => {
                        showCartAlert();
                        voiceStep = 1; // Move to next step
                    });
                }, 2000);
            } else {
                // Step 2: Finalize
                setTimeout(() => {
                    btn.style.background = '';
                    lbl.innerHTML = 'ボイス<br>オーダー';
                    showUserSpeechBubble("That's all, thank you.");
                    streamText('Understood. I will confirm your order now. Moving to the cart screen.', 45, 2000, () => {
                        window.location.href = 'cart.html?confirm=true';
                    });
                }, 2000);
            }
        }

        window.onload = () => {
            renderCards(dessertItems);
            syncCartBadgeFromStorage();
            // Show AI banner initially
            document.getElementById('aiBanner').style.display = 'flex';
            document.querySelector('.context-bar').style.display = 'none';

            setTimeout(() => {
                document.getElementById('sectionLabel').classList.add('visible');
                streamText('Here are six popular desserts. Please choose your favorite.', 45, 0);
                setTimeout(showVoiceGuide, 1000);
            }, 500);

            setInterval(() => {
                const now = new Date();
                const ctxDate = document.getElementById('ctxDate');
                if (ctxDate) ctxDate.innerText = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            }, 1000);
        };

        function runDemo() { window.location.reload(); }
    </script>
</body>
</html>
