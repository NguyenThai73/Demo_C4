<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – メニュー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #f0ece4;
            --card-bg: #ffffff;
            --footer-bg: #e8e4dc;
            --border: #e0dcd4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            border-radius: 12px;
            position: relative;
        }

        /* ─── HEADER ─────────────────────────────────────────── */
        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left { display: flex; gap: 24px; align-items: center; }
        .context-item { display: flex; align-items: center; gap: 8px; }
        .context-label { color: rgba(255,255,255,0.4); font-weight: 500; }
        .context-value { font-weight: 700; letter-spacing: 0.02em; }
        .context-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
        .context-date { color: rgba(255,255,255,0.35); font-size: 12px; }

        /* ─── CATEGORY TABS ──────────────────────────────────── */
        .category-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 20px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .cat-tab { padding: 7px 22px; border-radius: 20px; font-size: 13px; font-weight: 700; color: #666; background: transparent; border: 1.5px solid transparent; cursor: pointer; transition: 0.2s; }
        .cat-tab:hover { color: var(--primary); }
        .cat-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* ─── MENU GRID ──────────────────────────────────────── */
        .menu-grid-wrapper { flex: 1; overflow-y: auto; padding: 12px 28px 20px; }
        .menu-grid-wrapper::-webkit-scrollbar { width: 4px; }
        .menu-grid-wrapper::-webkit-scrollbar-thumb { background: #d0ccc4; border-radius: 4px; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }

        .menu-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; display: flex; flex-direction: column; border: 1.5px solid var(--border); transition: 0.18s; animation: card-in 0.4s cubic-bezier(0.22,1,0.36,1) both; }
        .menu-card:hover { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(0,0,0,0.1); }

        @keyframes card-in { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: none; } }

        .menu-card-img-wrap { position: relative; width: 100%; padding-top: 72%; overflow: hidden; }
        .menu-card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #f5f3ef; }

        .menu-card-body { padding: 11px 13px 13px; flex: 1; display: flex; flex-direction: column; }
        .menu-card-name { font-size: 14px; font-weight: 700; color: #2e3335; margin-bottom: 6px; }
        .menu-card-desc { font-size: 11px; color: #888; line-height: 1.5; margin-bottom: 10px; flex: 1; }
        .menu-card-footer { display: flex; align-items: center; justify-content: space-between; }
        .menu-card-price { font-size: 18px; font-weight: 700; }
        .menu-card-price::before { content: '¥'; font-size: 12px; margin-right: 1px; }

        .add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: #fff; color: #2e3335; border: 1.5px solid #d0ccc6; border-radius: 9999px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.15s; }
        .add-btn:hover { border-color: var(--primary); background: #f5f3ef; }

        /* ─── BOTTOM NAV ─────────────────────────────────────── */
        .bottom-nav { display: flex; background: var(--footer-bg); border-top: 1px solid var(--border); padding: 10px 0 20px; width: 100%; flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #888; font-size: 11px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }

        .quick-actions {
            position: absolute;
            right: 28px;
            bottom: 88px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 30;
        }

        .quick-action-btn {
            min-width: 162px;
            height: 50px;
            border-radius: 999px;
            border: 1.5px solid rgba(45, 58, 46, 0.14);
            background: rgba(255, 255, 255, 0.96);
            color: var(--primary);
            font-family: inherit;
            font-size: 13px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
            transition: 0.18s;
        }

        .quick-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
            border-color: rgba(45, 58, 46, 0.28);
        }

        .quick-action-btn.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .quick-action-btn i {
            font-size: 18px;
        }

        .quick-action-btn.staff-ai-btn {
            justify-content: flex-start;
            padding: 0 18px 0 12px;
            gap: 12px;
        }

        .quick-action-avatar-wrap {
            position: relative;
            width: 34px;
            height: 34px;
            flex-shrink: 0;
        }

        .quick-action-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.32);
            display: block;
        }

        .quick-action-avatar-dot {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7ecb8f;
            border: 2px solid var(--primary);
        }

        .consult-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.42);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .consult-modal {
            width: 520px;
            background: #fff;
            border-radius: 28px;
            padding: 28px 24px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
            animation: modal-up 0.25s ease-out;
        }

        @keyframes modal-up {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .consult-title {
            font-size: 22px;
            font-weight: 900;
            color: #1f2937;
            text-align: center;
            margin-bottom: 8px;
        }

        .consult-subtitle {
            font-size: 13px;
            font-weight: 600;
            color: #7b7b7b;
            text-align: center;
            margin-bottom: 20px;
        }

        .consult-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .consult-option {
            border: 2px solid #e8e2d9;
            background: #f8f5ef;
            border-radius: 20px;
            padding: 22px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.18s;
            font-family: inherit;
        }

        .consult-option:hover {
            border-color: var(--primary);
            background: #fff;
            transform: translateY(-2px);
        }

        .consult-option i {
            font-size: 28px;
            color: var(--primary);
        }

        .consult-option-title {
            font-size: 18px;
            font-weight: 900;
            color: #2e3335;
        }

        .consult-option-sub {
            font-size: 11px;
            font-weight: 600;
            color: #8a8a8a;
        }

        .staff-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .staff-modal {
            width: 720px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modal-up 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .staff-modal-header {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .staff-modal-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: #1a365d;
        }

        .staff-modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f5f9;
            border: none;
            color: #64748b;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-modal-options {
            padding: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .staff-option-card {
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .staff-option-card:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .staff-option-card.selected {
            border-color: #3b82f6;
            background: #eff6ff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        .staff-option-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .staff-option-label {
            font-size: 15px;
            font-weight: 700;
            color: #334155;
        }

        .staff-modal-footer {
            padding: 0 32px 32px;
            text-align: center;
        }

        .staff-modal-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .call-staff-confirm-btn {
            width: 100%;
            height: 64px;
            background: #f87171;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(248, 113, 113, 0.3);
            transition: all 0.2s;
        }

        .call-staff-confirm-btn:hover {
            background: #ef4444;
            transform: translateY(-2px);
        }

        .cart-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 54, 93, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            z-index: 3000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
        }

        .cart-alert.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="ipad-frame">

        <!-- Header: table info only -->
        <div class="context-bar">
            <div class="context-left">
                <div class="context-item">
                    <span class="context-label">卓番</span>
                    <span class="context-value" id="tableNo">T-01, T-02</span>
                </div>
                <div class="context-divider"></div>
                <div class="context-item">
                    <span class="context-label">端末</span>
                    <span class="context-value" id="terminalNo">iPad-03</span>
                </div>
                <div class="context-divider"></div>
                <div class="context-item">
                    <span class="context-label">受付番号</span>
                    <span class="context-value" id="receiptNo">#0042</span>
                </div>
            </div>
            <div class="context-date" id="ctxDate"></div>
        </div>

        <!-- Category tabs -->
        <div class="category-tabs">
            <button class="cat-tab active">おすすめ</button>
            <button class="cat-tab">前菜</button>
            <button class="cat-tab">麺類</button>
            <button class="cat-tab">ドリンク</button>
            <button class="cat-tab">サラダ</button>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid-wrapper">
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <div class="quick-actions">
            <button class="quick-action-btn primary staff-ai-btn" onclick="openConsultModal()">
                <span class="quick-action-avatar-wrap">
                    <img class="quick-action-avatar"
                        src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=200&h=200&fit=crop&q=80"
                        alt="さくら">
                    <span class="quick-action-avatar-dot"></span>
                </span>
                <span>さくらAIスタッフに相談</span>
            </button>
            <button class="quick-action-btn" onclick="openStaffModal()">
                <i class="fa-solid fa-bell"></i>店員を呼ぶ
            </button>
        </div>

        <!-- Bottom Nav -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="window.location.reload()"><i class="fa-solid fa-utensils"></i><span>メニュー</span></div>
            <div class="nav-item" onclick="window.location.href='cart.html'"><i class="fa-solid fa-cart-shopping"></i><span>カート</span></div>
            <div class="nav-item" onclick="window.location.href='order_status.html'"><i class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></div>
            <div class="nav-item" onclick="window.location.href='chat_ai.html'"><i class="fa-solid fa-comment-dots"></i><span>会話</span></div>
            <div class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></div>
        </div>

        <div class="consult-modal-overlay" id="consultModal">
            <div class="consult-modal">
                <div class="consult-title">AIに相談</div>
                <div class="consult-subtitle">注文方法を選択してください</div>
                <div class="consult-options">
                    <button class="consult-option" onclick="window.location.href='menu_ai_chat.html'">
                        <i class="fa-regular fa-comment-dots"></i>
                        <div class="consult-option-title">入力オーダー</div>
                        <div class="consult-option-sub">Chat Mode</div>
                    </button>
                    <button class="consult-option" onclick="window.location.href='menu_ai.html'">
                        <i class="fa-solid fa-microphone"></i>
                        <div class="consult-option-title">ボイスオーダー</div>
                        <div class="consult-option-sub">Voice Mode</div>
                    </button>
                </div>
            </div>
        </div>

        <div class="staff-modal-overlay" id="staffModalOverlay">
            <div class="staff-modal">
                <div class="staff-modal-header">
                    <div class="staff-modal-title">
                        <span style="font-size: 24px;">🤖</span> 何かお手伝いできることはありますか？
                    </div>
                    <button class="staff-modal-close" onclick="closeStaffModal()">&times;</button>
                </div>
                <div class="staff-modal-options">
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-droplet" style="color: #3b82f6;"></i></div>
                        <div class="staff-option-label">水を追加</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-restroom" style="color: #3b82f6;"></i></div>
                        <div class="staff-option-label">トイレの場所</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-utensils" style="color: #94a3b8;"></i></div>
                        <div class="staff-option-label">お皿を片付ける</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-circle-question" style="color: #ef4444;"></i></div>
                        <div class="staff-option-label">その他ご質問</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-baby" style="color: #f59e0b;"></i></div>
                        <div class="staff-option-label">子ども用食器</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-chair" style="color: #845ef7;"></i></div>
                        <div class="staff-option-label">ベビーチェア</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-hand-holding-heart" style="color: #ec4899;"></i></div>
                        <div class="staff-option-label">箸・フォークを追加</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-soap" style="color: #10b981;"></i></div>
                        <div class="staff-option-label">テーブルの清掃</div>
                    </div>
                </div>
                <div class="staff-modal-footer">
                    <div class="staff-modal-hint">複数選択できます。選択後、下のボタンでスタッフを呼び出します。</div>
                    <button class="call-staff-confirm-btn" onclick="confirmStaffCall()">
                        <i class="fa-solid fa-bell"></i> スタッフ呼び出し
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const menuItems = [
            { name: '牛カルビ焼き',        desc: '厳選和牛カルビをじっくり炭火で焼き上げた看板メニュー',         price: '1680', img: 'https://images.unsplash.com/photo-1529694157872-4e0c0f3b238b?w=600&q=80' },
            { name: '海鮮天ぷら盛り合わせ', desc: 'エビ・イカ・白身魚の揚げたて天ぷら。サクサク食感',             price: '1380', img: 'https://images.unsplash.com/photo-1514190051997-0f6f39ca5cde?w=600&q=80' },
            { name: '特製ラーメン',         desc: '12時間煮込んだ濃厚とんこつスープ。自家製麺使用',               price: '980',  img: 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=600&q=80' },
            { name: '鶏の唐揚げ定食',       desc: '国産鶏もも肉をサクジュワに揚げた人気定食。ご飯大盛り無料',     price: '1080', img: 'https://images.unsplash.com/photo-1562802378-063ec186a863?w=600&q=80' },
            { name: '季節の刺身盛り',       desc: '市場直送の鮮魚を職人が丁寧に盛り付け。本日のおすすめ',         price: '1580', img: 'https://images.unsplash.com/photo-1534482421-64566f976cfa?w=600&q=80' },
            { name: 'マルゲリータピザ',     desc: '石窯焼きのもちもち生地にフレッシュトマトとモッツァレラ',       price: '1280', img: 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=600&q=80' },
        ];

        function renderCards() {
            document.getElementById('menuGrid').innerHTML = menuItems.map((item, i) => `
                <div class="menu-card" style="animation-delay:${i * 60}ms" onclick="handleCardClick(this)">
                    <div class="menu-card-img-wrap">
                        <img class="menu-card-img" src="${item.img}" alt="${item.name}">
                    </div>
                    <div class="menu-card-body">
                        <div class="menu-card-name">${item.name}</div>
                        <div class="menu-card-desc">${item.desc}</div>
                        <div class="menu-card-footer">
                            <span class="menu-card-price">${item.price}</span>
                            <button class="add-btn" onclick="event.stopPropagation();">
                                <i class="fa-solid fa-cart-shopping"></i>追加
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleCardClick(card) {
            card.style.transform = 'scale(0.97)';
            setTimeout(() => { card.style.transform = ''; }, 120);
        }

        function openConsultModal() {
            const modal = document.getElementById('consultModal');
            if (modal) modal.style.display = 'flex';
        }

        function closeConsultModal() {
            const modal = document.getElementById('consultModal');
            if (modal) modal.style.display = 'none';
        }

        function openStaffModal() {
            const modal = document.getElementById('staffModalOverlay');
            if (modal) {
                modal.style.display = 'flex';
                document.querySelectorAll('.staff-option-card').forEach(c => c.classList.remove('selected'));
            }
        }

        function closeStaffModal() {
            const modal = document.getElementById('staffModalOverlay');
            if (modal) modal.style.display = 'none';
        }

        function toggleStaffOption(el) {
            el.classList.toggle('selected');
        }

        function confirmStaffCall() {
            const selectedCount = document.querySelectorAll('.staff-option-card.selected').length;
            if (selectedCount === 0) {
                alert('ご希望の項目を選択してください。');
                return;
            }

            closeStaffModal();

            const alertBox = document.createElement('div');
            alertBox.className = 'cart-alert';
            alertBox.innerHTML = 'ありがとうございます。<br>少々お待ちください、店員が伺います。';
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.classList.add('show'), 10);
            setTimeout(() => {
                alertBox.classList.remove('show');
                setTimeout(() => alertBox.remove(), 300);
            }, 3000);
        }

        function updateClock() {
            const now = new Date();
            const p = n => String(n).padStart(2, '0');
            document.getElementById('ctxDate').innerText =
                `${now.getFullYear()}/${p(now.getMonth()+1)}/${p(now.getDate())} ${p(now.getHours())}:${p(now.getMinutes())}`;
        }

        window.onload = () => {
            renderCards();
            updateClock();
            setInterval(updateClock, 1000);

            const consultModal = document.getElementById('consultModal');
            if (consultModal) {
                consultModal.addEventListener('click', (event) => {
                    if (event.target === consultModal) closeConsultModal();
                });
            }

            const staffModal = document.getElementById('staffModalOverlay');
            if (staffModal) {
                staffModal.addEventListener('click', (event) => {
                    if (event.target === staffModal) closeStaffModal();
                });
            }

            try {
                const s = JSON.parse(localStorage.getItem('currentSession') || '{}');
                if (s.tableNo)    document.getElementById('tableNo').innerText    = s.tableNo;
                if (s.terminalNo) document.getElementById('terminalNo').innerText = s.terminalNo;
                if (s.receiptNo)  document.getElementById('receiptNo').innerText  = '#' + String(s.receiptNo).padStart(4, '0');
            } catch(e) {}
        };
    </script>
</body>

</html>
