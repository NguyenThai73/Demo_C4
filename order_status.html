<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – Order Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #f0ece4;
            --card-bg: #ffffff;
            --footer-bg: #e8e4dc;
            --border: #e0dcd4;
            --text-main: #1a1a1a;
            --text-sub: #666;
            --status-green: #22c55e;
            --status-orange: #f59e0b;
            --status-gray: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            border-radius: 12px;
            position: relative;
        }

        /* ─── HEADER: CONTEXT BAR ───────────────────────── */
        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left { display: flex; gap: 24px; align-items: center; }
        .context-item { display: flex; align-items: center; gap: 8px; }
        .context-label { color: rgba(255, 255, 255, 0.4); font-weight: 500; }
        .context-value { font-weight: 700; letter-spacing: 0.02em; }
        .context-divider { width: 1px; height: 20px; background: rgba(255, 255, 255, 0.15); }
        .context-date { color: rgba(255, 255, 255, 0.35); font-size: 12px; }

        /* ─── MAIN CONTENT ────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            padding: 40px 64px;
            gap: 40px;
            overflow: hidden;
        }

        /* Order Tracking List */
        .order-list-container {
            flex: 1.5;
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1.5px solid var(--border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #efefef;
        }
        .section-header h2 { font-size: 20px; font-weight: 800; color: var(--text-main); }
        
        .legend { display: flex; gap: 16px; align-items: center; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #888; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.served { background: var(--status-green); }
        .dot.cooking { background: var(--status-orange); }
        .dot.waiting { background: var(--status-gray); }

        .order-items { flex: 1; overflow-y: auto; padding-right: 8px; }
        .order-items::-webkit-scrollbar { width: 4px; }
        .order-items::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }

        .order-card {
            display: flex;
            align-items: center;
            padding: 20px;
            border-radius: 16px;
            border: 1.5px solid #f5f5f5;
            margin-bottom: 12px;
            transition: 0.2s;
        }
        .order-card:hover { border-color: #ddd; background: #fafafa; }

        .item-icon { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; margin-right: 16px; background: #f9f9f9; }
        .item-info { flex: 1; }
        .item-name { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .item-meta { font-size: 12px; color: #888; font-weight: 500; }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-badge.served { background: #ecfdf5; color: #059669; }
        .status-badge.cooking { background: #fffbeb; color: #d97706; }
        .status-badge.waiting { background: #f9fafb; color: #6b7280; }

        /* Summary Panel */
        .summary-panel {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .summary-card {
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            border: 1.5px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .bill-row { display: flex; justify-content: space-between; align-items: center; }
        .bill-label { font-size: 14px; color: #888; font-weight: 600; }
        .bill-value { font-size: 15px; color: var(--text-main); font-weight: 700; }
        .bill-total { border-top: 1px solid #efefef; padding-top: 20px; margin-top: 10px; }
        .total-label { font-size: 16px; font-weight: 800; }
        .total-price { font-size: 26px; font-weight: 900; color: var(--primary); }
        .total-price::before { content: '¥'; font-size: 16px; margin-right: 2px; }

        .action-btn {
            height: 72px; width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 30px rgba(45, 58, 46, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .action-btn:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 14px 40px rgba(45, 58, 46, 0.3); }
        
        .secondary-btn {
            height: 56px; width: 100%; background: none; border: 2px solid var(--border); color: #888; border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .secondary-btn:hover { border-color: #999; color: #444; }

        /* ─── BOTTOM NAV ──────────────────────────────────── */
        .bottom-nav {
            display: flex;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 12px 0 20px;
            flex-shrink: 0;
            width: 100%;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }

    </style>
</head>
<body>
    <div class="ipad-frame">
        <!-- Context Bar -->
        <div class="context-bar">
            <div class="context-left">
                <div class="context-item"><span class="context-label">卓番</span><span class="context-value">T-01, T-02</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">端末</span><span class="context-value">iPad-03</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">受付番号</span><span class="context-value">#0042</span></div>
            </div>
            <div class="context-date" id="ctxDate">2026/04/02 09:56</div>
        </div>

        <div class="main-content">
            <!-- Left: Order Status List -->
            <div class="order-list-container">
                <div class="section-header">
                    <h2>ご注文状況</h2>
                    <div class="legend">
                        <div class="legend-item"><span class="dot served"></span>提供済</div>
                        <div class="legend-item"><span class="dot cooking"></span>調理中</div>
                        <div class="legend-item"><span class="dot waiting"></span>準備中</div>
                    </div>
                </div>
                <div class="order-items">
                    <div class="order-card">
                        <img class="item-icon" src="https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=120&q=80">
                        <div class="item-info">
                            <div class="item-name">和牛ステーキ 特選</div>
                            <div class="item-meta">10:42 注文受付 ・ ¥2,800</div>
                        </div>
                        <span class="status-badge served">提供済</span>
                    </div>
                    <div class="order-card">
                        <img class="item-icon" src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=120&q=80">
                        <div class="item-info">
                            <div class="item-name">特選 海鮮丼</div>
                            <div class="item-meta">10:42 注文受付 ・ ¥1,980</div>
                        </div>
                        <span class="status-badge cooking">調理中</span>
                    </div>
                    <div class="order-card">
                        <img class="item-icon" src="https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=120&q=80">
                        <div class="item-info">
                            <div class="item-name">季節の天ぷら盛り</div>
                            <div class="item-meta">10:55 注文受付 ・ ¥1,580</div>
                        </div>
                        <span class="status-badge waiting">準備中</span>
                    </div>
                </div>
            </div>

            <!-- Right: Payment Summary -->
            <div class="summary-panel">
                <div class="summary-card">
                    <div class="bill-row">
                        <span class="bill-label">お食事代 (合計3品)</span>
                        <span class="bill-value">¥6,360</span>
                    </div>
                    <div class="bill-row">
                        <span class="bill-label">消費税 (10%)</span>
                        <span class="bill-value">¥636</span>
                    </div>
                    <div class="bill-row bill-total">
                        <span class="total-label">お会計総額</span>
                        <span class="total-price">6,996</span>
                    </div>
                </div>

                <button class="action-btn" onclick="goToPayment()">
                    <i class="fa-solid fa-credit-card"></i>
                    <span>お会計を依頼する</span>
                </button>
                <button class="secondary-btn" onclick="history.back()">メニューに戻る</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item" onclick="history.back()"><i class="fa-solid fa-utensils"></i><span>メニュー</span></button>
            <button class="nav-item" onclick="window.location.href='cart.html'"><i class="fa-solid fa-cart-shopping"></i><span>カート</span></button>
            <button class="nav-item active"><i class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></button>
            <button class="nav-item" onclick="window.location.href='chat_ai.html'"><i class="fa-solid fa-comment-dots"></i><span>AI相談</span></button>
            <button class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></button>
        </div>
    </div>

    <script>
        function goToPayment() {
            if(confirm('お会計に進みます。スタッフを呼び出してもよろしいですか？')) {
                window.location.href = 'payment.html';
            }
        }
        setInterval(() => {
            const now = new Date();
            document.getElementById('ctxDate').innerText = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        }, 1000);
    </script>
</body>
</html>

    <!-- Bottom Navigation outside container for proper positioning -->
    <script>
        // Insert bottom nav into container
        document.querySelector('.container').insertAdjacentHTML('beforeend', `
            <div class="bottom-nav">
                <button class="nav-item" onclick="goToMenu()">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                    メニュー
                </button>
                <button class="nav-item" onclick="window.location.href='cart.html'">
                    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.94-1.7h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.04 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.13 0-.25-.07-.26-.18z"/></svg>
                    <span class="nav-badge">4</span>
                    カート
                </button>
                <button class="nav-item" onclick="window.location.href='chat_ai.html'">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
                    会話履歴
                </button>
                <button class="nav-item active">
                    <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                    注文履歴
                </button>
                <button class="nav-item" onclick="openStaff()">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
                    サポート
                </button>
                <button class="nav-item" onclick="openLang()">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    言語
                </button>
            </div>
        `);

        function goToMenu() {
            const session = JSON.parse(localStorage.getItem('currentSession') || '{}');
            window.location.href = session.orderMode === 'ai' ? 'menu_ai.html' : 'menu.html';
        }

        function openLang() { document.getElementById('langPopup').classList.add('show'); }
        function closeLang() { document.getElementById('langPopup').classList.remove('show'); }
        function openStaff() { document.getElementById('staffPopup').classList.add('show'); }
        function closeStaff() { document.getElementById('staffPopup').classList.remove('show'); }
    </script>
</body>
</html>
