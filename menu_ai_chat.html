<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – Chat Order</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #f0ece4;
            --card-bg: #ffffff;
            --footer-bg: #e8e4dc;
            --border: #e0dcd4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            position: relative;
        }

        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .context-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .context-value {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .context-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
        }

        /* Order Info Header (thay thế AI banner) */
        .order-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: linear-gradient(135deg, #3f5240 0%, #2d3a2e 100%);
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-info-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .order-info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .order-info-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.05em;
        }

        .order-info-value {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .order-info-value.status-active {
            color: #4ade80;
            font-weight: 800;
        }

        .order-info-divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
        }

        .order-info-right {
            display: flex;
            align-items: center;
        }

        .order-total {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .total-label {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        .total-value {
            font-size: 20px;
            font-weight: 900;
            color: #fff;
        }

        .context-date {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
        }

        .ai-banner {
            background: var(--primary);
            padding: 0 20px;
            height: 52px;
            display: none;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            z-index: 100;
        }

        .banner-speaker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.13);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .banner-speaker::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.22);
            animation: spk-pulse 2.2s ease-out infinite;
        }

        .banner-speaker svg { width: 20px; height: 20px; fill: #fff; }

        @keyframes spk-pulse { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.6); opacity: 0; } }

        .banner-staff { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

        .banner-avatar-wrap { position: relative; flex-shrink: 0; }

        .banner-staff-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.28); display: block; }

        .banner-avatar-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; background: #7ecb8f; border: 2px solid var(--primary); animation: dot-blink 1.4s ease-in-out infinite; }

        @keyframes dot-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

        .banner-staff-text { display: flex; flex-direction: column; gap: 1px; }

        .banner-staff-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1; }

        .banner-staff-label { font-size: 10px; font-weight: 500; color: rgba(255, 255, 255, 0.48); letter-spacing: 0.03em; }

        .banner-divider { width: 1px; height: 26px; background: rgba(255, 255, 255, 0.15); flex-shrink: 0; }

        .banner-ticker { flex: 1; display: flex; align-items: center; min-width: 0; }

        .ticker-text { font-size: 16px; font-weight: 500; color: #fff; line-height: 1.5; white-space: pre-wrap; word-break: break-word; opacity: 1; transition: opacity 0.4s ease; }

        .ticker-text.fading { opacity: 0; }

        .ticker-text.streaming::after {
            content: '▋';
            display: inline-block;
            font-size: 13px;
            margin-left: 2px;
            vertical-align: middle;
            animation: cur-blink 0.6s step-end infinite;
        }

        @keyframes cur-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .category-tabs { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 20px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--bg); }

        .cat-tab { padding: 7px 22px; border-radius: 20px; font-size: 13px; font-weight: 700; color: #666; background: transparent; border: 1.5px solid transparent; cursor: pointer; transition: 0.2s; }

        .cat-tab:hover { color: var(--primary); }
        .cat-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .section-label { padding: 14px 32px 6px; flex-shrink: 0; opacity: 0; transform: translateY(6px); transition: 0.5s; }

        .section-label.visible { opacity: 1; transform: translateY(0); }

        .section-label-inner { display: flex; align-items: center; gap: 8px; }

        .section-label-badge { background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.04em; }

        .section-label-text { font-size: 13px; font-weight: 600; color: #888; }

        .menu-grid-wrapper { flex: 1; overflow-y: auto; padding: 12px 28px 20px; }
        .menu-grid-wrapper::-webkit-scrollbar { width: 4px; }
        .menu-grid-wrapper::-webkit-scrollbar-thumb { background: #d0ccc4; border-radius: 4px; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }

        .menu-card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); cursor: pointer; display: flex; flex-direction: column; border: 1.5px solid var(--border); transition: 0.18s, opacity 0.6s, filter 0.6s; }

        .menu-card.blurring { opacity: 0.18; filter: blur(3px); }
        .menu-card.revealed { animation: card-pop 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        @keyframes card-pop { from { opacity: 0.18; filter: blur(3px); transform: translateY(10px) scale(0.97); } to { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); } }

        .menu-card:hover { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(0, 0, 0, 0.1); }

        .menu-card-img-wrap { position: relative; width: 100%; padding-top: 72%; overflow: hidden; }
        .menu-card-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #f5f3ef; }

        .ai-badge { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(20, 28, 20, 0.78) 0%, rgba(20, 28, 20, 0) 100%); color: #fff; font-size: 11.5px; font-weight: 600; padding: 22px 10px 9px; display: flex; align-items: flex-end; gap: 5px; opacity: 0; transition: opacity 0.4s 0.2s; }

        .menu-card.revealed .ai-badge { opacity: 1; }

        .ai-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #7ecb8f; flex-shrink: 0; margin-bottom: 2px; animation: dot-blink 1.4s infinite; }

        .menu-card-body { padding: 11px 13px 13px; flex: 1; display: flex; flex-direction: column; }
        .menu-card-name { font-size: 14px; font-weight: 700; color: #2e3335; margin-bottom: 6px; }
        .menu-card-desc { font-size: 11px; color: #888; line-height: 1.5; margin-bottom: 10px; flex: 1; }
        .menu-card-footer { display: flex; align-items: center; justify-content: space-between; }
        .menu-card-price { font-size: 18px; font-weight: 700; }
        .menu-card-price::before { content: '¥'; font-size: 12px; margin-right: 1px; }

        .add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: #fff; color: #2e3335; border: 1.5px solid #d0ccc6; border-radius: 9999px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.15s; }
        .add-btn:hover { border-color: var(--primary); background: #f5f3ef; }

        .bottom-nav { display: flex; background: var(--footer-bg); border-top: 1px solid var(--border); padding: 10px 0 20px; width: 100%; flex-shrink: 0; }

        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #888; font-size: 11px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }

        .voice-guide-container { position: absolute; bottom: 86px; right: 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; z-index: 150; opacity: 0; transform: translateY(20px); transition: 0.5s; }

        .voice-guide-container.show { opacity: 1; transform: translateY(0); }

        .input-order-btn { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            background: #4f46e5; 
            border: none; 
            cursor: pointer; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
            box-shadow: 0 6px 24px rgba(79, 70, 229, 0.38); 
            transition: all 0.2s; 
        }
        .input-order-btn:hover { 
            transform: scale(1.04); 
            background: #6366f1;
            box-shadow: 0 8px 28px rgba(79, 70, 229, 0.48); 
        }
        .input-order-btn::before { 
            content: ''; 
            position: absolute; 
            inset: 6px; 
            border-radius: 50%; 
            border: 1.5px solid rgba(255, 255, 255, 0.28); 
            pointer-events: none; 
        }
        .input-order-btn::after { 
            content: ''; 
            position: absolute; 
            inset: -8px; 
            border-radius: 50%; 
            border: 2px solid rgba(79, 70, 229, 0.28); 
            animation: input-pulse 2.2s ease-out infinite; 
        }
        @keyframes input-pulse { 
            0% { transform: scale(1); opacity: 0.55; } 
            100% { transform: scale(1.45); opacity: 0; } 
        }
        .input-order-btn i { 
            font-size: 32px; 
            color: rgba(255, 255, 255, 0.95); 
        }
        .input-order-text { 
            font-size: 13px; 
            font-weight: 900; 
            color: #fff; 
            text-align: center; 
            line-height: 1.2; 
            letter-spacing: 0.05em; 
        }
        .switch-to-voice-text {
            position: absolute;
            bottom: -24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            color: #666;
            white-space: nowrap;
        }

        .chat-switch-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; padding: 5px 12px; border-radius: 20px; border: 1.5px solid #d8d4cc; background: rgba(255, 255, 255, 0.85); text-decoration: none; transition: 0.15s; }

        .chat-switch-link:hover { color: var(--primary); border-color: var(--primary); background: #fff; }

        .replay-btn { position: absolute; top: 62px; right: 20px; display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: rgba(45, 58, 46, 0.08); border: 1.5px solid var(--primary); border-radius: 9999px; font-size: 12px; font-weight: 700; color: var(--primary); cursor: pointer; transition: 0.15s; z-index: 5; }
    </style>
</head>

<body>
    <div class="ipad-frame">
        <!-- Order Info Header (thay thế AI banner) -->
        <div class="order-info-header">
            <div class="order-info-left">
                <div class="order-info-item">
                    <span class="order-info-label">テーブル</span>
                    <span class="order-info-value">T-01</span>
                </div>
                <div class="order-info-divider"></div>
                <div class="order-info-item">
                    <span class="order-info-label">人数</span>
                    <span class="order-info-value">4名</span>
                </div>
                <div class="order-info-divider"></div>
                <div class="order-info-item">
                    <span class="order-info-label">注文番号</span>
                    <span class="order-info-value">#ORD-0042</span>
                </div>
                <div class="order-info-divider"></div>
                <div class="order-info-item">
                    <span class="order-info-label">ステータス</span>
                    <span class="order-info-value status-active">注文受付中</span>
                </div>
            </div>
            <div class="order-info-right">
                <div class="order-total">
                    <span class="total-label">合計金額</span>
                    <span class="total-value">¥ 12,800</span>
                </div>
            </div>
        </div>

        <div class="context-bar">
            <div class="context-left">
                <div class="context-item"><span class="context-label">卓番</span><span class="context-value">T-01, T-02</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">端末</span><span class="context-value">iPad-03</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">受付番号</span><span class="context-value">#0042</span></div>
            </div>
            <div class="context-date" id="ctxDate"></div>
        </div>

        <div class="category-tabs">
            <button class="cat-tab active">おすすめ</button>
            <button class="cat-tab">前菜</button>
            <button class="cat-tab">麺類</button>
            <button class="cat-tab">ドリンク</button>
            <button class="cat-tab">サラダ</button>
        </div>

        <div class="section-label" id="sectionLabel">
            <div class="section-label-inner">
                <span class="section-label-badge">✦ AIがご提案</span>
                <span class="section-label-text">本日の暑さにぴったりな涼しいメニュー 6 選</span>
            </div>
        </div>

        <div class="menu-grid-wrapper">
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="window.location.reload()"><i class="fa-solid fa-utensils"></i><span>メニュー</span></div>
            <div class="nav-item" onclick="window.location.href='cart.html'"><i class="fa-solid fa-cart-shopping"></i><span>カート</span></div>
            <div class="nav-item" onclick="window.location.href='order_status.html'"><i class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></div>
            <div class="nav-item" onclick="window.location.href='chat_ai.html'"><i class="fa-solid fa-comment-dots"></i><span>会話</span></div>
            <div class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></div>
        </div>

        <button class="replay-btn" onclick="runDemo()"><i class="fa-solid fa-rotate-right"></i> デモ再生</button>

        <div class="voice-guide-container" id="voiceGuide">
            <button class="input-order-btn" id="inputOrderBtn" onclick="switchToVoiceMode()">
                <i class="fa-solid fa-keyboard"></i>
                <span class="input-order-text" id="inputOrderText">入力オーダー</span>
                <span class="switch-to-voice-text">バイスに切替</span>
            </button>
            <a class="chat-switch-link" id="chatLink" onclick="window.location.href='chat_ai.html'">
                <i class="fa-regular fa-comment-dots"></i>AIチャットに切替
            </a>
        </div>
    </div>

    <script>
        const regularMenuItems = [
            { name: '牛カルビ焼き', desc: '厳選和牛カルビをじっくり炭火で焼き上げた看板メニュー', price: '1680', img: 'https://images.unsplash.com/photo-1529694157872-4e0c0f3b238b?w=600&q=80' },
            { name: '海鮮天ぷら盛り合わせ', desc: 'エビ・イカ・白身魚の揚げたて天ぷら。サクサク食感', price: '1380', img: 'https://images.unsplash.com/photo-1514190051997-0f6f39ca5cde?w=600&q=80' },
            { name: '特製ラーメン', desc: '12時間煮込んだ濃厚とんこつスープ。自家製麺使用', price: '980', img: 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=600&q=80' },
            { name: '鶏の唐揚げ定食', desc: '国産鶏もも肉をサクジュワに揚げた人気定食。ご飯大盛り無料', price: '1080', img: 'https://images.unsplash.com/photo-1562802378-063ec186a863?w=600&q=80' },
            { name: '季節の刺身盛り', desc: '市場直送の鮮魚を職人が丁寧に盛り付け。本日のおすすめ', price: '1580', img: 'https://images.unsplash.com/photo-1534482421-64566f976cfa?w=600&q=80' },
            { name: 'マルゲリータピザ', desc: '石窯焼きのもちもち生地にフレッシュトマトとモッツァレラ', price: '1280', img: 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=600&q=80' }
        ];

        const coolMenuItems = [
            { name: '冷やしラーメン', desc: '濃厚なゴマだれに冷たい麺。夏の定番の一品', price: '950', img: 'https://images.unsplash.com/photo-1585032226651-759b368d7246?w=400&q=80', reason: '🌡️ 暑い日に体を冷やす' },
            { name: 'レモンソーダ', desc: '国産レモンをたっぷり使った爽やかな炭酸飲料', price: '480', img: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400&q=80', reason: '✨ 今日のNo.1人気ドリンク' },
            { name: '冷製トマトパスタ', desc: 'フレッシュトマトとバジルの冷たいカッペリーニ', price: '1080', img: 'https://images.unsplash.com/photo-1473093226795-af9932fe5856?w=400&q=80', reason: '🍅 さっぱり軽めのランチに' },
            { name: '蒸し鶏サラダ', desc: 'さっぱりポン酢ドレッシングで食欲そそる冷製サラダ', price: '780', img: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=80', reason: '💪 低カロリーで栄養満点' },
            { name: 'グリーンスムージー', desc: '旬のフルーツと野菜をたっぷり使った自家製スムージー', price: '620', img: 'https://images.unsplash.com/photo-1610970881699-44a5587cabec?w=400&q=80', reason: 'Kiwi ビタミン補給に最適' },
            { name: '冷やし中華', desc: 'コシのある細麺に彩り豊かな具材と酸味のきいたタレ', price: '950', img: 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400&q=80', reason: '🔥 辛さで汗を流してスッキリ' }
        ];

        let streamInterval = null;
        let streamTimer = null;
        let headerResetTimer = null;

        function streamText(text, charDelay, pauseAfter, onDone) {
            const el = document.getElementById('tickerText');
            el.classList.add('fading');
            clearInterval(streamInterval);
            clearTimeout(streamTimer);
            setTimeout(() => {
                el.textContent = ''; el.classList.remove('fading'); el.classList.add('streaming');
                let i = 0;
                streamInterval = setInterval(() => {
                    if (i < text.length) { el.textContent += text[i++]; }
                    else {
                        clearInterval(streamInterval); el.classList.remove('streaming');
                        if (onDone) streamTimer = setTimeout(onDone, pauseAfter);
                    }
                }, charDelay);
            }, 420);
        }

        function renderCards(items) {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = items.map((item, i) => `
                <div class="menu-card" id="card${i}" onclick="handleCardClick(this)">
                    <div class="menu-card-img-wrap">
                        <img class="menu-card-img" src="${item.img}" alt="${item.name}">
                        ${item.reason ? `<div class="ai-badge"><div class="ai-badge-dot"></div>${item.reason}</div>` : ''}
                    </div>
                    <div class="menu-card-body">
                        <div class="menu-card-name">${item.name}</div>
                        <div class="menu-card-desc">${item.desc}</div>
                        <div class="menu-card-footer">
                            <span class="menu-card-price">${item.price}</span>
                            <button class="add-btn" onclick="event.stopPropagation();"><i class="fa-solid fa-cart-shopping"></i>追加</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function runDemo() {
            const aiBanner = document.getElementById('aiBanner');
            const contextBar = document.querySelector('.context-bar');
            if (aiBanner) aiBanner.style.display = 'flex';
            if (contextBar) contextBar.style.display = 'none';

            document.getElementById('sectionLabel').classList.remove('visible');
            renderCards(regularMenuItems);

            streamText('ようこそいらっしゃいませ！ 当店へのご来店ありがとうございます。ごゆっくりお楽しみください。', 45, 3000, () => {
                streamText('本日は暑い日が続いておりますね 🌞  体を冷やす爽やかなお料理はいかがでしょうか？ 当店おすすめの涼しいメニューをご紹介いたします！', 45, 3000, () => {
                    document.querySelectorAll('.menu-card').forEach(c => c.classList.add('blurring'));
                    setTimeout(() => {
                        renderCards(coolMenuItems);
                        showVoiceGuide();
                    }, 700);
                });
            });
        }

        function showVoiceGuide() {
            const voiceGuide = document.getElementById('voiceGuide');
            const btn = document.getElementById('voiceOrderBtn');
            const lbl = document.getElementById('voiceOrderText');
            const chatLink = document.getElementById('chatLink');
            if (voiceGuide) {
                if (btn) btn.style.background = '';
                if (lbl) lbl.innerHTML = 'ボイス<br>オーダー';
                if (chatLink) chatLink.style.display = 'inline-flex';
                voiceGuide.classList.add('show');
            }
        }

        function switchToVoiceMode() {
            // Chuyển từ chat order sang voice order (menu_ai.html)
            window.location.href = 'menu_ai.html';
                aiBanner.style.display = 'flex';
                contextBar.style.display = 'none';

                streamText('ありがとうございます！ では、本日の暑さにぴったりな涼やかメニュー 6 品をご紹介します 🍃  お好みの一品をお選びください。', 45, 2000, () => {
                    setTimeout(showVoiceGuide, 1000);

                    // Header Restoration NOW STARTS AFTER AI SPEECH ENDS
                    headerResetTimer = setTimeout(() => {
                        aiBanner.style.display = 'none';
                        contextBar.style.display = 'flex';
                    }, 5000);
                });

                setTimeout(() => document.getElementById('sectionLabel').classList.add('visible'), 700);
                coolMenuItems.forEach((_, i) => {
                    setTimeout(() => {
                        const card = document.getElementById('card' + i);
                        if (card) { card.classList.remove('blurring'); card.classList.add('revealed'); }
                    }, 1200 + (i * 420));
                });
            }, 2000);
        }

        function handleCardClick(card) {
            card.style.transform = 'scale(0.97)';
            setTimeout(() => { card.style.transform = ''; window.location.href = 'menu_ai_detail.html'; }, 120);
        }

        window.onload = () => {
            renderCards(regularMenuItems);
            setTimeout(runDemo, 400);
            setInterval(() => {
                const now = new Date();
                const ctxDate = document.getElementById('ctxDate');
                if (ctxDate) ctxDate.innerText = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            }, 1000);
        };
    </script>
</body>

</html>
