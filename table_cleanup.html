<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – Table Cleanup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --bg: #F9F8F2;
            --footer-bg: #EAE8E2;
            --border: #e0dcd4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ipad-frame {
            width: 1705.72px;
            height: 1144.13px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            position: relative;
            transform-origin: center center;
            will-change: transform;
        }

        .ipad-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 202px;
            background: var(--bg);
            z-index: 0;
        }

        .restaurant-header {
            position: relative;
            width: 100%;
            height: 53px;
            margin: 40px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-size: 44px;
            font-weight: 400;
            line-height: 1;
            color: #333333;
            z-index: 20;
        }

        .restaurant-title {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 220px;
            height: 53px;
        }

        .category-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 829.04px;
            height: 65.82px;
            margin: 36px auto 0;
            gap: 12px;
            padding: 6px 0;
            position: relative;
            z-index: 20;
        }

        .cat-tab {
            width: 152.7px;
            height: 53.19px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 700;
            line-height: 27px;
            font-family: 'Noto Sans JP', sans-serif;
            color: #333333;
            background: transparent;
            border: 1.5px solid transparent;
            white-space: nowrap;
        }

        .cat-tab.active {
            background: #333333;
            color: #fff;
            border-color: #333333;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0 220px;
            background: transparent;
        }

        .cleanup-stage {
            width: 980px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: #333333;
        }

        .cleanup-title {
            font-size: 43.5px;
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 22px;
        }

        .cleanup-copy {
            font-size: 27.49px;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 54px;
        }

        .cleanup-btn {
            width: 475.73px;
            height: 89.13px;
            border-radius: 14px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
        }

        .bottom-nav {
            width: 100%;
            height: 105.47px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 14px 0 18px;
            flex-shrink: 0;
        }

        .bottom-nav-inner {
            width: 829.04px;
            height: 65.82px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            color: #888;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
        }

        .nav-item span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 42.68px;
            height: 13.1px;
            font-size: 13px;
            line-height: 1;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 33.29px; line-height: 1; }
    </style>
</head>
<body>
        <div class="ipad-frame">
        <div class="restaurant-header">
            <div class="restaurant-title">富士屋本店</div>
        </div>

        <div class="category-tabs">
            <button class="cat-tab active">おすすめ</button>
            <button class="cat-tab">前菜</button>
            <button class="cat-tab">麺類</button>
            <button class="cat-tab">ドリンク</button>
            <button class="cat-tab">サラダ</button>
            <button class="cat-tab">デザート</button>
        </div>

        <div class="main-content">
            <div class="cleanup-stage">
                <div class="cleanup-title">片付けを行っています。</div>
                <div class="cleanup-copy">お会計が完了しました。<br>スタッフがテーブルの片付けと準備を進めています。</div>
                <button class="cleanup-btn" onclick="completeCleanup()">片付け完了</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="bottom-nav-inner">
                <button class="nav-item" onclick="window.location.href='menu_ai.html'"><i class="fa-solid fa-utensils"></i><span>メニュー</span></button>
                <button class="nav-item" onclick="window.location.href='cart.html'"><i class="fa-solid fa-cart-shopping"></i><span>カート</span></button>
                <button class="nav-item active" onclick="window.location.href='order_status.html'"><i class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></button>
                <button class="nav-item" onclick="window.location.href='chat_ai.html'"><i class="fa-solid fa-comment-dots"></i><span>会話</span></button>
                <button class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></button>
            </div>
        </div>
    </div>

    <script>
        const FRAME_WIDTH = 1705.72;
        const FRAME_HEIGHT = 1144.13;

        function fitFrame() {
            const frame = document.querySelector('.ipad-frame');
            if (!frame) return;
            const scale = Math.min(window.innerWidth / FRAME_WIDTH, window.innerHeight / FRAME_HEIGHT);
            frame.style.transform = `scale(${Math.min(scale, 1)})`;
        }

        function completeCleanup() {
            window.location.href = 'order.html';
        }

        fitFrame();
        window.addEventListener('resize', fitFrame);
    </script>
</body>
</html>
