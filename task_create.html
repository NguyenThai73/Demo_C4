<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク新規作成 | Silica Link</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="detail-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Specific workflow logic overrides */
        #task-form-content { display: none; margin-top: 20px; }
        .badge-type { font-weight: 800; font-size: 12px; padding: 4px 12px; border: 1px solid; border-radius: 4px; }
        .section-card { margin-bottom: 25px; }
        #movement-info-section { display: none; margin-top: 25px; }
        #dest-shelf-field { display: none; }
        #shipping-carrier-field { display: none; }
        .btn-mini { font-size: 10px; padding: 2px 8px; white-space: nowrap; height: 24px; }
        
        /* Action buttons at top */
        .top-action-bar { padding: 15px 0; display: flex; gap: 10px; border-bottom: 1px solid #e3e7e8; margin-bottom: 20px; }
        .btn-k-cancel { background: white; border: 1px solid #e3e7e8; padding: 8px 20px; border-radius: 4px; font-weight: bold; color: #333; cursor: pointer; }
        .btn-k-save { background: #3498db; border: none; padding: 8px 30px; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; }
    </style>
</head>
<body>

<!-- Kintone Header Bar -->
<div class="kintone-header-top">
    <div class="header-content-inner">
        <div class="header-logo"><span class="k-icon">k</span> kintone</div>
        <div class="header-user">
            <span>✉</span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="User">
                <span>Administrator</span>
                <span style="font-size: 10px;">▼</span>
            </div>
        </div>
    </div>
</div>

<div class="kintone-header-sub">
    <div class="header-content-inner">
        <div class="header-sub-left"><span>☰</span> <span>🏠</span> <span>🔔</span> <span>⭐</span></div>
        <div class="header-sub-right"><span>⚙</span> <span>❓</span><div class="search-container"><input type="text" class="search-input" placeholder="アプリ内検索"><span class="search-icon">🔍</span></div></div>
    </div>
</div>

<div class="kintone-app-title-bar">
    <div class="header-content-inner" style="padding: 12px 10px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="app-icon" style="background-color: #3498db; color: white; padding: 5px; border-radius: 4px; font-size: 14px;">🔄</div>
            <div class="app-title" style="font-weight: bold; font-size: 14px;">入出荷タスク — 新規作成</div>
        </div>
    </div>
</div>

<div class="main-container" style="padding: 20px 10px;">
    <div class="breadcrumb" style="font-size: 12px; color: #3498db; margin-bottom: 10px;">
        🏠 <span>/</span> <a href="tasklist.html" style="color: #3498db; text-decoration: none;">アプリ: 入出荷タスク</a> <span>/</span> 新規作成
    </div>

    <!-- Action Buttons at TOP -->
    <div class="top-action-bar">
        <button class="btn-k-cancel" onclick="location.href='tasklist.html'">キャンセル</button>
        <button class="btn-k-save" id="save-btn-top" style="display: none;" onclick="saveTask()">保存</button>
    </div>

    <div id="flash-message" class="sticky-flash">🎉 タスクを作成しました。</div>

    <!-- Summary Header Card -->
    <div class="summary-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="badge-type" style="background-color: #f5f5f5; color: #9e9e9e; border-color: #e0e0e0;" id="task-type-badge">未選択</div>
            <div style="font-size: 24px; font-weight: bold; color: #bbb;">TASK-NEW</div>
        </div>
        <div class="summary-grid" style="margin-top: 16px;">
            <div class="summary-item">
                <div class="summary-label">ステータス</div>
                <div class="summary-primary-value" style="color: #9e9e9e; font-size: 18px;">作成中</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">作成日</div>
                <div class="summary-value" id="today-date" style="font-size: 15px;">—</div>
            </div>
        </div>
    </div>

    <!-- Next Action Area (Standardized) -->
    <div id="next-action-area" class="next-action-card accent-blue" style="display: none; margin-top: 15px;">
        <div class="next-action-content">
            <span style="font-size: 30px; color: var(--kintone-blue);"><i class="fas fa-lightbulb"></i></span>
            <div>
                次の対応: <span style="color: var(--kintone-blue);">ガイドライン</span><br>
                <span id="guideline-message" style="font-weight: normal; font-size: 12px; color: #666;">—</span>
            </div>
        </div>
    </div>

    <!-- A. Task Type Selection -->
    <div class="section-card" style="margin-top: 25px;">
        <div class="section-title" style="color: var(--kintone-blue); font-size: 15px; font-weight: 800;">
            <span><i class="fas fa-list-check" style="margin-right: 12px;"></i></span> タスク種別選択
        </div>
        <div class="field-grid" style="grid-template-columns: 1fr;">
            <div class="field-item">
                <div class="field-label" style="font-size: 11px; color: #888;">タスク種別 <span style="color: var(--kintone-danger);">*</span></div>
                <select id="task-type" class="field-box" style="width: 300px;" onchange="handleTypeChange()">
                    <option value="">-- 選択してください --</option>
                    <option value="receive">入荷</option>
                    <option value="sample">サンプル出荷</option>
                    <option value="transfer">棚移動</option>
                    <option value="adjust">在庫調整</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Main Form Fields -->
    <div id="task-form-content">
        <!-- B. Basic Info Section -->
        <div class="section-card">
            <div class="section-title" style="color: var(--kintone-blue); font-size: 15px; font-weight: 800;">
                <span><i class="fas fa-info-circle" style="margin-right: 12px;"></i></span> 基本情報
            </div>
            <div class="field-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="field-item">
                    <div class="field-label" style="font-size: 11px; color: #888;">SKU種別 <span style="color: var(--kintone-danger);">*</span></div>
                    <select id="sku-type" class="field-box" style="width: 100%;">
                        <option>商品</option>
                        <option>資材</option>
                    </select>
                </div>
                <div class="field-item">
                    <div class="field-label" style="font-size: 11px; color: #888;">実行期限</div>
                    <input type="date" id="due-date" class="field-box" style="width: 100%;" value="2026-03-27">
                </div>
                <div class="field-item">
                    <div class="field-label" style="font-size: 11px; color: #888;">倉庫 <span style="color: var(--kintone-danger);">*</span></div>
                    <div style="display: flex; gap: 4px;">
                        <select id="warehouse" class="field-box" style="flex: 1;">
                            <option value="">-- 選択 --</option>
                            <option selected>岐阜倉庫</option>
                            <option>東京倉庫</option>
                        </select>
                        <button class="btn-secondary btn-mini" onclick="alert('取得')">取得</button>
                        <button class="btn-secondary btn-mini" onclick="document.getElementById('warehouse').value=''">クリア</button>
                    </div>
                </div>

                <div class="field-item" id="shipping-carrier-field">
                    <div class="field-label" style="font-size: 11px; color: #888;">配送業者 <span style="color: var(--kintone-danger);">*</span></div>
                    <select id="carrier" class="field-box" style="width: 100%;">
                        <option value="">-- 選択してください --</option>
                        <option value="yamato">ヤマト運輸</option>
                        <option value="sagawa">佐川急便</option>
                    </select>
                </div>

                <div class="field-item">
                    <div class="field-label" style="font-size: 11px; color: #888;">担当者 <span style="color: var(--kintone-danger);">*</span></div>
                    <select id="assignee" class="field-box" style="width: 100%;">
                        <option>Administrator</option>
                        <option>Staff A</option>
                        <option>Staff B</option>
                    </select>
                </div>
                <div class="field-item" style="grid-column: span 2;">
                    <div class="field-label" style="font-size: 11px; color: #888;">備考</div>
                    <input type="text" id="memo" class="field-box" style="width: 100%;" placeholder="備考を入力してください">
                </div>
            </div>

            <div id="movement-info-section">
                <div style="font-weight: 800; font-size: 13px; color: #333; margin-top: 20px; margin-bottom: 10px; border-top: 1px solid #eee; padding-top: 15px;">移動情報</div>
                <div class="field-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="field-item">
                        <div class="field-label" style="font-size: 11px; color: #888;">移動元棚 <span style="color: var(--kintone-danger);">*</span></div>
                        <div style="display: flex; gap: 4px;">
                            <input type="text" id="source-shelf" class="field-box" style="flex: 1;" placeholder="棚番を入力">
                            <button class="btn-secondary btn-mini" onclick="alert('取得')">取得</button>
                            <button class="btn-secondary btn-mini" onclick="document.getElementById('source-shelf').value=''">クリア</button>
                        </div>
                    </div>
                    <div class="field-item" id="dest-shelf-field">
                        <div class="field-label" style="font-size: 11px; color: #888;">移動先棚 <span style="color: var(--kintone-danger);">*</span></div>
                        <div style="display: flex; gap: 4px;">
                            <input type="text" id="dest-shelf" class="field-box" style="flex: 1;" placeholder="棚番を入力">
                            <button class="btn-secondary btn-mini" onclick="alert('取得')">取得</button>
                            <button class="btn-secondary btn-mini" onclick="document.getElementById('dest-shelf').value=''">クリア</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- C. Product Details Section (Fully standardized) -->
        <div class="section-card" style="border: 1px solid #ffedcc; background-color: #fffaf0;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="section-title" style="color: #856404; font-weight: 800; font-size: 15px; margin-bottom: 0;">
                    <span><i class="fas fa-boxes-stacked" style="margin-right: 12px;"></i></span>商品明細
                </div>
                <button class="btn-secondary" onclick="addProductRow()" style="font-size: 12px; padding: 6px 14px;">
                    <i class="fas fa-plus" style="margin-right: 6px;"></i>行を追加
                </button>
            </div>
            <table class="k-table">
                <thead>
                    <tr>
                        <th style="width: 150px;">商品SKU <span style="color: var(--kintone-danger);">*</span></th>
                        <th>商品・資材SKU (表示名) <span style="color: var(--kintone-danger);">*</span></th>
                        <th class="col-num" style="width: 100px;">数量 <span style="color: var(--kintone-danger);">*</span></th>
                        <th class="col-mid" style="width: 80px;">単位 <span style="color: var(--kintone-danger);">*</span></th>
                        <th class="col-mid" style="width: 60px;">操作</th>
                    </tr>
                </thead>
                <tbody id="product-tbody">
                    <!-- rows -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 40px; font-size: 12px; color: #999;">© 2026 Silica Link Portal</footer>

<script>
    const TYPE_LABELS = {
        'receive':   { label: '入荷',bg: '#e8f5e9', color: '#2e7d32', border: '#c8e6c9', guide: '商品情報を入力・保存し、モバイル端末でバーコードをスキャンして入庫を完了させてください。' },
        'sample':    { label: 'サンプル出荷', bg: '#fff3e0', color: '#e65100', border: '#ffe0b2', guide: '配送業者を選択し、移動元棚と数量を指定してください。' },
        'transfer':  { label: '棚移動', bg: '#e3f2fd', color: '#1565c0', border: '#bbdefb', guide: '移動元と移動先の棚の両方を詳しく指定してください。' },
        'adjust':    { label: '在庫調整', bg: '#f3e5f5', color: '#7b1fa2', border: '#e1bee7', guide: '実在庫と差異のある商品と正しい棚・数量を入力してください。' },
    };

    let rowCount = 0;

    function handleTypeChange() {
        const val = document.getElementById('task-type').value;
        const taskFormContent = document.getElementById('task-form-content');
        const nextActionArea = document.getElementById('next-action-area');
        const guidelineMessage = document.getElementById('guideline-message');
        const saveBtn = document.getElementById('save-btn-top');
        const badge = document.getElementById('task-type-badge');

        if (val) {
            taskFormContent.style.display = 'block';
            nextActionArea.style.display = 'block';
            saveBtn.style.display = 'block';
            guidelineMessage.textContent = TYPE_LABELS[val].guide;
            document.getElementById('shipping-carrier-field').style.display = (val === 'sample') ? 'block' : 'none';
            document.getElementById('movement-info-section').style.display = (val === 'sample' || val === 'transfer' || val === 'adjust') ? 'block' : 'none';
            document.getElementById('dest-shelf-field').style.display = (val === 'transfer') ? 'block' : 'none';
            const t = TYPE_LABELS[val];
            badge.textContent = t.label; badge.style.backgroundColor = t.bg; badge.style.color = t.color; badge.style.borderColor = t.border;
            if (rowCount === 0) addProductRow('CER-BASE-01', 'セラミック基板用素材 PREMIUM', 1);
        } else {
            taskFormContent.style.display = 'none'; nextActionArea.style.display = 'none'; saveBtn.style.display = 'none';
            badge.textContent = '未選択'; badge.style.backgroundColor = '#f5f5f5'; badge.style.color = '#9e9e9e'; badge.style.borderColor = '#e0e0e0';
        }
    }

    function addProductRow(sku = '', name = '', qty = '') {
        rowCount++; const id = rowCount;
        const row = `
        <tr id="row-${id}">
            <td><input type="text" class="field-box" value="${sku}" style="width: 100%;"></td>
            <td><input type="text" class="field-box" value="${name}" style="width: 100%;"></td>
            <td class="col-num"><input type="number" class="field-box" value="${qty}" style="width: 100%; text-align: right;"></td>
            <td class="col-mid">
                <select class="field-box" style="width: 100%;"><option>箱</option><option>個</option><option>袋</option></select>
            </td>
            <td class="col-mid">
                <button onclick="removeRow(${id})" style="background: none; border: none; color: #c62828; cursor: pointer;"><i class="fas fa-trash-can"></i></button>
            </td>
        </tr>`;
        document.getElementById('product-tbody').insertAdjacentHTML('beforeend', row);
    }
    function removeRow(id) { document.getElementById(`row-${id}`).remove(); }
    function saveTask() { document.getElementById('flash-message').style.display = 'block'; setTimeout(() => { location.href = 'tasklist.html'; }, 1500); }
    window.onload = function() { document.getElementById('today-date').textContent = new Date().toISOString().split('T')[0]; };
</script>
</body>
</html>
