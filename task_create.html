<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク新規作成 | Silica Link</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --k-blue: #3498db;
            --k-bg: #f4f7f9;
            --k-header-navy: #2c3e50;
        }
        body { margin: 0; padding: 0; background-color: var(--k-bg); font-family: sans-serif; }

        /* Kintone Headers */
        .kintone-header-navy { background-color: var(--k-header-navy); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .kintone-header-grey { background-color: #444; color: white; padding: 8px 20px; display: flex; align-items: center; gap: 20px; font-size: 18px; }
        .kintone-app-bar { background-color: white; border-bottom: 1px solid #e3e7e8; padding: 15px 20px; display: flex; align-items: center; gap: 10px; }
        .kintone-breadcrumb-bar { background-color: white; border-bottom: 1px solid #e3e7e8; padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; }

        /* Action Bar */
        .action-bar { padding: 20px; display: flex; gap: 12px; }
        .btn-k-cancel { background: white; border: 1px solid #e3e7e8; border-radius: 4px; padding: 10px 25px; font-weight: bold; cursor: pointer; color: #333; }
        .btn-k-save { background: var(--k-blue); border: none; border-radius: 4px; padding: 10px 40px; font-weight: bold; cursor: pointer; color: white; }

        /* Form Area */
        .main-content { padding: 0 20px 40px 20px; }
        .form-card { background: white; border-radius: 4px; padding: 30px; border: 1px solid #e3e7e8; }
        
        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .field-label { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .field-label span { color: #e74c3c; margin-left: 4px; }
        .field-input { border: 1px solid #e3e7e8; padding: 10px; border-radius: 2px; font-size: 14px; width: 100%; box-sizing: border-box; background: #fff; }
        .field-input:disabled { background: #f5f5f5; color: #999; }
        .field-select { height: 40px; }

        /* Sections */
        .section-title { font-weight: bold; font-size: 14px; margin-top: 30px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        .k-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
        .k-table th { background: #f8f9fa; border: 1px solid #e3e7e8; padding: 10px; text-align: left; color: #666; }
        .k-table td { border: 1px solid #e3e7e8; padding: 10px; background: white; }
        
        #incoming-fields { display: none; margin-top: 30px; }
        #movement-info-section { display: none; margin-top: 30px; }
        #dest-shelf-field { display: none; }
    </style>
</head>
<body>

<!-- Kintone Header Bar (Navy) -->
<div class="kintone-header-navy">
    <div style="font-size: 20px; font-weight: bold;">kintone</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <i class="fas fa-envelope"></i>
        <div style="display: flex; align-items: center; gap: 8px;">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" width="24" style="border-radius: 50%;">
            <span>Administrator</span>
            <i class="fas fa-caret-down"></i>
        </div>
    </div>
</div>

<!-- Kintone Header Bar (Dark Grey) -->
<div class="kintone-header-grey">
    <i class="fas fa-bars"></i>
    <i class="fas fa-home"></i>
    <i class="fas fa-bell"></i>
    <i class="fas fa-star"></i>
    <div style="flex: 1;"></div>
    <i class="fas fa-cog"></i>
    <i class="fas fa-question-circle"></i>
    <div style="background: white; border-radius: 2px; padding: 4px 10px; width: 300px; color: #999; display: flex; justify-content: space-between;">
        <span>アプリ内検索</span> <i class="fas fa-search"></i>
    </div>
</div>

<!-- App Title Bar -->
<div class="kintone-app-bar">
    <div style="background: #2ecc71; color: white; width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px;">
        <i class="fas fa-check-double"></i>
    </div>
    <div style="font-weight: bold; font-size: 18px;">入出荷タスクを確認する</div>
</div>

<!-- Breadcrumb Bar -->
<div class="kintone-breadcrumb-bar">
    <div style="font-size: 12px; color: #3498db; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-home" style="color: #666;"></i>
        <span style="color: #ddd;">|</span>
        <a href="tasklist.html" style="color: #3498db; text-decoration: none;">アプリ: 入出荷タスクを確認する</a>
    </div>
    <div style="color: #bbb; display: flex; gap: 15px;">
        <i class="fas fa-thumbtack"></i>
        <i class="fas fa-info-circle"></i>
    </div>
</div>

<!-- TOP Action Buttons -->
<div class="action-bar">
    <button class="btn-k-cancel" onclick="location.href='tasklist.html'">キャンセル</button>
    <button class="btn-k-save" onclick="saveTask()">保存</button>
</div>

<div class="main-content">
    <div class="form-card">
        <div class="field-grid">
            <!-- Basic Fields per Screenshot -->
            <div class="field-item">
                <div class="field-label">タスクID <span>*</span></div>
                <input type="text" class="field-input" value="(自動入力)" disabled>
            </div>
            <div class="field-item">
                <div class="field-label">数量</div>
                <input type="text" class="field-input" value="0" style="text-align: right;">
            </div>
            
            <div class="field-item">
                <div class="field-label">ステータス <span>*</span></div>
                <select class="field-input field-select" disabled>
                    <option>待機中</option>
                </select>
            </div>
            <div class="field-item">
                <div class="field-label">タスク種別 <span>*</span></div>
                <select id="task-type" class="field-input field-select" onchange="handleTypeChange()">
                    <option value="">-- 選択してください --</option>
                    <option value="receive">入荷</option>
                    <option value="sample">サンプル出荷</option>
                    <option value="transfer">棚移動</option>
                    <option value="adjust">在庫調整</option>
                </select>
            </div>
            
            <div class="field-item">
                <div class="field-label">SKU種別 <span>*</span></div>
                <select id="sku-type" class="field-input field-select">
                    <option value="">-- 選択 --</option>
                    <option>商品</option>
                    <option>資材</option>
                </select>
            </div>
            <div class="field-item">
                <div class="field-label">実行期限</div>
                <input type="date" id="due-date" class="field-input" value="2026-03-27">
            </div>

            <div class="field-item">
                <div class="field-label">倉庫 <span>*</span></div>
                <div style="display: flex; gap: 8px;">
                    <select id="warehouse" class="field-input field-select">
                        <option value="">岐阜倉庫</option>
                        <option>東京倉庫</option>
                    </select>
                    <button class="btn-k-cancel" style="padding: 0 15px; font-size: 11px; white-space: nowrap;">取得</button>
                    <button class="btn-k-cancel" style="padding: 0 15px; font-size: 11px;">クリア</button>
                </div>
            </div>
            <div class="field-item">
                <div class="field-label">担当者 <span>*</span></div>
                <select id="assignee" class="field-input field-select">
                    <option>Administrator</option>
                </select>
            </div>
        </div>

        <div id="movement-info-section">
            <div class="section-title">移動情報</div>
            <div class="field-grid">
                <div class="field-item">
                    <div class="field-label">移動元棚 <span>*</span></div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="source-shelf" class="field-input" placeholder="棚番">
                        <button class="btn-k-cancel" style="padding: 0 15px; font-size: 11px;">取得</button>
                        <button class="btn-k-cancel" style="padding: 0 15px; font-size: 11px;">クリア</button>
                    </div>
                </div>
                <div class="field-item" id="dest-shelf-field">
                    <div class="field-label">移動先棚 <span>*</span></div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="dest-shelf" class="field-input" placeholder="棚番">
                        <button class="btn-k-cancel" style="padding: 0 15px; font-size: 11px;">取得</button>
                        <button class="btn-k-cancel" style="padding: 0 15px; font-size: 11px;">クリア</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">商品明細</div>
        <table class="k-table">
            <thead>
                <tr>
                    <th style="width: 150px;">商品SKU <span>*</span></th>
                    <th>商品・資材SKU (表示名) <span>*</span></th>
                    <th style="width: 100px; text-align: right;">数量 <span>*</span></th>
                    <th style="width: 80px; text-align: center;">単位 <span>*</span></th>
                    <th style="width: 60px; text-align: center;">操作</th>
                </tr>
            </thead>
            <tbody id="product-tbody"></tbody>
        </table>
        <button class="btn-k-cancel" style="margin-top: 15px; width: 100%; border-style: dashed;" onclick="addProductRow()">+ 行を追加</button>

        <div class="section-title">備考</div>
        <textarea id="memo" class="field-input" rows="4" style="height: auto;" placeholder="備考を入力"></textarea>
    </div>
</div>

<script>
    let rowCount = 0;
    function handleTypeChange() {
        const val = document.getElementById('task-type').value;
        const moveSec = document.getElementById('movement-info-section');
        const destField = document.getElementById('dest-shelf-field');
        
        if (val === 'sample' || val === 'transfer' || val === 'adjust') {
            moveSec.style.display = 'block';
            destField.style.display = (val === 'transfer') ? 'block' : 'none';
        } else {
            moveSec.style.display = 'none';
        }
        if (rowCount === 0) addProductRow('CER-BASE-01', 'セラミック基板用素材 PREMIUM', 1);
    }

    function addProductRow(sku = '', name = '', qty = '') {
        rowCount++;
        const id = rowCount;
        const row = `<tr id="row-${id}">
            <td><input type="text" class="field-input" value="${sku}"></td>
            <td><input type="text" class="field-input" value="${name}"></td>
            <td><input type="number" class="field-input" value="${qty}" style="text-align: right;"></td>
            <td><select class="field-input field-select"><option>箱</option><option>個</option></select></td>
            <td style="text-align: center;"><button onclick="document.getElementById('row-${id}').remove()" style="color: #e74c3c; border: none; background: none; cursor: pointer;"><i class="fas fa-trash"></i></button></td>
        </tr>`;
        document.getElementById('product-tbody').insertAdjacentHTML('beforeend', row);
    }

    function saveTask() {
        alert('タスクを保存しました。');
        location.href = 'tasklist.html';
    }
</script>

</body>
</html>
