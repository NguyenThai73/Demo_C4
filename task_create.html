<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タスク作成 | Silica Link</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="silica-style-guide.css">
    <!-- Font Awesome 6.x CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-row { display: grid; grid-template-columns: 200px 1fr; align-items: flex-start; margin-bottom: 20px; gap: 20px; }
        .form-label { font-size: 13px; font-weight: 800; padding-top: 10px; color: #333; }
        .form-label span { color: #e74c3c; margin-left: 5px; }
        .form-input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .form-input:focus { border-color: var(--k-blue); outline: none; box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.1); }
        
        .radio-group { display: flex; gap: 20px; padding-top: 10px; }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        
        .table-action-btn { background: none; border: none; cursor: pointer; color: #999; font-size: 18px; transition: 0.2s; }
        .table-action-btn:hover { color: var(--k-danger); }
        
        .add-row-btn { background: #f8f9fa; border: 1px dashed #ccc; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; margin-top: 10px; color: #666; font-size: 13px; font-weight: bold; }
        .add-row-btn:hover { background: #eee; }

        #incoming-fields { display: none; }
    </style>
</head>
<body>

<!-- Kintone Header Bar -->
<div class="kintone-header-top">
    <div class="header-content-inner">
        <div class="header-logo"><span class="k-icon">k</span> kintone</div>
        <div class="header-user">
            <span>✉</span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="User">
                <span>Administrator</span>
                <span style="font-size: 10px;">▼</span>
            </div>
        </div>
    </div>
</div>

<div class="kintone-header-sub">
    <div class="header-content-inner">
        <div class="header-sub-left"><span>☰</span> <span>🏠</span> <span>🔔</span> <span>⭐</span></div>
        <div class="header-sub-right"><span>⚙</span> <span>❓</span><div class="search-container"><input type="text" class="search-input" placeholder="アプリ内検索"><span class="search-icon">🔍</span></div></div>
    </div>
</div>

<div class="kintone-app-title-bar">
    <div class="header-content-inner" style="padding: 12px 10px;"><div style="display: flex; align-items: center; gap: 10px;"><div class="app-icon" style="background-color: var(--k-blue); color: white; padding: 5px; border-radius: 4px; font-size: 14px;">🔄</div><div class="app-title" style="font-weight: bold; font-size: 14px;">タスク作成</div></div></div>
</div>

<div class="main-container">
    <div class="kintone-action-toolbar" style="margin-bottom: 30px; border: none; box-shadow: none; display: flex; gap: 10px; padding: 0;">
        <button class="btn-k-blue" onclick="saveTask()"><i class="fas fa-save" style="margin-right: 8px;"></i> 保存</button>
        <button class="btn-k-secondary" onclick="location.href='tasklist.html'">キャンセル</button>
    </div>

    <!-- Task Type Selection -->
    <div class="section-card">
        <div class="form-row">
            <div class="form-label">タスク種別<span>*</span></div>
            <div class="radio-group" id="task-type-radios">
                <label class="radio-item"><input type="radio" name="task_type" value="IC" onchange="toggleFields('IC')"> 入荷</label>
                <label class="radio-item"><input type="radio" name="task_type" value="SS" onchange="toggleFields('SS')"> サンプル出荷</label>
                <label class="radio-item"><input type="radio" name="task_type" value="TR" onchange="toggleFields('TR')"> 棚移動</label>
                <label class="radio-item"><input type="radio" name="task_type" value="AD" onchange="toggleFields('AD')"> 在庫調整</label>
            </div>
        </div>
    </div>

    <!-- Conditional Fields for "入荷" -->
    <div id="incoming-fields">
        <div class="section-card">
            <div class="section-title"><span><i class="fas fa-info-circle"></i></span> 入荷タスク概要</div>
            
            <div class="form-row">
                <div class="form-label">SKU種別<span>*</span></div>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="sku_type" value="ITEM" checked> 商品</label>
                    <label class="radio-item"><input type="radio" name="sku_type" value="MAT"> 資材</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">実行期限</div>
                <input type="date" class="form-input" style="max-width: 250px;">
            </div>

            <div class="form-row">
                <div class="form-label">倉庫<span>*</span></div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select class="form-input" style="max-width: 300px;">
                        <option value="">-- 選択してください --</option>
                        <option value="GIFU">岐阜倉庫</option>
                        <option value="TOKYO">東京配送センター</option>
                        <option value="OSAKA">大阪北港倉庫</option>
                    </select>
                    <button class="btn-k-secondary" style="padding: 6px 15px; font-size: 12px;">取得クリア</button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">担当者<span>*</span></div>
                <select class="form-input" style="max-width: 300px;">
                    <option value="">-- 選択してください --</option>
                    <option value="USER1">Administrator</option>
                    <option value="USER2">Staff A</option>
                    <option value="USER3">Staff B</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-label">備考</div>
                <textarea class="form-input" rows="3" placeholder="タスクに関する特記事項を入力してください"></textarea>
            </div>
        </div>

        <div class="section-card" style="border: 1px solid var(--k-border-amber); background-color: var(--k-bg-amber);">
            <div class="section-title" style="color: #856404;"><span><i class="fas fa-boxes-stacked"></i></span> 商品明細</div>
            <table class="k-table" id="item-table">
                <thead>
                    <tr>
                        <th style="min-width: 200px;">商品SKU<span>*</span></th>
                        <th style="min-width: 250px;">商品・資材SKU（表示名）<span>*</span></th>
                        <th style="width: 100px; text-align: right;">数量<span>*</span></th>
                        <th style="width: 80px; text-align: center;">単位<span>*</span></th>
                        <th style="width: 60px; text-align: center;">操作</th>
                    </tr>
                </thead>
                <tbody id="item-tbody">
                    <tr>
                        <td><input type="text" class="form-input" value="CER-BASE-01" style="font-size: 12px;"></td>
                        <td><input type="text" class="form-input" value="セラミック基板用素材 PREMIUM" style="font-size: 12px;"></td>
                        <td><input type="number" class="form-input" value="10" style="text-align: right; font-size: 12px;"></td>
                        <td>
                            <select class="form-input" style="font-size: 12px;">
                                <option value="BOX">箱</option>
                                <option value="PCS">個</option>
                                <option value="PKG">袋</option>
                            </select>
                        </td>
                        <td style="text-align: center;"><button class="table-action-btn" onclick="removeRow(this)"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>
                </tbody>
            </table>
            <button class="add-row-btn" onclick="addNewRow()"><i class="fas fa-plus" style="margin-right: 8px;"></i> 行を追加する</button>
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 40px; font-size: 12px; color: #999;">© 2026 Silica Link Portal. All rights reserved.</footer>

<script>
    function toggleFields(type) {
        const incomingFields = document.getElementById('incoming-fields');
        if (type === 'IC') {
            incomingFields.style.display = 'block';
        } else {
            incomingFields.style.display = 'none';
        }
    }

    function removeRow(btn) {
        const row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
    }

    function addNewRow() {
        const tbody = document.getElementById('item-tbody');
        const newRow = `
            <tr>
                <td><input type="text" class="form-input" placeholder="SKUコードを入力" style="font-size: 12px;"></td>
                <td><input type="text" class="form-input" placeholder="表示名を入力" style="font-size: 12px;"></td>
                <td><input type="number" class="form-input" value="0" style="text-align: right; font-size: 12px;"></td>
                <td>
                    <select class="form-input" style="font-size: 12px;">
                        <option value="BOX">箱</option>
                        <option value="PCS">個</option>
                        <option value="PKG">袋</option>
                    </select>
                </td>
                <td style="text-align: center;"><button class="table-action-btn" onclick="removeRow(this)"><i class="fas fa-trash-alt"></i></button></td>
            </tr>
        `;
        tbody.insertAdjacentHTML('beforeend', newRow);
    }

    function saveTask() {
        alert('タスクを保存しました。');
        location.href = 'tasklist.html';
    }
</script>

</body>
</html>
