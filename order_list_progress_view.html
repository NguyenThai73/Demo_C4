<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注文一覧 | Silica Link</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome 6.x CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .k-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .k-table th { background-color: #f7f9fa; border: 1px solid #e3e7e8; padding: 10px; text-align: left; font-weight: normal; color: #666; }
        .k-table td { border: 1px solid #e3e7e8; padding: 10px; background-color: #fff; }
        .k-table tr:hover td { background-color: #fcfcfc; }
        
        .badge-status {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-shipping { background-color: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
        
        .channel-icon {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 2px;
            margin-right: 5px;
            vertical-align: middle;
        }
        .channel-shopify { background-color: #95bf47; }
        .channel-agency { background-color: #9c27b0; }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding-bottom: 20px;
            font-size: 12px;
            color: #666;
        }
        .page-btn { border: 1px solid #ccc; background-color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
        .page-btn:disabled { color: #ccc; cursor: default; }
    </style>
</head>

<body>

    <div class="kintone-header-top">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="header-logo">
                <div class="k-icon-box">受</div>
                受発注管理システム
            </div>
            <div class="header-user">
                <div class="mail-icon"><i class="fas fa-envelope"></i></div>
                <div style="display: flex; align-items: center; gap: 8px; margin-left: 10px;">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="User">
                    <span>Administrator</span>
                    <span style="font-size: 10px;">▼</span>
                </div>
            </div>
        </div>
    </div>

    <div class="kintone-header-sub">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="header-sub-left">
                <span><i class="fas fa-bars"></i></span>
                <span><i class="fas fa-house" onclick="location.href='index.html'"></i></span>
                <span><i class="fas fa-bell"></i></span>
                <span><i class="fas fa-star"></i></span>
            </div>
            <div class="header-sub-right">
                <span><i class="fas fa-cog"></i></span>
                <span><i class="fas fa-question-circle"></i></span>
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="アプリ内検索">
                    <div class="search-icon-btn"><i class="fas fa-search"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div class="kintone-app-title-bar">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px; justify-content: flex-start;">
            <div class="app-icon-box" style="margin-left: -40px;">🛒</div>
            <div class="app-title">注文一覧を見る</div>
        </div>
    </div>

    <div class="kintone-sub-nav">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="sub-nav-left">
                <i class="fas fa-house" onclick="location.href='index.html'" style="cursor:pointer;"></i>
                <i class="fas fa-chevron-right" style="font-size: 8px;"></i>
                <span style="margin-left: 10px;">アプリ: 注文一覧を見る</span>
            </div>
            <div class="sub-nav-right">
                <i class="fas fa-thumbtack"></i>
                <i class="fas fa-info-circle"></i>
            </div>
        </div>
    </div>

    <div class="kintone-toolbar">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="view-selector">
                <i class="fas fa-table"></i>
                🔥 今月受注
                <i class="fas fa-chevron-down" style="font-size: 10px; margin-left: 10px;"></i>
            </div>
            <div class="toolbar-icon-btn"><i class="fas fa-chart-line"></i></div>
            <div class="toolbar-icon-btn"><i class="fas fa-filter"></i></div>
            <div class="toolbar-icon-btn"><i class="fas fa-arrow-up-9-1"></i></div>

            <div class="toolbar-right">
                <button class="btn-add" onclick="alert('ここでは直接作成できません。')">+</button>
                <div class="toolbar-icon-btn"><i class="fas fa-cog"></i></div>
                <div class="toolbar-icon-btn"><i class="fas fa-ellipsis"></i></div>
            </div>
        </div>
    </div>

    <div class="main-container" style="max-width: 100%; margin: 0; padding: 20px;">
        <div style="margin-top: 20px;">
            <table class="k-table">
                <thead>
                    <tr>
                        <th style="text-align: center; width: 80px;">注文ID</th>
                        <th style="text-align: center; width: 150px;">注文日時</th>
                        <th>チャネル</th>
                        <th style="text-align: center; width: 100px;">顧客区分</th>
                        <th>顧客表示名</th>
                        <th style="text-align: right; width: 100px;">注文金額</th>
                        <th style="text-align: center; width: 120px;">注文ステータス</th>
                        <th style="text-align: right; width: 120px;">出荷済 / 注文数</th>
                        <th style="text-align: center; width: 120px;">配送予定日</th>
                    </tr>
                </thead>
                <tbody id="order-tbody">
                    <tr style="cursor: pointer;" onclick="location.href='order_detail_shopify_309.html'">
                        <td style="text-align: center; color: #3498db; font-weight: bold;">309</td>
                        <td style="text-align: center;" class="current-time">2026-03-27 11:30</td>
                        <td><span class="channel-icon channel-shopify"></span> Shopify（取次店）</td>
                        <td style="text-align: center;">個人客</td>
                        <td>山田 太郎</td>
                        <td style="text-align: right;">18,500</td>
                        <td style="text-align: center;"><span class="badge-status status-shipping">出荷中</span></td>
                        <td style="text-align: right;">0 / 700</td>
                        <td style="text-align: center;">-</td>
                    </tr>
                    <tr style="cursor: pointer;" onclick="location.href='order_detail_shopify_302.html'">
                        <td style="text-align: center; color: #3498db; font-weight: bold;">302</td>
                        <td style="text-align: center;" class="current-time">2026-03-25 10:00</td>
                        <td><span class="channel-icon channel-shopify"></span> Shopify (メイン）</td>
                        <td style="text-align: center;">個人客</td>
                        <td>田中 実</td>
                        <td style="text-align: right;">45,000</td>
                        <td style="text-align: center;"><span class="badge-status status-shipping">出荷中</span></td>
                        <td style="text-align: right;">0 / 700</td>
                        <td style="text-align: center;">-</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" disabled>⏮ 最初</button>
            <button class="page-btn" disabled>◀ 前へ</button>
            <span>ページ <strong>1 / 1</strong> (全 <strong>2</strong> 件)</span>
            <button class="page-btn" disabled>次へ ▶</button>
            <button class="page-btn" disabled>最後 ⏭</button>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px; font-size: 11px; color: #95a5a6;">© 2026 Silica Link Portal</footer>

    <script>
        window.onload = function() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const currentStr = `${year}-${month}-${date} ${hours}:${minutes}`;
            
            document.querySelectorAll('.current-time').forEach(el => {
                el.textContent = currentStr;
            });
        };
    </script>

</body>
</html>
