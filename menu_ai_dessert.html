<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – AI Dessert Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #F9F8F2;
            --card-bg: #ffffff;
            --footer-bg: #EAE8E2;
            --border: #e0dcd4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .ipad-frame {
            width: 1705.72px;
            height: 1144.13px;
            background: #F9F8F2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            position: relative;
            transform-origin: center center;
            will-change: transform;
        }

        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .context-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .context-value {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .context-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
        }

        .context-date {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
        }

        .ai-banner {
            background: #EAE8E2;
            padding: 0 20px;
            height: 52px;
            display: none;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            z-index: 100;
            margin-bottom: 8px;
        }


        .banner-speaker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(51, 51, 51, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .banner-speaker::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1.5px solid rgba(51, 51, 51, 0.18);
            animation: spk-pulse 2.2s ease-out infinite;
        }

        .banner-speaker svg {
            width: 20px;
            height: 20px;
            fill: #333333;
        }

        @keyframes spk-pulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        .banner-staff {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .banner-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .banner-staff-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(51, 51, 51, 0.12);
            display: block;
        }

        .banner-avatar-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7ecb8f;
            border: 2px solid var(--bg);
            animation: dot-blink 1.4s ease-in-out infinite;
        }

        @keyframes dot-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        .banner-staff-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .banner-staff-name {
            font-size: 15px;
            font-weight: 700;
            color: #333333;
            line-height: 1;
        }

        .banner-staff-label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(51, 51, 51, 0.48);
            letter-spacing: 0.03em;
        }

        .banner-divider {
            width: 1px;
            height: 26px;
            background: rgba(51, 51, 51, 0.14);
            flex-shrink: 0;
        }

        .banner-ticker {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .ticker-text {
            font-size: 16px;
            font-weight: 500;
            color: #333333;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .ticker-text.fading {
            opacity: 0;
        }

        .ticker-text.streaming::after {
            content: '▋';
            display: inline-block;
            font-size: 13px;
            margin-left: 2px;
            vertical-align: middle;
            animation: cur-blink 0.6s step-end infinite;
        }

        @keyframes cur-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .category-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 20px 12px;
            flex-shrink: 0;
            background: #EAE8E2;
        }

        .cat-tab {
            padding: 7px 22px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #666;
            background: transparent;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .cat-tab:hover {
            color: var(--primary);
        }

        .cat-tab.active {
            background: #333333;
            color: #fff;
            border-color: #333333;
        }

        .section-label {
            display: none;
        }

        .section-label.visible {
            display: none;
        }

        .restaurant-header {
            width: 220px;
            height: 53px;
            margin: 40px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-size: 44px;
            font-weight: 400;
            line-height: 1;
            letter-spacing: 0;
            color: #333333;
            flex-shrink: 0;
            z-index: 20;
        }

        .context-bar {
            display: none !important;
        }

        .ai-banner {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 113.47px;
            width: 1677px;
            height: 87px;
            margin: 0;
            padding: 0 228px;
            gap: 0;
            z-index: 80;
        }

        .banner-speaker,
        .banner-staff,
        .banner-divider {
            display: none;
        }

        .banner-ticker {
            flex: 1;
            height: 42px;
            display: flex;
            align-items: center;
            min-width: 0;
            padding-left: 26px;
            border-left: 3px solid #333333;
        }

        .ticker-text {
            width: 100%;
            height: 42px;
            font-size: 18px;
            font-weight: 400;
            line-height: 42px;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .banner-close-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: rgba(51, 51, 51, 0.08);
            color: #6f6963;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .banner-close-btn:hover {
            background: rgba(51, 51, 51, 0.14);
            color: #333333;
        }

        .banner-close-btn i {
            font-size: 14px;
            line-height: 1;
        }

        .category-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 829.04px;
            height: 65.82px;
            margin: 36px auto 0;
            gap: 12px;
            padding: 6px 0;
            flex-shrink: 0;
            background: transparent;
            flex-wrap: nowrap !important;
        }

        .cat-tab {
            width: 152.7px;
            height: 53.19px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 700;
            line-height: 27px;
            color: #666;
            background: transparent;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .cat-tab:hover {
            color: var(--primary);
        }

        .cat-tab.active {
            background: #333333;
            color: #fff;
            border-color: #333333;
        }

        .section-label-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label-badge {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.04em;
        }

        .section-label-text {
            font-size: 13px;
            font-weight: 600;
            color: #888;
        }

        .menu-grid-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 38px 28px 220px;
        }

        .menu-grid-wrapper::-webkit-scrollbar {
            width: 4px;
        }

        .menu-grid-wrapper::-webkit-scrollbar-thumb {
            background: #d0ccc4;
            border-radius: 4px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 380.41px);
            column-gap: 26px;
            row-gap: 24px;
            width: max-content;
            margin: 0 auto;
            justify-content: center;
        }

        .menu-card {
            width: 380.41px;
            height: 449.79px;
            background: #FFFFFF;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: none;
            transition: 0.18s, opacity 0.6s, filter 0.6s;
        }

        .menu-card.blurring {
            opacity: 0.18;
            filter: blur(3px);
        }

        .menu-card.revealed {
            animation: card-pop 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes card-pop {
            from {
                opacity: 0.18;
                filter: blur(3px);
                transform: translateY(10px) scale(0.97);
            }

            to {
                opacity: 1;
                filter: blur(0px);
                transform: translateY(0) scale(1);
            }
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.1);
        }

        .menu-card-img-wrap {
            position: relative;
            width: 324px;
            height: 231px;
            margin: 28.2px auto 0;
            overflow: hidden;
            border: 1px solid #e7e2d8;
            border-radius: 16px;
        }

        .menu-card-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #f5f3ef;
        }

        .ai-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(20, 28, 20, 0.78) 0%, rgba(20, 28, 20, 0) 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            padding: 22px 10px 9px;
            display: flex;
            align-items: flex-end;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.4s 0.2s;
        }

        .menu-card.revealed .ai-badge {
            opacity: 1;
        }

        .ai-badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #7ecb8f;
            flex-shrink: 0;
            margin-bottom: 2px;
            animation: dot-blink 1.4s infinite;
        }

        .menu-card-body {
            width: 324px;
            margin: 0 auto;
            padding: 20px 0 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .menu-card-copy {
            width: 324px;
            height: 65.86px;
            display: -webkit-box;
            display: box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-size: 27.44px;
            font-weight: 400;
            color: #2e3335;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: 0;
            padding: 0 10px;
            flex: 1;
        }

        .menu-card-footer {
            display: flex;
            width: 324px;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }

        .menu-card-price {
            width: 73px;
            height: 47px;
            display: inline-flex;
            align-items: center;
            font-size: 38px;
            font-weight: 400;
            line-height: 1;
        }

        .menu-card-price::before {
            content: '¥';
            width: 13px;
            height: 29px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            line-height: 1;
            margin-right: 2px;
        }

        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: 138.76px;
            height: 55.11px;
            justify-content: center;
            padding: 0;
            background: #fff;
            background-image: url('./cartborder.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 100% 100%;
            color: #2e3335;
            border: none;
            border-radius: 9999px;
            font-size: 0;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        .add-btn-label {
            width: 55px;
            height: 33px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 23px;
            font-weight: 700;
            line-height: 1;
        }

        .add-btn i {
            width: 26.69px;
            height: 25.26px;
            font-size: 24px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            border-color: var(--primary);
            background: #f5f3ef;
        }

        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            width: 100%;
            height: 105.47px;
            padding: 14px 0 18px;
            flex-shrink: 0;
        }

        .bottom-nav-inner {
            width: 829.04px;
            height: 65.82px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            color: #888;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-item span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 42.68px;
            height: 13.1px;
            font-size: 13px;
            line-height: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 33.29px;
            line-height: 1;
        }

        .footer-icon-img {
            width: 33.29px;
            height: 33.29px;
            object-fit: contain;
            display: block;
        }

        .nav-icon-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cart-count-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 999px;
            background: #d92d20;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            line-height: 18px;
            text-align: center;
            box-shadow: 0 3px 8px rgba(217, 45, 32, 0.28);
            display: none;
        }

        .cart-count-badge.show {
            display: block;
        }

        .voice-guide-container {
            position: absolute;
            bottom: 128px;
            left: calc(100% - 132px);
            right: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            z-index: 150;
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            transition: 0.5s;
        }

        .voice-guide-container.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .voice-order-btn {
            width: 108px;
            height: 108px;
            border-radius: 50%;
            background: transparent;
            background-image: url('./bg_icon.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 6px 24px rgba(45, 58, 46, 0.38);
            transition: 0.15s;
        }

        .voice-order-btn::before { display: none; }

        .voice-order-btn::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(45, 58, 46, 0.28);
            animation: voice-pulse 2.2s ease-out infinite;
        }

        @keyframes voice-pulse {
            0% {
                transform: scale(1);
                opacity: 0.55;
            }

            100% {
                transform: scale(1.45);
                opacity: 0;
            }
        }

        .voice-order-btn svg { display: none; }

        .voice-order-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
            display: block;
        }

        .voice-order-text {
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.82);
            letter-spacing: 0.06em;
            line-height: 1.25;
            text-align: center;
        }

        .chat-switch-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid #d8d4cc;
            background: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            transition: 0.15s;
        }

        .chat-switch-link:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: #fff;
        }

        .replay-btn { display: none !important; }

        .replay-btn:hover {
            background: rgba(45, 58, 46, 0.12);
        }

        /* Cart Alert Message */
        .cart-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(45, 58, 46, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .cart-alert.show {
            opacity: 1;
        }

        .quick-cart-sheet {
            position: absolute;
            left: 16px;
            width: 520px;
            bottom: 82px;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(224, 220, 212, 0.95);
            border-radius: 20px;
            box-shadow: 0 14px 36px rgba(30, 30, 30, 0.14);
            padding: 16px 18px 14px;
            z-index: 220;
            opacity: 0;
            transform: translateY(24px);
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
        }

        .quick-cart-sheet.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .quick-cart-header { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:8px; }
        .quick-cart-title { font-size:14px; font-weight:800; color:#4a4a4a; }
        .quick-cart-clear { border:none; background:transparent; color:#ef4444; font-size:12px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px; font-family:inherit; }
        .quick-cart-items { display:flex; flex-direction:column; max-height:90px; overflow-y:auto; margin-bottom:12px; }
        .quick-cart-item { display:grid; grid-template-columns:minmax(0,1fr) auto auto; align-items:center; gap:12px; padding:8px 0; border-top:1px solid rgba(160,160,160,0.22); }
        .quick-cart-name { font-size:13px; font-weight:600; color:#636363; min-width:0; }
        .quick-cart-price, .quick-cart-qty { font-size:14px; font-weight:800; color:#5a5653; white-space:nowrap; }
        .quick-cart-footer { display:flex; align-items:center; justify-content:space-between; gap:16px; }
        .quick-cart-total { display:inline-flex; align-items:center; gap:12px; color:var(--primary); font-weight:900; }
        .quick-cart-total i { font-size:24px; color:#2f2a29; }
        .quick-cart-total-price { font-size:24px; line-height:1; }
        .quick-cart-confirm { min-width:150px; height:42px; border:none; border-radius:10px; background:var(--primary); color:#fff; font-size:15px; font-weight:800; cursor:pointer; box-shadow:0 8px 18px rgba(45,58,46,0.16); font-family:inherit; }

        .customize-modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(12, 12, 12, 0.32);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3200;
            backdrop-filter: blur(4px);
        }

        .customize-modal-overlay.show {
            display: flex;
        }

        .customize-modal {
            width: 1060px;
            max-width: calc(100% - 48px);
            background: #fff;

    <script>
        const CART_COUNT_STORAGE_KEY = 'posSpeakCartCount';
        const CART_ITEMS_STORAGE_KEY = 'posSpeakCartItems';
        const dessertItems = [
            { name: 'とろけるフォンダンショコラ', desc: '中から温かいチョコが溢れ出す、至福のひんやりバニラ添える。', price: '980', img: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=900&q=80', reason: '🍫 濃厚チョコ' },
            { name: '季節のフルーツタルト', desc: '旬のフルーツを贅沢に使った、彩り豊かな自家製タルト。', price: '850', img: 'https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=600&q=80', reason: '🍓 爽やか' },
            { name: '自家製クレームブリュレ', desc: 'パリパリのキャラメリゼと、濃厚なカスタードのハーモニー。', price: '780', img: 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&w=900&q=80', reason: '🍮 定番人気' },
            { name: 'とろける杏仁豆腐', desc: '口当たりの良い滑らかな杏仁豆腐。クコの実を添えてサッパリと。', price: '450', img: 'https://images.unsplash.com/photo-1759277513351-3c6aefc0bb0d?auto=format&fit=crop&w=900&q=80', reason: '🍨 さっぱり' },
            { name: '自家製マンゴープリン', desc: '完熟マンゴーをたっぷり使った濃厚な味わい。', price: '520', img: 'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400&q=80', reason: '🥭 濃厚な甘み' },
            { name: '和風抹茶アイスパフェ', desc: '厳選された宇治抹茶のアイスと小豆、白玉の華やかなパフェ。', price: '680', img: 'https://images.unsplash.com/photo-1753463813133-6b3fb0d5e303?auto=format&fit=crop&w=900&q=80', reason: '✨ 宇治抹茶使用' }
        ];

        let quickCartItems = [];
        let quickCartSheetTimer = null;

        function parsePrice(value) {
            return parseInt(String(value).replace(/[^\d]/g, ''), 10) || 0;
        }

        function loadQuickCartItems() {
            try {
                const raw = localStorage.getItem(CART_ITEMS_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                quickCartItems = Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                quickCartItems = [];
            }
        }

        function saveQuickCartItems() {
            localStorage.setItem(CART_ITEMS_STORAGE_KEY, JSON.stringify(quickCartItems));
        }

        function addItemToQuickCart(name, price, qty = 1) {
            const existing = quickCartItems.find(item => item.name === name);
            if (existing) existing.qty += qty;
            else quickCartItems.push({ name, price: String(price), qty });
            saveQuickCartItems();
        }

        function renderQuickCartSheet() {
            const list = document.getElementById('quickCartItems');
            const totalEl = document.getElementById('quickCartTotal');
            if (!list || !totalEl) return;
            if (quickCartItems.length === 0) {
                list.innerHTML = `<div class="quick-cart-item"><div class="quick-cart-name">カートは空です</div><div class="quick-cart-price">¥0</div><div class="quick-cart-qty">0</div></div>`;
                totalEl.textContent = '¥0';
                return;
            }
            const visibleItems = quickCartItems.slice(-3);
            list.innerHTML = visibleItems.map(item => `<div class="quick-cart-item"><div class="quick-cart-name">${item.name}</div><div class="quick-cart-price">¥${parsePrice(item.price).toLocaleString()}</div><div class="quick-cart-qty">× ${item.qty}</div></div>`).join('');
            const total = quickCartItems.reduce((sum, item) => sum + parsePrice(item.price) * item.qty, 0);
            totalEl.textContent = `¥${total.toLocaleString()}`;
        }

        function showQuickCartSheet() {
            const sheet = document.getElementById('quickCartSheet');
            if (!sheet) return;
            renderQuickCartSheet();
            sheet.classList.add('show');
            clearTimeout(quickCartSheetTimer);
            quickCartSheetTimer = setTimeout(() => sheet.classList.remove('show'), 3800);
        }

        function clearQuickCart() {
            clearTimeout(quickCartSheetTimer);
            quickCartItems = [];
            localStorage.removeItem(CART_ITEMS_STORAGE_KEY);
            localStorage.setItem(CART_COUNT_STORAGE_KEY, '0');
            const badge = document.getElementById('cartCountBadge');
            if (badge) {
                badge.textContent = '0';
                badge.classList.remove('show');
            }
            renderQuickCartSheet();
            const sheet = document.getElementById('quickCartSheet');
            if (sheet) sheet.classList.remove('show');
        }

        function syncCartBadgeFromStorage() {
            const badge = document.getElementById('cartCountBadge');
            if (!badge) return;
            const storedCount = parseInt(localStorage.getItem(CART_COUNT_STORAGE_KEY) || '0', 10);
            const storedItemCount = quickCartItems.reduce((sum, item) => sum + (item.qty || 0), 0);
            const count = Math.max(Number.isNaN(storedCount) ? 0 : storedCount, storedItemCount);
            badge.textContent = String(count);
            badge.classList.toggle('show', count > 0);
        }

        function incrementCartBadge() {
            const storedCount = parseInt(localStorage.getItem(CART_COUNT_STORAGE_KEY) || '0', 10);
            const nextCount = (Number.isNaN(storedCount) ? 0 : storedCount) + 1;
            localStorage.setItem(CART_COUNT_STORAGE_KEY, String(nextCount));
            const badge = document.getElementById('cartCountBadge');
            if (!badge) return;
            badge.textContent = String(nextCount);
            badge.classList.toggle('show', nextCount > 0);
        }

        function renderCards(items) {
            document.getElementById('menuGrid').innerHTML = items.map((item, i) => `
                <div class="menu-card" id="card${i}" onclick="window.location.href='menu_ai_detail.html'">
                    <div class="menu-card-img-wrap">
                        <img class="menu-card-img" src="${item.img}" alt="${item.name}">
                        ${item.reason ? `<div class="ai-badge"><div class="ai-badge-dot"></div>${item.reason}</div>` : ''}
                    </div>
                    <div class="menu-card-body">
                        <div class="menu-card-copy">${getCardCopy(item)}</div>
                        <div class="menu-card-footer">
                            <span class="menu-card-price">${formatPrice(item.price)}</span>
                            <button class="add-btn" onclick="event.stopPropagation(); showCartAlert('${item.name}', '${item.price}')"><i class="fa-solid fa-cart-shopping"></i><span class="add-btn-label">追加</span></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function parsePrice(value) {
            return parseInt(String(value).replace(/[^\d]/g, ''), 10) || 0;
        }

        function formatPrice(value) {
            return parsePrice(value).toLocaleString();
        }

        function getCardCopy(item) {
            if (item.cardCopy) return item.cardCopy;
            const shortDesc = String(item.desc || '')
                .replace(/[。．].*$/, '')
                .trim()
                .slice(0, 8);
            return shortDesc ? `${item.name} ${shortDesc}` : item.name;
        }

        function hideAiBanner() {
            const banner = document.getElementById('aiBanner');
            const ticker = document.getElementById('tickerText');
            if (ticker) ticker.classList.remove('streaming');
            if (banner) banner.style.display = 'none';
        }

        function streamText(text, delay, pause, onDone) {
            const el = document.getElementById('tickerText');
            el.classList.add('fading');
            setTimeout(() => {
                el.textContent = ''; el.classList.remove('fading'); el.classList.add('streaming');
                let i = 0;
                const tid = setInterval(() => {
                    if (i < text.length) { el.textContent += text[i++]; }
                    else { clearInterval(tid); el.classList.remove('streaming'); if(onDone) setTimeout(onDone, pause); }
                }, delay);
            }, 420);
        }

        function showCartAlert(itemName = '', itemPrice = '0', qty = 1) {
            incrementCartBadge();
            if (itemName) addItemToQuickCart(itemName, itemPrice, qty);
            const a = document.createElement('div');
            a.className = 'cart-alert';
            a.textContent = 'カートに追加しました。';
            document.body.appendChild(a);
            setTimeout(() => a.classList.add('show'), 10);
            setTimeout(() => {
                a.classList.remove('show');
                setTimeout(() => a.remove(), 300);
            }, 2000);
            showQuickCartSheet();
        }

        function showVoiceGuide() {
            document.getElementById('voiceGuide').classList.add('show');
        }

        function showUserSpeechBubble(text) {
            // Remove existing bubbles first to prevent duplication
            const existingBubbles = document.querySelectorAll('.user-speech-bubble');
            existingBubbles.forEach(b => b.remove());

            const sub = document.createElement('div');
            sub.className = 'user-speech-bubble';
            sub.styleContent = "position:absolute; bottom:220px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; padding:14px 32px; border-radius:40px; font-weight:700; font-size:18px; z-index:9000; animation: bubble-up 0.4s forwards; box-shadow: 0 10px 40px rgba(0,0,0,0.3);";
            sub.style = sub.styleContent; // Fix potential typo in previous code if any
            sub.textContent = text;
            document.querySelector('.ipad-frame').appendChild(sub);
            if (!document.getElementById('bubble-style')) {
                const s = document.createElement('style'); s.id = 'bubble-style';
                s.innerHTML = "@keyframes bubble-up { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }";
                document.head.appendChild(s);
            }
            setTimeout(() => { sub.style.opacity = '0'; sub.style.transition = 'opacity 0.5s'; setTimeout(() => sub.remove(), 500); }, 3000);
        }

        let voiceStep = 0;
        let customizeQty = 1;

        function openCustomizeModal() {
            customizeQty = 1;
            const qty = document.getElementById('customizeQtyValue');
            if (qty) qty.textContent = '1';
            document.querySelectorAll('.customize-option[data-group="sauce"]').forEach((el, index) => {
                el.classList.toggle('selected', index === 0);
            });
            document.querySelectorAll('.customize-option[data-group="topping"], .customize-option[data-group="remove"]').forEach(el => {
                el.classList.remove('selected');
            });
            const modal = document.getElementById('customizeModalOverlay');
            if (modal) modal.classList.add('show');
        }

        function closeCustomizeModal() {
            const modal = document.getElementById('customizeModalOverlay');
            if (modal) modal.classList.remove('show');
        }

        function selectCustomizeSingle(group, el) {
            document.querySelectorAll(`.customize-option[data-group="${group}"]`).forEach(option => option.classList.remove('selected'));
            el.classList.add('selected');
        }

        function toggleCustomizeMulti(el) {
            el.classList.toggle('selected');
        }

        function changeCustomizeQty(delta) {
            customizeQty = Math.max(1, customizeQty + delta);
            const qty = document.getElementById('customizeQtyValue');
            if (qty) qty.textContent = String(customizeQty);
        }

        function confirmCustomizeOrder() {
            closeCustomizeModal();
            showCartAlert('季節のフルーツタルト', '850', customizeQty);
            const qtyLabel = customizeQty > 1 ? ` を ${customizeQty} つ` : ' を 1 つ';
            streamText('カスタマイズを承りました！ 季節のフルーツタルト' + qtyLabel + 'カートに追加いたしました。ほかにご注文はございますか？', 45, 0, () => {
                voiceStep = 1;
            });
        }

        function startVoiceInput() {
            const btn = document.getElementById('voiceOrderBtn');
            const lbl = document.getElementById('voiceOrderText');
            btn.style.background = '#a0a0a0';
            lbl.innerHTML = '聞き取り中';
            
            if (voiceStep === 0) {
                // Step 1: Order Tart
                setTimeout(() => {
                    btn.style.background = '';
                    lbl.innerHTML = 'ボイス<br>オーダー';
                    showUserSpeechBubble('季節のフルーツタルトを1つお願いします');
                    streamText('かしこまりました！ 季節のフルーツタルトですね。カスタマイズ内容をご確認ください。', 45, 0, () => {
                        openCustomizeModal();
                    });
                }, 2000);
            } else {
                // Step 2: Finalize
                setTimeout(() => {
                    btn.style.background = '';
                    lbl.innerHTML = 'ボイス<br>オーダー';
                    showUserSpeechBubble('以上でこれでお願いします。');
                    streamText('承知いたしました。注文内容を確認いたします。カード画面へ移動します。', 45, 2000, () => {
                        window.location.href = 'cart.html?confirm=true';
                    });
                }, 2000);
            }
        }

        const FRAME_WIDTH = 1705.72;
        const FRAME_HEIGHT = 1144.13;

        function fitFrame() {
            const frame = document.querySelector('.ipad-frame');
            if (!frame) return;
            const scale = Math.min(window.innerWidth / FRAME_WIDTH, window.innerHeight / FRAME_HEIGHT);
            frame.style.transform = `scale(${Math.min(scale, 1)})`;
        }

        window.onload = () => {
            fitFrame();
            loadQuickCartItems();
            renderQuickCartSheet();
            renderCards(dessertItems);
            syncCartBadgeFromStorage();
            // Show AI banner initially
            document.getElementById('aiBanner').style.display = 'flex';
            document.querySelector('.context-bar').style.display = 'none';

            setTimeout(() => {
                document.getElementById('sectionLabel').classList.add('visible');
                streamText('人気のデザート 6 点をご紹介します！ お好みのものをお選びください。', 45, 0);
                setTimeout(showVoiceGuide, 1000);
            }, 500);

            setInterval(() => {
                const now = new Date();
                const ctxDate = document.getElementById('ctxDate');
                if (ctxDate) ctxDate.innerText = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            }, 1000);

            const customizeOverlay = document.getElementById('customizeModalOverlay');
            if (customizeOverlay) {
                customizeOverlay.addEventListener('click', (event) => {
                    if (event.target === customizeOverlay) closeCustomizeModal();
                });
            }
        };

        window.addEventListener('resize', fitFrame);

        function runDemo() { window.location.reload(); }
    </script>
</body>
</html>
