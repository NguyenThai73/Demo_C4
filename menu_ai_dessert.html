<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – AI Dessert Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2d3a2e; --bg: #f0ece4; --card-bg: #fff; --footer-bg: #e8e4dc; --border: #e0dcd4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .ipad-frame { width: 1280px; height: 800px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-radius: 12px; position: relative; }
        .ai-banner { background: var(--primary); padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 14px; position: relative; z-index: 100; }
        .banner-speaker { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.13); display: flex; align-items: center; justify-content: center; position: relative; }
        .banner-speaker::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.22); animation: spk-pulse 2.2s infinite; }
        @keyframes spk-pulse { 0% { scale: 1; opacity: 0.7; } 100% { scale: 1.6; opacity: 0; } }
        .banner-staff { display: flex; align-items: center; gap: 10px; }
        .banner-staff-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.28); }
        .banner-staff-name { font-size: 15px; font-weight: 700; color: #fff; }
        .banner-ticker { flex: 1; display: flex; align-items: center; }
        .ticker-text { font-size: 16px; font-weight: 500; color: #fff; }
        .ticker-text.streaming::after { content: '▋'; animation: cur-blink 0.6s infinite; }
        @keyframes cur-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .category-tabs { display: flex; justify-content: center; gap: 8px; padding: 16px; border-bottom: 1px solid var(--border); }
        .cat-tab { padding: 7px 22px; border-radius: 20px; font-size: 13px; font-weight: 700; color: #666; border: 1.5px solid transparent; cursor: pointer; }
        .cat-tab.active { background: var(--primary); color: #fff; }
        .section-label { padding: 14px 32px 6px; }
        .section-label-badge { background: var(--primary); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .section-label-text { font-size: 13px; font-weight: 600; color: #888; }
        .menu-grid-wrapper { flex: 1; overflow-y: auto; padding: 12px 28px 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
        .menu-card { background: #fff; border-radius: 14px; overflow: hidden; border: 1.5px solid var(--border); transition: 0.18s; cursor: pointer; }
        .menu-card-img { width: 100%; height: 200px; object-fit: cover; }
        .menu-card-body { padding: 12px; }
        .menu-card-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .menu-card-desc { font-size: 11px; color: #888; line-height: 1.5; height: 33px; overflow: hidden; margin-bottom: 10px; }
        .menu-card-footer { display: flex; justify-content: space-between; align-items: center; }
        .menu-card-price { font-size: 18px; font-weight: 700; }
        .menu-card-price::before { content: '¥'; font-size: 12px; }
        .add-btn { padding: 6px 14px; border: 1.5px solid #d0ccc6; border-radius: 999px; background: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
        .bottom-nav { display: flex; background: var(--footer-bg); padding: 10px 0 20px; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #888; font-size: 11px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .voice-guide-container { position: absolute; bottom: 86px; right: 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; opacity: 1; transition: 0.5s; }
        .voice-order-btn { width: 100px; height: 100px; border-radius: 50%; background: var(--primary); border: none; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 6px 24px rgba(45,58,46,0.38); }
        .voice-order-text { font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="ipad-frame">
        <div class="ai-banner">
            <div class="banner-speaker"><i class="fas fa-robot"></i></div>
            <div class="banner-staff">
                <img class="banner-staff-avatar" src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=200&h=200&fit=crop&q=80">
                <span class="banner-staff-name">さくら</span>
            </div>
            <div class="banner-ticker"><span class="ticker-text" id="tickerText">人気のデザート 6 点をご紹介します！</span></div>
        </div>
        <div class="category-tabs">
            <button class="cat-tab" onclick="window.location.href='menu_ai.html'">おすすめ</button>
            <button class="cat-tab">前菜</button>
            <button class="cat-tab">麺類</button>
            <button class="cat-tab">ドリンク</button>
            <button class="cat-tab">サラダ</button>
            <button class="cat-tab active">デザート</button>
        </div>
        <div class="section-label">
            <span class="section-label-badge">✦ AI Suggest</span>
            <span class="section-label-text">食後にぴったりなデザート 6 選</span>
        </div>
        <div class="menu-grid-wrapper">
            <div class="menu-grid" id="menuGrid"></div>
        </div>
        <div class="bottom-nav">
            <div class="nav-item active" onclick="window.location.href='menu_ai.html'"><i class="fas fa-utensils"></i><span>メニュー</span></div>
            <div class="nav-item"><i class="fas fa-shopping-cart"></i><span>カート</span></div>
            <div class="nav-item"><i class="fas fa-comment"></i><span>会話</span></div>
        </div>
        <div class="voice-guide-container">
            <button class="voice-order-btn" id="voiceBtn">
                <i class="fas fa-microphone" style="font-size: 32px; margin-bottom: 4px;"></i>
                <span class="voice-order-text">ボイス<br>オーダー</span>
            </button>
        </div>
    </div>
    <script>
        const dessertItems = [
            { name: 'とろけるフォンダンショコラ', desc: '中から温かいチョコが溢れ出す、至福のひんやりバニラ添え。', price: '980', img: 'https://images.unsplash.com/photo-1541920443744-71cbe00d5855?w=600&q=80' },
            { name: '季節のフルーツタルト', desc: '旬のフルーツ를 贅沢に使った、彩り豊かな自家製タルト。', price: '850', img: 'https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=600&q=80' },
            { name: '自家製クレームブリュレ', desc: 'パリパリのキャラメリゼと、濃厚なカスタードのハーモニー。', price: '780', img: 'https://images.unsplash.com/photo-1470333841576-5146244844e3?w=600&q=80' },
            { name: 'とろける杏仁豆腐', desc: '口当たりの良い滑らかな杏仁豆腐。クコの実を添えてサッパリと。', price: '450', img: 'https://images.unsplash.com/photo-1563805039227-9999a0e6bb7c?w=600&q=80' },
            { name: '自家製マンゴープリン', desc: '完熟マンゴーをたっぷり使った濃厚な味わい。', price: '520', img: 'https://images.unsplash.com/photo-1551024601-bec78aea704b?w=400&q=80' },
            { name: '和風抹茶アイスパフェ', desc: '厳選された宇治抹茶のアイスと小豆、白玉の華やかなパフェ。', price: '680', img: 'https://images.unsplash.com/photo-1579372781848-65ec49896791?w=600&q=80' }
        ];
        function renderCards(items) {
            document.getElementById('menuGrid').innerHTML = items.map((item, i) => `
                <div class="menu-card" onclick="window.location.href='menu_ai_detail.html'">
                    <img class="menu-card-img" src="${item.img}">
                    <div class="menu-card-body">
                        <div class="menu-card-name">${item.name}</div>
                        <div class="menu-card-desc">${item.desc}</div>
                        <div class="menu-card-footer">
                            <span class="menu-card-price">${item.price}</span>
                            <button class="add-btn" onclick="event.stopPropagation(); showCartAlert()">カートに追加</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        function streamText(text, delay, pause, onDone) {
            const el = document.getElementById('tickerText'); el.textContent = ''; el.classList.add('streaming');
            let i = 0; const tid = setInterval(() => {
                if (i < text.length) { el.textContent += text[i++]; }
                else { clearInterval(tid); el.classList.remove('streaming'); if(onDone) setTimeout(onDone, pause); }
            }, delay);
        }
        function showCartAlert() {
            const a = document.createElement('div'); a.style = "position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.85); color:#fff; padding:20px 40px; border-radius:12px; font-weight:700; z-index:9999;";
            a.textContent = "カートに追加しました"; document.body.appendChild(a);
            setTimeout(() => { a.style.opacity = '0'; a.style.transition = 'opacity 0.5s'; setTimeout(() => a.remove(), 500); }, 2000);
        }
        window.onload = () => {
            renderCards(dessertItems);
            streamText('人気のデザート 6 点をご紹介します！ お選びください。', 45, 0);
            document.getElementById('voiceBtn').onclick = () => {
                const b = document.getElementById('voiceBtn'); b.style.background = '#888';
                setTimeout(() => { b.style.background = ''; streamText('かしこまりました！ フォンダンショコラを 1 つ追加します。', 45, 0, showCartAlert); }, 1500);
            };
        };
    </script>
</body>
</html>
