<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – Shopping Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #f0ece4;
            --card-bg: #ffffff;
            --footer-bg: #e8e4dc;
            --border: #e0dcd4;
            --text-main: #1a1a1a;
            --text-sub: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            border-radius: 12px;
            position: relative;
        }

        /* ─── HEADER: CONTEXT BAR ───────────────────────── */
        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left {
            display: flex; gap: 24px; align-items: center;
        }
        .context-item { display: flex; align-items: center; gap: 8px; }
        .context-label { color: rgba(255, 255, 255, 0.4); font-weight: 500; }
        .context-value { font-weight: 700; letter-spacing: 0.02em; }
        .context-divider { width: 1px; height: 20px; background: rgba(255, 255, 255, 0.15); }
        .context-date { color: rgba(255, 255, 255, 0.35); font-size: 12px; }

        /* ─── MAIN CONTENT ────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            padding: 40px 64px;
            gap: 40px;
            overflow: hidden;
        }

        .cart-list-container {
            flex: 1.5;
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1.5px solid var(--border);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #efefef;
        }
        .cart-header h2 { font-size: 20px; font-weight: 800; color: var(--text-main); }
        .clear-btn { background: none; border: none; color: #ef4444; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        .cart-items { flex: 1; overflow-y: auto; padding-right: 8px; }
        .cart-items::-webkit-scrollbar { width: 4px; }
        .cart-items::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .item-img { width: 64px; height: 64px; border-radius: 12px; object-fit: cover; margin-right: 16px; background: #f9f9f9; }
        .item-info { flex: 1; }
        .item-name { font-size: 15px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .item-option { font-size: 11px; color: #888; font-weight: 500; }
        .item-price { font-size: 16px; font-weight: 800; color: var(--text-main); width: 100px; text-align: right; margin-right: 24px; }
        .item-price::before { content: '¥'; font-size: 11px; margin-right: 1px; }

        .qty-ctrl { display: flex; align-items: center; gap: 12px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: #fff; color: #444; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
        .qty-val { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }

        .summary-panel {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .summary-card {
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            border: 1.5px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .summary-label { font-size: 14px; color: #888; font-weight: 600; }
        .summary-value { font-size: 14px; color: var(--text-main); font-weight: 700; }
        .summary-total { border-top: 1px solid #efefef; padding-top: 16px; margin-top: 8px; }
        .total-label { font-size: 16px; font-weight: 800; }
        .total-price { font-size: 24px; font-weight: 900; color: var(--primary); }
        .total-price::before { content: '¥'; font-size: 16px; margin-right: 2px; }

        .order-btn {
            height: 72px; width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 30px rgba(45, 58, 46, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .order-btn:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 14px 40px rgba(45, 58, 46, 0.3); }

        .cancel-btn {
            height: 56px; width: 100%; background: none; border: 2px solid var(--border); color: #888; border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .cancel-btn:hover { border-color: #999; color: #444; }

        .bottom-nav {
            display: flex;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 12px 0 20px;
            flex-shrink: 0;
            width: 100%;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
            position: relative;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }
        .nav-badge {
            position: absolute;
            top: -4px;
            right: calc(50% - 18px);
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--footer-bg);
        }
    </style>
</head>
<body>
    <div class="ipad-frame">
        <div class="context-bar">
            <div class="context-left">
                <div class="context-item"><span class="context-label">卓番</span><span class="context-value">T-01, T-02</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">端末</span><span class="context-value">iPad-03</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">受付番号</span><span class="context-value">#0042</span></div>
            </div>
            <div class="context-date" id="ctxDate"></div>
        </div>

        <div class="main-content">
            <div class="cart-list-container">
                <div class="cart-header">
                    <h2>ご注文内容の確認</h2>
                    <button class="clear-btn" onclick="clearAll()"><i class="fa-solid fa-trash-can"></i> 全て消去</button>
                </div>
                <div class="cart-items" id="cartItems">
                    <div class="cart-item">
                        <img class="item-img" src="wagyu_steak_seared_1775109027703.png">
                        <div class="item-info">
                            <div class="item-name">和牛ステーキ 特選</div>
                            <div class="item-option">ミディアムレア / ガーリック醤油</div>
                        </div>
                        <div class="item-price">2,800</div>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="updateQty(0, -1)"><i class="fa-solid fa-minus"></i></button>
                            <span class="qty-val">1</span>
                            <button class="qty-btn" onclick="updateQty(0, 1)"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                    <div class="cart-item">
                        <img class="item-img" src="premium_sushi_platter_1775109009124.png">
                        <div class="item-info">
                            <div class="item-name">特選 握り寿司盛り合わせ</div>
                            <div class="item-option">旬の鮮魚12貫 / 煮切り醤油</div>
                        </div>
                        <div class="item-price">3,500</div>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="updateQty(1, -1)"><i class="fa-solid fa-minus"></i></button>
                            <span class="qty-val">1</span>
                            <button class="qty-btn" onclick="updateQty(1, 1)"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="summary-panel">
                <div class="summary-card">
                    <div class="summary-row">
                        <span class="summary-label">小計 (2品)</span>
                        <span class="summary-value">¥6,300</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">サービス料 (0%)</span>
                        <span class="summary-value">¥0</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span class="total-label">合計金額</span>
                        <span class="total-price">6,300</span>
                    </div>
                </div>

                <button class="order-btn" onclick="sendOrder()">
                    <i class="fa-solid fa-bell"></i>
                    <span>この内容で注文を送信</span>
                </button>
                <button class="cancel-btn" onclick="history.back()">メニューに戻る</button>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='menu_ai.html'"><i class="fa-solid fa-utensils"></i><span>メニュー</span></button>
            <button class="nav-item active"><i class="fa-solid fa-cart-shopping"></i><span class="nav-badge" id="totalBadge">2</span><span>カート</span></button>
            <button class="nav-item" onclick="window.location.href='order_status.html'"><i class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></button>
            <button class="nav-item" onclick="window.location.href='chat_ai.html'"><i class="fa-solid fa-comment-dots"></i><span>会話</span></button>
            <button class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></button>
        </div>
    </div>

    <script>
        function sendOrder() {
            alert('注文を送信しました');
            window.location.href = 'order_status.html';
        }
        function clearAll() {
            if(confirm('カートを空にしますか？')) {
                document.getElementById('cartItems').innerHTML = '<div style="text-align:center; padding-top:60px; color:#aaa;">カートは空です</div>';
                const badge = document.querySelector('.nav-badge');
                if(badge) badge.style.display='none';
            }
        }
        function updateQty(i, d) {
            const val = document.querySelector('.qty-val');
            let n = parseInt(val.innerText);
            if(n+d > 0) val.innerText = n+d;
        }

        setInterval(() => {
            const now = new Date();
            const y = now.getFullYear();
            const mo = String(now.getMonth()+1).padStart(2,'0');
            const da = String(now.getDate()).padStart(2,'0');
            const hh = String(now.getHours()).padStart(2,'0');
            const mm = String(now.getMinutes()).padStart(2,'0');
            document.getElementById('ctxDate').innerText = `${y}/${mo}/${da} ${hh}:${mm}`;
        }, 1000);
    </script>
</body>
</html>
