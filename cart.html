<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – Shopping Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #f0ece4;
            --card-bg: #ffffff;
            --footer-bg: #e8e4dc;
            --border: #e0dcd4;
            --text-main: #1a1a1a;
            --text-sub: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            position: relative;
        }

        /* ─── HEADER: CONTEXT BAR ───────────────────────── */
        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .context-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .context-value {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .context-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
        }

        .context-date {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
        }

        /* ─── MAIN CONTENT ────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            padding: 40px 64px;
            gap: 40px;
            overflow: hidden;
        }

        .cart-list-container {
            flex: 1.5;
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1.5px solid var(--border);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #efefef;
        }

        .cart-header h2 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-main);
        }

        .clear-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .cart-items::-webkit-scrollbar {
            width: 4px;
        }

        .cart-items::-webkit-scrollbar-thumb {
            background: #eee;
            border-radius: 10px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .item-img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 16px;
            background: #f9f9f9;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .item-option {
            font-size: 11px;
            color: #888;
            font-weight: 500;
        }

        .item-price {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-main);
            width: 100px;
            text-align: right;
            margin-right: 24px;
        }

        .item-price::before {
            content: '¥';
            font-size: 11px;
            margin-right: 1px;
        }

        .qty-ctrl {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: #fff;
            color: #444;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .qty-val {
            font-size: 16px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        .summary-panel {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .summary-card {
            background: #fff;
            border-radius: 24px;
            padding: 32px;
            border: 1.5px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .summary-label {
            font-size: 14px;
            color: #888;
            font-weight: 600;
        }

        .summary-value {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 700;
        }

        .summary-total {
            border-top: 1px solid #efefef;
            padding-top: 16px;
            margin-top: 8px;
        }

        .total-label {
            font-size: 16px;
            font-weight: 800;
        }

        .total-price {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
        }

        .total-price::before {
            content: '¥';
            font-size: 16px;
            margin-right: 2px;
        }

        .order-btn {
            height: 72px;
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(45, 58, 46, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .order-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(45, 58, 46, 0.3);
        }

        .cancel-btn {
            height: 56px;
            width: 100%;
            background: none;
            border: 2px solid var(--border);
            color: #888;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .cancel-btn:hover {
            border-color: #999;
            color: #444;
        }

        .bottom-nav {
            display: flex;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 12px 0 20px;
            flex-shrink: 0;
            width: 100%;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
            position: relative;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 22px;
        }

        /* AI Banner */
        .ai-banner {
            background: var(--primary);
            color: #fff;
            padding: 0 40px;
            height: 52px;
            display: none;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
            z-index: 100;
        }

        .banner-speaker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.13);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .banner-speaker::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.22);
            animation: spk-pulse 2.2s ease-out infinite;
        }

        @keyframes spk-pulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        .banner-speaker i {
            font-size: 18px;
            color: #fff;
        }

        .banner-staff {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .banner-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .banner-staff-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.28);
            display: block;
        }

        .banner-avatar-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7ecb8f;
            border: 2px solid var(--primary);
            animation: dot-blink 1.4s ease-in-out infinite;
        }

        @keyframes dot-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        .banner-staff-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .banner-staff-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .banner-staff-label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.48);
            letter-spacing: 0.03em;
        }

        .banner-divider {
            width: 1px;
            height: 26px;
            background: rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        .banner-ticker {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
            max-height: 24px;
            overflow: hidden;
        }

        .ticker-text {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            line-height: 1.2;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            opacity: 1;
            transition: opacity 0.4s ease;
            max-width: 100%;
        }

        @keyframes cur-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .nav-badge {
            position: absolute;
            top: -4px;
            right: calc(50% - 18px);
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--footer-bg);
        }

        .voice-guide-container {
            position: absolute;
            bottom: 86px;
            right: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 150;
        }

        .voice-sub-btns {
            display: flex;
            gap: 10px;
        }

        .voice-order-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 6px 24px rgba(45, 58, 46, 0.38);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .voice-order-btn::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.28);
            pointer-events: none;
        }

        .voice-order-btn::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(45, 58, 46, 0.28);
            animation: voice-pulse 2.2s ease-out infinite;
        }

        .voice-order-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 32px rgba(45, 58, 46, 0.48);
        }

        .voice-order-btn svg {
            width: 36px;
            height: 36px;
            fill: rgba(255, 255, 255, 0.88);
        }

        .voice-order-text {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.82);
            letter-spacing: 0.06em;
            line-height: 1.25;
            text-align: center;
            pointer-events: none;
        }

        @keyframes voice-pulse {
            0% {
                transform: scale(1);
                opacity: 0.55;
            }

            100% {
                transform: scale(1.45);
                opacity: 0;
            }
        }

        .chat-switch-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid #d8d4cc;
            background: rgba(255, 255, 255, 0.85);
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            text-decoration: none;
        }

        .chat-switch-link:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: #fff;
        }

        .staff-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .staff-modal {
            width: 720px;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modal-up 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modal-up {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .staff-modal-header {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .staff-modal-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
            color: #1a365d;
        }

        .staff-modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f5f9;
            border: none;
            color: #64748b;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staff-modal-options {
            padding: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .staff-option-card {
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .staff-option-card:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .staff-option-card.selected {
            border-color: #3b82f6;
            background: #eff6ff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        .staff-option-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .staff-option-label {
            font-size: 15px;
            font-weight: 700;
            color: #334155;
        }

        .staff-modal-footer {
            padding: 0 32px 32px;
            text-align: center;
        }

        .staff-modal-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .call-staff-confirm-btn {
            width: 100%;
            height: 64px;
            background: #f87171;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(248, 113, 113, 0.3);
            transition: all 0.2s;
        }

        .call-staff-confirm-btn:hover {
            background: #ef4444;
            transform: translateY(-2px);
        }

        .cart-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 54, 93, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            z-index: 3000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
        }

        .cart-alert.show {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="ipad-frame">
        <!-- AI Banner -->
        <div class="ai-banner" id="aiBanner">
            <div class="banner-speaker">
                <i class="fa-solid fa-volume-high"></i>
            </div>
            <div class="banner-staff">
                <div class="banner-avatar-wrap">
                    <img class="banner-staff-avatar"
                        src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=200&h=200&fit=crop&q=80"
                        alt="さくら">
                    <div class="banner-avatar-dot"></div>
                </div>
                <div class="banner-staff-text">
                    <span class="banner-staff-name">さくら</span>
                    <span class="banner-staff-label">AIスタッフ</span>
                </div>
            </div>
            <div class="banner-divider"></div>
            <div class="banner-ticker">
                <div class="ticker-text" id="aiTickerText">承知いたしました。他に何かお手伝いできることはありますか？</div>
            </div>
        </div>

        <div class="context-bar">
            <div class="context-left">
                <div class="context-item"><span class="context-label">卓番</span><span class="context-value">T-01,
                        T-02</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">端末</span><span
                        class="context-value">iPad-03</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">受付番号</span><span
                        class="context-value">#0042</span></div>
            </div>
            <div class="context-date" id="ctxDate"></div>
        </div>

        <div class="main-content">
            <div class="cart-list-container">
                <div class="cart-header">
                    <h2>ご注文内容の確認</h2>
                    <button class="clear-btn" onclick="clearAll()"><i class="fa-solid fa-trash-can"></i> 全て消去</button>
                </div>
                <div class="cart-items" id="cartItems">
                    <div class="cart-item">
                        <img class="item-img" src="https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=400&q=80">
                        <div class="item-info">
                            <div class="item-name">季節のフルーツタルト</div>
                            <div class="item-option">AIスタッフおすすめ / 1個</div>
                        </div>
                        <div class="item-price">850</div>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="updateQty(0, -1)"><i class="fa-solid fa-minus"></i></button>
                            <span class="qty-val">1</span>
                            <button class="qty-btn" onclick="updateQty(0, 1)"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="summary-panel">
                <div class="summary-card">
                    <div class="summary-row">
                        <span class="summary-label">小計 (1品)</span>
                        <span class="summary-value">¥850</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span class="total-label">合計金額</span>
                        <span class="total-price">850</span>
                    </div>
                </div>

                <button class="order-btn" id="confirmBtn" onclick="sendOrder()">
                    <i class="fa-solid fa-bell"></i>
                    <span>注文を確認する</span>
                </button>
                <button class="cancel-btn" onclick="history.back()">メニューに戻る</button>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item" onclick="window.location.href='menu_ai.html'"><i
                    class="fa-solid fa-utensils"></i><span>メニュー</span></button>
            <button class="nav-item active"><i class="fa-solid fa-cart-shopping"></i><span class="nav-badge"
                    id="totalBadge">2</span><span>カート</span></button>
            <button class="nav-item" onclick="window.location.href='order_status.html'"><i
                    class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></button>
            <button class="nav-item" onclick="window.location.href='chat_ai.html'"><i
                    class="fa-solid fa-comment-dots"></i><span>会話</span></button>
            <button class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></button>
        </div>

        <div class="voice-guide-container">
            <button class="voice-order-btn" id="voiceOrderBtn" onclick="startVoice()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                </svg>
                <span class="voice-order-text" id="voiceOrderText">ボイス<br>オーダー</span>
            </button>
            <div class="voice-sub-btns">
                <a class="chat-switch-link" id="chatLink" onclick="window.location.href='chat_ai.html'">
                    <i class="fa-regular fa-comment-dots"></i>チャットに切替
                </a>
                <a class="chat-switch-link" id="callStaffBtn" onclick="openStaffModal()">
                    <i class="fa-solid fa-bell"></i>店員を呼ぶ
                </a>
            </div>
        </div>

        <div class="staff-modal-overlay" id="staffModalOverlay">
            <div class="staff-modal">
                <div class="staff-modal-header">
                    <div class="staff-modal-title">
                        <span style="font-size: 24px;">🤖</span> 何かお手伝いできることはありますか？
                    </div>
                    <button class="staff-modal-close" onclick="closeStaffModal()">&times;</button>
                </div>
                <div class="staff-modal-options">
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-droplet" style="color: #3b82f6;"></i></div>
                        <div class="staff-option-label">水を追加</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-restroom" style="color: #3b82f6;"></i></div>
                        <div class="staff-option-label">トイレの場所</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-utensils" style="color: #94a3b8;"></i></div>
                        <div class="staff-option-label">お皿を片付ける</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-circle-question" style="color: #ef4444;"></i></div>
                        <div class="staff-option-label">その他ご質問</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-baby" style="color: #f59e0b;"></i></div>
                        <div class="staff-option-label">子ども用食器</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-chair" style="color: #845ef7;"></i></div>
                        <div class="staff-option-label">ベビーチェア</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-hand-holding-heart" style="color: #ec4899;"></i></div>
                        <div class="staff-option-label">箸・フォークを追加</div>
                    </div>
                    <div class="staff-option-card" onclick="toggleStaffOption(this)">
                        <div class="staff-option-icon"><i class="fa-solid fa-soap" style="color: #10b981;"></i></div>
                        <div class="staff-option-label">テーブルの清掃</div>
                    </div>
                </div>
                <div class="staff-modal-footer">
                    <div class="staff-modal-hint">複数選択できます。選択後、下のボタンでスタッフを呼び出します。</div>
                    <button class="call-staff-confirm-btn" onclick="confirmStaffCall()">
                        <i class="fa-solid fa-bell"></i> スタッフ呼び出し
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let headerResetTimer = null;

        function sendOrder() {
            window.location.href = 'order_status.html';
        }

        function clearAll() {
            if (confirm('カートを空にしますか？')) {
                document.getElementById('cartItems').innerHTML = '<div style="text-align:center; padding-top:60px; color:#aaa;">カートは空です</div>';
                const badge = document.getElementById('totalBadge');
                if (badge) badge.style.display = 'none';
            }
        }

        function updateQty(i, d) {
            const val = document.querySelectorAll('.qty-val')[i];
            let n = parseInt(val.innerText);
            if (n + d > 0) val.innerText = n + d;
        }

        function showUserSpeechBubble(text) {
            document.querySelectorAll('.user-speech-bubble').forEach(b => b.remove());
            const bubble = document.createElement('div');
            bubble.className = 'user-speech-bubble';
            bubble.style = 'position:absolute; bottom:220px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; padding:14px 32px; border-radius:40px; font-weight:700; font-size:18px; z-index:2000; box-shadow:0 10px 30px rgba(0,0,0,0.3); pointer-events:none; animation:bubble-up 0.4s cubic-bezier(0.18,0.89,0.32,1.28) forwards;';
            bubble.textContent = text;
            document.body.appendChild(bubble);
            if (!document.getElementById('bubble-style')) {
                const style = document.createElement('style');
                style.id = 'bubble-style';
                style.innerHTML = '@keyframes bubble-up { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }';
                document.head.appendChild(style);
            }
            setTimeout(() => {
                bubble.style.transition = 'opacity 0.5s, transform 0.5s';
                bubble.style.opacity = '0';
                bubble.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => bubble.remove(), 500);
            }, 3000);
        }

        function startVoice() {
            const btn = document.getElementById('voiceOrderBtn');
            const lbl = document.getElementById('voiceOrderText');
            const chat = document.getElementById('chatLink');
            const aiBanner = document.getElementById('aiBanner');
            const contextBar = document.querySelector('.context-bar');

            if (headerResetTimer) clearTimeout(headerResetTimer);

            btn.style.background = '#a0a0a0';
            lbl.innerHTML = '聞き取り中';
            chat.style.display = 'none';

            setTimeout(() => {
                aiBanner.style.display = 'flex';
                contextBar.style.display = 'none';
                showUserSpeechBubble('何か早く食べられるものはありますか？ 急いでいます。');

                const aiTickerText = document.getElementById('aiTickerText');
                if (aiTickerText) {
                    aiTickerText.textContent = '承知しました。すぐにご紹介いたします。';
                }

                btn.style.background = '';
                lbl.innerHTML = 'ボイス<br>オーダー';
                chat.style.display = 'inline-flex';

                headerResetTimer = setTimeout(() => {
                    if (aiTickerText) {
                        aiTickerText.textContent = 'それでは、調理時間の短い 3 品をご案内します。';
                    }
                    headerResetTimer = setTimeout(() => {
                        window.location.href = 'menu_ai_fast.html';
                    }, 2200);
                }, 2200);
            }, 2000);
        }

        function openStaffModal() {
            const modal = document.getElementById('staffModalOverlay');
            if (modal) {
                modal.style.display = 'flex';
                document.querySelectorAll('.staff-option-card').forEach(c => c.classList.remove('selected'));
            }
        }

        function closeStaffModal() {
            const modal = document.getElementById('staffModalOverlay');
            if (modal) modal.style.display = 'none';
        }

        function toggleStaffOption(el) {
            el.classList.toggle('selected');
        }

        function confirmStaffCall() {
            const selectedCount = document.querySelectorAll('.staff-option-card.selected').length;
            if (selectedCount === 0) {
                alert('ご希望の項目を選択してください。');
                return;
            }

            closeStaffModal();

            const alertBox = document.createElement('div');
            alertBox.className = 'cart-alert';
            alertBox.innerHTML = 'ありがとうございます。<br>少々お待ちください、店員が伺います。';
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.classList.add('show'), 10);
            setTimeout(() => {
                alertBox.classList.remove('show');
                setTimeout(() => alertBox.remove(), 300);
            }, 3000);
        }

        window.onload = () => {
            const staffModal = document.getElementById('staffModalOverlay');
            if (staffModal) {
                staffModal.addEventListener('click', (event) => {
                    if (event.target === staffModal) closeStaffModal();
                });
            }

            setInterval(() => {
                const now = new Date();
                const ctxDate = document.getElementById('ctxDate');
                if (ctxDate) ctxDate.innerText = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            }, 1000);

            // AI Confirmation Flow
            const params = new URLSearchParams(window.location.search);
            if (params.get('confirm') === 'true') {
                const aiBanner = document.getElementById('aiBanner');
                const contextBar = document.querySelector('.context-bar');
                const aiTickerText = document.getElementById('aiTickerText');
                const cartItems = document.getElementById('cartItems');
                
                if (aiBanner) aiBanner.style.display = 'flex';
                if (contextBar) contextBar.style.display = 'none';

                // Add requested products to cart if confirm=true
                if (cartItems) {
                    const lemonSodaHtml = `
                        <div class="cart-item">
                            <img class="item-img" src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=400&q=80">
                            <div class="item-info">
                                <div class="item-name">レモンソーダ</div>
                                <div class="item-option">爽やかな瀬戸内レモン使用 / 1杯</div>
                            </div>
                            <div class="item-price">650</div>
                            <div class="qty-ctrl">
                                <button class="qty-btn" onclick="updateQty(1, -1)"><i class="fa-solid fa-minus"></i></button>
                                <span class="qty-val">1</span>
                                <button class="qty-btn" onclick="updateQty(1, 1)"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    `;
                    const chardonnayHtml = `
                        <div class="cart-item">
                            <img class="item-img" src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400&q=80">
                            <div class="item-info">
                                <div class="item-name">シャルドネ 2022</div>
                                <div class="item-option">カリフォルニア産・辛口 / 1杯</div>
                            </div>
                            <div class="item-price">1280</div>
                            <div class="qty-ctrl">
                                <button class="qty-btn" onclick="updateQty(2, -1)"><i class="fa-solid fa-minus"></i></button>
                                <span class="qty-val">1</span>
                                <button class="qty-btn" onclick="updateQty(2, 1)"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    `;
                    cartItems.innerHTML += lemonSodaHtml + chardonnayHtml;
                    
                    // Update Summary
                    const subtotal = 850 + 650 + 1280;
                    document.querySelector('.summary-value').innerText = `¥${subtotal.toLocaleString()}`;
                    document.querySelector('.total-price').innerText = subtotal.toLocaleString();
                    document.querySelector('.summary-label').innerText = `小計 (3品)`;
                    
                    // Update Badge
                    const badge = document.getElementById('totalBadge');
                    if (badge) badge.innerText = '3';
                }

                if (aiTickerText) {
                    aiTickerText.innerText = '';
                    aiTickerText.classList.add('streaming');
                    const msg = 'ご注文内容を確認してください。こちらの「注文を確認する」ボタンを押すと、注文が確定します。';
                    let i = 0;
                    const tid = setInterval(() => {
                        if (i < msg.length) { aiTickerText.innerText += msg[i++]; }
                        else { clearInterval(tid); aiTickerText.classList.remove('streaming'); }
                    }, 45);
                }
            }
        };
    </script>
</body>

</html>
