<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – Menu Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #f0ece4;
            --card-bg: #ffffff;
            --footer-bg: #e8e4dc;
            --border: #e0dcd4;
            --text-main: #1a1a1a;
            --text-sub: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.7);
            border-radius: 12px;
            position: relative;
        }

        /* ─── HEADER: CONTEXT BAR ───────────────────────── */
        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left { display: flex; gap: 24px; align-items: center; }
        .context-item { display: flex; align-items: center; gap: 8px; }
        .context-label { color: rgba(255, 255, 255, 0.4); font-weight: 500; }
        .context-value { font-weight: 700; letter-spacing: 0.02em; }
        .context-divider { width: 1px; height: 20px; background: rgba(255, 255, 255, 0.15); }
        .context-date { color: rgba(255, 255, 255, 0.35); font-size: 12px; }

        /* ─── MAIN CONTENT ────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            padding: 40px 64px;
            gap: 64px;
            overflow: hidden;
        }

        /* Left: Image Showcase */
        .image-showcase {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .main-image-container {
            width: 100%;
            height: 500px;
            border-radius: 32px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1.5px solid var(--border);
        }
        .main-image { width: 100%; height: 100%; object-fit: cover; }
        
        .thumb-strip { display: flex; gap: 16px; }
        .thumb {
            width: 90px; height: 90px; border-radius: 16px; object-fit: cover; cursor: pointer; border: 3px solid transparent; transition: 0.2s; opacity: 0.6;
        }
        .thumb.active { border-color: var(--primary); opacity: 1; transform: translateY(-4px); }

        /* Right: Product Info */
        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .product-header { display: flex; flex-direction: column; gap: 8px; }
        .badge-premium { align-self: flex-start; background: #fff; border: 1.5px solid var(--accent); color: var(--accent); padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 8px; }
        .product-title { font-size: 36px; font-weight: 900; color: var(--text-main); line-height: 1.2; }
        .product-desc { font-size: 16px; color: var(--text-sub); line-height: 1.6; }

        .price-section { display: flex; align-items: flex-end; gap: 12px; }
        .price-main { font-size: 40px; font-weight: 950; color: var(--primary); }
        .price-main::before { content: '¥'; font-size: 24px; margin-right: 4px; }
        .tax-info { font-size: 13px; color: #888; font-weight: 600; margin-bottom: 8px; }

        .spec-list { display: flex; flex-direction: column; gap: 16px; background: #fff; padding: 24px; border-radius: 20px; border: 1.5px solid var(--border); }
        .spec-item { display: flex; justify-content: space-between; align-items: center; }
        .spec-label { font-size: 14px; font-weight: 700; color: #888; display: flex; align-items: center; gap: 8px; }
        .spec-val { font-size: 14px; font-weight: 800; color: var(--text-main); }

        .action-area { margin-top: auto; display: flex; gap: 16px; padding-bottom: 20px; }
        .btn-add-cart {
            flex: 1; height: 72px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 10px 30px rgba(45, 58, 46, 0.2);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-add-cart:hover { background: var(--primary-light); transform: translateY(-2px); }
        
        .btn-back { width: 72px; height: 72px; border: 2px solid var(--border); background: #fff; border-radius: 20px; color: #888; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .btn-back:hover { color: var(--text-main); border-color: #999; }

        /* ─── MODAL ─────────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .customize-modal {
            background: #fff; width: 480px; border-radius: 32px; padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.25);
        }
        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; text-align: center; }
        
        .opt-group { margin-bottom: 24px; }
        .opt-title { font-size: 13px; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
        .opt-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #f8f8f8; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1.5px solid transparent; transition: 0.2s; }
        .opt-row.selected { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .opt-row input { display: none; }
        .opt-name { font-size: 15px; font-weight: 700; }
        .opt-price { font-size: 13px; font-weight: 600; opacity: 0.7; }

        .qty-control { display: flex; justify-content: center; align-items: center; gap: 24px; margin: 32px 0; }
        .qty-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #eee; background: #fff; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #333; transition: 0.2s; }
        .qty-btn:hover { border-color: #333; }
        .qty-num { font-size: 28px; font-weight: 900; color: var(--text-main); min-width: 32px; text-align: center; }

        .modal-confirm { width: 100%; height: 60px; background: var(--primary); color: #fff; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; }

        /* ─── BOTTOM NAV ──────────────────────────────────── */
        .bottom-nav {
            display: flex;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 12px 0 20px;
            flex-shrink: 0;
            width: 100%;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }

    </style>
</head>
<body>
    <div class="ipad-frame">
        <!-- Context Bar -->
        <div class="context-bar">
            <div class="context-left">
                <div class="context-item"><span class="context-label">卓番</span><span class="context-value">T-01, T-02</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">端末</span><span class="context-value">iPad-03</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">受付番号</span><span class="context-value">#0042</span></div>
            </div>
            <div class="context-date" id="ctxDate">2026/04/02 11:24</div>
        </div>

        <div class="main-content">
            <!-- Left: Image Showcase -->
            <div class="image-showcase">
                <div class="main-image-container">
                    <img class="main-image" id="mainImg" src="https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=1000&q=80">
                </div>
                <div class="thumb-strip">
                    <img class="thumb active" src="https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=200&q=80" onclick="switchImg(this, 'https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=1000&q=80')">
                    <img class="thumb" src="https://images.unsplash.com/photo-1558030006-450675393462?w=200&q=80" onclick="switchImg(this, 'https://images.unsplash.com/photo-1558030006-450675393462?w=1000&q=80')">
                    <img class="thumb" src="https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=200&q=80" onclick="switchImg(this, 'https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=1000&q=80')">
                </div>
            </div>

            <!-- Right: Product Info -->
            <div class="product-info">
                <div class="product-header">
                    <span class="badge-premium">CHEF'S SPECIAL</span>
                    <h1 class="product-title">和牛ステーキ プレミアム</h1>
                    <p class="product-desc">厳選された最高級の和牛を使用した贅沢なステーキ。一口食べれば口の中に広がる芳醇な香りと、とろけるような食感をお楽しみいただけます。</p>
                </div>

                <div class="price-section">
                    <span class="price-main">4,800</span>
                    <span class="tax-info">(税込 ¥5,280)</span>
                </div>

                <div class="spec-list">
                    <div class="spec-item">
                        <span class="spec-label"><i class="fa-solid fa-fire"></i> 熱量</span>
                        <span class="spec-val">842 kcal</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label"><i class="fa-solid fa-wheat-awn"></i> アレルゲン</span>
                        <span class="spec-val">牛肉、小麦、大豆</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label"><i class="fa-solid fa-clock"></i> 準備時間</span>
                        <span class="spec-val">約15分</span>
                    </div>
                </div>

                <div class="action-area">
                    <button class="btn-back" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
                    <button class="btn-add-cart" onclick="openCustomize()">
                        <i class="fa-solid fa-cart-plus"></i>
                        <span>カートに追加する</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="history.back()"><i class="fa-solid fa-utensils"></i><span>メニュー</span></button>
            <button class="nav-item" onclick="window.location.href='cart.html'"><i class="fa-solid fa-cart-shopping"></i><span>カート</span></button>
            <button class="nav-item" onclick="window.location.href='order_status.html'"><i class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></button>
            <button class="nav-item"><i class="fa-solid fa-comment-dots"></i><span>AI相談</span></button>
            <button class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></button>
        </div>
    </div>

    <!-- Customize Modal -->
    <div class="modal-overlay" id="customizeOverlay">
        <div class="customize-modal">
            <h3 class="modal-title">焼き加減を選択</h3>
            <div class="opt-group">
                <div class="opt-row selected" onclick="selectOpt(this)">
                    <span class="opt-name">ミディアム・レア</span>
                    <span class="opt-price">標準</span>
                </div>
                <div class="opt-row" onclick="selectOpt(this)">
                    <span class="opt-name">ミディアム</span>
                    <span class="opt-price">標準</span>
                </div>
                <div class="opt-row" onclick="selectOpt(this)">
                    <span class="opt-name">ウェルダン</span>
                    <span class="opt-price">標準</span>
                </div>
            </div>

            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <span class="qty-num" id="qty">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>

            <button class="modal-confirm" onclick="addToCart()">確定してカートに追加</button>
        </div>
    </div>

    <script>
        function switchImg(thumb, src) {
            document.getElementById('mainImg').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
        }

        function openCustomize() {
            document.getElementById('customizeOverlay').classList.add('show');
        }

        function selectOpt(row) {
            document.querySelectorAll('.opt-row').forEach(r => r.classList.remove('selected'));
            row.classList.add('selected');
        }

        let qty = 1;
        function changeQty(delta) {
            qty = Math.max(1, qty + delta);
            document.getElementById('qty').innerText = qty;
        }

        function addToCart() {
            document.getElementById('customizeOverlay').classList.remove('show');
            window.location.href = 'cart.html';
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('ctxDate').innerText = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        }, 1000);
    </script>
</body>
</html>
