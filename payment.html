<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – Payment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #213f31;
            --primary-light: #335847;
            --bg: #F9F8F2;
            --card-bg: #ffffff;
            --footer-bg: #EAE8E2;
            --border: #ddd7cf;
            --text-main: #2e2a29;
            --text-sub: #7d7671;
            --danger: #d94b3d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            display: flex;
        }

        .ipad-frame {
            width: 1705.72px;
            height: 1144.13px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            position: relative;
            transform-origin: center center;
            will-change: transform;
        }

        .ipad-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 202px;
            background: #F9F8F2;
            z-index: 0;
        }

        .context-bar {
            display: none !important;
        }

        .restaurant-header {
            width: 220px;
            height: 53px;
            margin: 40px auto 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-size: 44px;
            font-weight: 400;
            line-height: 1;
            letter-spacing: 0;
            color: #333333;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
        }

        .category-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 829.04px;
            height: 65.82px;
            margin: 36px auto 0;
            gap: 12px;
            padding: 6px 0;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
        }

        .cat-tab {
            width: 152.7px;
            height: 53.19px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            font-size: 24px;
            font-weight: 700;
            line-height: 27px;
            font-family: 'Noto Sans JP', sans-serif;
            color: #333333;
            background: transparent;
            border: 1.5px solid transparent;
            white-space: nowrap;
        }

        .cat-tab.active {
            background: #333333;
            color: #fff;
            border-color: #333333;
        }

        .page-header {
            position: relative;
            width: 840px;
            margin: 0 auto 18px;
            background: transparent;
            border-bottom: none;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-title {
            font-size: 27px;
            font-weight: 700;
            color: #333333;
            line-height: 1;
        }

        .main-content {
            flex: 1;
            padding: 48px 0 220px;
            overflow-y: auto;
            overflow-x: hidden;
            background: #FFFFFF;
            display: flex;
            justify-content: center;
        }

        .payment-card {
            width: 840px;
            min-height: 100%;
            background: transparent;
            border-radius: 0;
            border: none;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .bill-caption {
            text-align: center;
            color: var(--text-sub);
            font-size: 16px;
            font-weight: 700;
            margin-top: 2px;
        }

        .bill-total {
            width: 78%;
            margin: 18px auto 20px;
            text-align: right;
            color: var(--text-main);
            font-size: 28px;
            font-weight: 900;
        }

        .bill-total .bill-tax-note {
            font-size: 18px;
            font-weight: 400;
            color: #6a6661;
            margin-left: 6px;
        }

        .tax-total {
            width: 78%;
            margin: -8px auto 24px;
            text-align: right;
            color: #6a6661;
            font-size: 18px;
            font-weight: 400;
        }

        .tax-total .tax-amount {
            display: inline-flex;
            align-items: baseline;
            margin-left: 8px;
            color: #2e3335;
            font-size: 18px;
            font-weight: 400;
            white-space: nowrap;
        }

        .tax-total .tax-amount::before {
            content: '¥';
            font-size: 12.45px;
            margin-right: 6px;
            line-height: 1;
        }

        .summary-box {
            border: 1.5px solid #e8e2d8;
            border-radius: 16px;
            padding: 16px 18px 12px;
            margin: 0 auto 18px;
            width: 78%;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 700;
        }

        .summary-row.total {
            color: var(--text-main);
        }

        .items-table {
            width: 78%;
            margin: 0 auto;
            border-collapse: collapse;
        }

        .items-table thead {
            display: none;
        }

        .items-table thead th:nth-child(2),
        .items-table tbody td:nth-child(2) {
            width: 90px;
            text-align: center;
        }

        .items-table thead th:nth-child(3),
        .items-table tbody td:nth-child(3) {
            width: 140px;
            text-align: right;
        }

        .items-table tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid #efeae3;
            color: #5a5552;
            font-size: 16px;
            font-weight: 400;
            vertical-align: middle;
        }

        .items-table tbody td:first-child {
            font-size: 26.4px;
            color: #2e3335;
        }

        .items-table tbody td:nth-child(2) {
            font-size: 20px;
            color: #5a5552;
        }

        .items-table tbody td:nth-child(3) {
            font-size: 20.37px;
            color: #2e3335;
            white-space: nowrap;
        }

        .price-value {
            display: inline-flex;
            align-items: baseline;
            font-size: 20.37px;
            font-weight: 400;
            color: #2e3335;
            white-space: nowrap;
            line-height: 1;
        }

        .price-value::before {
            content: '¥';
            font-size: 12.45px;
            margin-right: 6px;
            line-height: 1;
        }

        .item-sub {
            margin-left: 8px;
            color: #9f9991;
            font-size: 22px;
            font-weight: 400;
        }

        .payment-cta {
            margin: 0 auto;
            width: 475.73px;
            height: 89.13px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
        }

        .payment-actions {
            margin-top: auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 18px;
            justify-content: center;
        }

        .payment-cta.secondary {
            background: #fff;
            color: var(--primary);
            border: 2px solid #a6b2a6;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 10, 0.38);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            backdrop-filter: blur(4px);
        }

        .overlay.show { display: flex; }

        .modal {
            width: 600px;
            max-width: calc(100% - 48px);
            background: #fff;
            border-radius: 22px;
            padding: 26px 28px 24px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.22);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .modal-desc {
            color: #726c67;
            font-size: 15px;
            line-height: 1.6;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .method-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .method-card {
            border: 1.5px solid #ddd7cf;
            border-radius: 16px;
            padding: 16px 18px;
            cursor: pointer;
            transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
        }

        .method-card.selected {
            border-color: var(--primary);
            background: rgba(33, 63, 49, 0.04);
        }

        .method-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 4px;
        }

        .method-name {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-main);
        }

        .method-note {
            font-size: 13px;
            color: #7a746f;
            font-weight: 600;
            line-height: 1.5;
        }

        .method-radio {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #556359;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .method-card.selected .method-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }

        .ghost-btn,
        .primary-btn {
            min-width: 130px;
            height: 46px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }

        .ghost-btn {
            border: 1.5px solid #cfc8bf;
            background: #fff;
            color: #5d5854;
        }

        .primary-btn {
            border: none;
            background: var(--primary);
            color: #fff;
        }

        .status-panel {
            width: 680px;
            max-width: calc(100% - 60px);
            background: #fff;
            border-radius: 24px;
            padding: 34px 38px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.22);
            text-align: center;
        }

        .status-panel.square-mode {
            width: 760px;
            padding: 38px 42px 34px;
        }

        .status-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(33, 63, 49, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 38px;
        }

        .status-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 16px;
            line-height: 1.7;
            color: #746f6a;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .square-reader {
            width: 190px;
            height: 120px;
            border-radius: 26px;
            background: linear-gradient(145deg, #f7f7f7 0%, #ececec 100%);
            box-shadow: inset 0 2px 8px rgba(255,255,255,0.8), 0 16px 30px rgba(0,0,0,0.12);
            margin: 0 auto 18px;
            position: relative;
        }

        .square-reader::before {
            content: '';
            position: absolute;
            width: 84px;
            height: 16px;
            border-radius: 10px;
            background: #202020;
            left: 50%;
            top: 18px;
            transform: translateX(-50%);
        }

        .square-reader::after {
            content: 'square';
            position: absolute;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            color: #202020;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.04em;
        }

        .square-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .square-device {
            width: 276px;
            height: 190px;
            border-radius: 32px;
            background: linear-gradient(145deg, #fbfbfb 0%, #ededed 100%);
            box-shadow: inset 0 3px 10px rgba(255,255,255,0.92), 0 18px 42px rgba(0,0,0,0.14);
            position: relative;
        }

        .square-device::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 18px;
            border-radius: 12px;
            background: #171717;
            left: 50%;
            top: 28px;
            transform: translateX(-50%);
        }

        .square-device::after {
            content: 'square';
            position: absolute;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 0.04em;
            color: #1d1d1d;
        }

        .square-instruction {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 0 22px;
            border-radius: 999px;
            background: #f5f2ec;
            color: #5a5550;
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
        }

        .processing-ring {
            width: 92px;
            height: 92px;
            margin: 0 auto 22px;
            border-radius: 50%;
            border: 6px solid rgba(33, 63, 49, 0.12);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-badge {
            width: 96px;
            height: 96px;
            margin: 0 auto 22px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.12);
            color: #159947;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
        }

        .receipt-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            background: #f7f5f2;
            color: #605a55;
            font-size: 14px;
            font-weight: 700;
        }

        .bottom-nav {
            width: 100%;
            height: 105.47px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 14px 0 18px;
            flex-shrink: 0;
        }

        .bottom-nav-inner {
            width: 829.04px;
            height: 65.82px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            color: #888;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            background: transparent;
            font-family: inherit;
        }

        .nav-item span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 42.68px;
            height: 13.1px;
            font-size: 13px;
            line-height: 1;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 33.29px; line-height: 1; }
    </style>
</head>
<body>
    <div class="ipad-frame">
        <div class="context-bar">
            <div class="context-left">
                <div class="context-item"><span class="context-label">卓番</span><span class="context-value">T-01, T-02</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">端末</span><span class="context-value">iPad-03</span></div>
                <div class="context-divider"></div>
                <div class="context-item"><span class="context-label">受付番号</span><span class="context-value">#0042</span></div>
            </div>
            <div class="context-date" id="ctxDate"></div>
        </div>

        <div class="restaurant-header">富士屋本店</div>

        <div class="category-tabs">
            <button class="cat-tab active" onclick="window.location.href='menu_ai.html'">おすすめ</button>
            <button class="cat-tab">前菜</button>
            <button class="cat-tab">麺類</button>
            <button class="cat-tab">ドリンク</button>
            <button class="cat-tab">サラダ</button>
            <button class="cat-tab" onclick="window.location.href='menu_ai_dessert.html'">デザート</button>
        </div>

        <div class="main-content">
            <div class="payment-card">
                <div class="page-header">
                    <div class="page-title">お支払い</div>
                </div>
                <table class="items-table">
                    <thead>
                        <tr>
                            <th>商品名</th>
                            <th>数</th>
                            <th>金額</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>塩昆布</td>
                            <td>4</td>
                            <td><span class="price-value">1,592</span></td>
                        </tr>
                        <tr>
                            <td>メンチカツ</td>
                            <td>1</td>
                            <td><span class="price-value">698</span></td>
                        </tr>
                        <tr>
                            <td>若鶏の唐揚げ</td>
                            <td>1</td>
                            <td><span class="price-value">698</span></td>
                        </tr>
                        <tr>
                            <td>特選牛ステーキ<span class="item-sub">和食セット</span></td>
                            <td>1</td>
                            <td><span class="price-value">0</span></td>
                        </tr>
                    </tbody>
                </table>

                <div class="bill-total">¥26,116<span class="bill-tax-note">(税込)</span></div>
                <div class="tax-total">税額合計<span class="tax-amount">1,166</span></div>

                <div class="payment-actions">
                    <button class="payment-cta" onclick="startSquarePayment()">お支払いに進む</button>
                    <button class="payment-cta secondary" onclick="window.location.href='order_status.html'">注文状況に戻る</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="statusOverlay">
            <div class="status-panel" id="statusPanel"></div>
        </div>

        <div class="bottom-nav">
            <div class="bottom-nav-inner">
                <button class="nav-item" onclick="window.location.href='menu_ai.html'"><i class="fa-solid fa-utensils"></i><span>メニュー</span></button>
                <button class="nav-item" onclick="window.location.href='cart.html'"><i class="fa-solid fa-cart-shopping"></i><span>カート</span></button>
                <button class="nav-item active" onclick="window.location.href='order_status.html'"><i class="fa-solid fa-clock-rotate-left"></i><span>注文履歴</span></button>
                <button class="nav-item" onclick="window.location.href='chat_ai.html'"><i class="fa-solid fa-comment-dots"></i><span>会話履歴</span></button>
                <button class="nav-item"><i class="fa-solid fa-globe"></i><span>言語</span></button>
            </div>
        </div>
    </div>

    <script>
        const FRAME_WIDTH = 1705.72;
        const FRAME_HEIGHT = 1144.13;
        function fitFrame() {
            const frame = document.querySelector('.ipad-frame');
            if (!frame) return;
            const scale = Math.min(window.innerWidth / FRAME_WIDTH, window.innerHeight / FRAME_HEIGHT);
            frame.style.transform = `scale(${Math.min(scale, 1)})`;
        }

        function showStatus(html) {
            const overlay = document.getElementById('statusOverlay');
            const panel = document.getElementById('statusPanel');
            panel.className = 'status-panel';
            panel.innerHTML = html;
            overlay.classList.add('show');
        }

        function startSquarePayment() {
            showSquarePayment();
        }

        function showSquarePayment() {
            showStatus(`
                <div class="square-screen">
                    <div class="status-title">Squareでお支払い</div>
                    <div class="status-text">スタッフがお持ちした Square リーダーでお支払いいただけます。<br>カードをタッチ、または挿入してお待ちください。</div>
                    <div class="square-device"></div>
                    <div class="square-instruction"><i class="fa-solid fa-credit-card" style="margin-right:10px;"></i>カードをタッチまたは挿入してください</div>
                </div>
            `);
            document.getElementById('statusPanel').classList.add('square-mode');

            setTimeout(showProcessing, 2600);
        }

        function showProcessing() {
            showStatus(`
                <div class="processing-ring"></div>
                <div class="status-title">決済処理中</div>
                <div class="status-text">スタッフが Square リーダーをお渡ししました。<br>お客様の操作を確認後、その場で決済を処理しています。</div>
                <div class="receipt-chip"><i class="fa-solid fa-wifi"></i> Square端末と通信中</div>
            `);
            document.getElementById('statusPanel').classList.remove('square-mode');

            setTimeout(showSuccess, 2600);
        }

        function showSuccess() {
            showStatus(`
                <div class="success-badge"><i class="fa-solid fa-check"></i></div>
                <div class="status-title">お支払い完了</div>
                <div class="status-text">決済が正常に完了しました。<br>スタッフがレシートのご案内をいたします。<br>本日はご来店ありがとうございました。またのお越しをお待ちしております。</div>
                <div class="receipt-chip"><i class="fa-regular fa-receipt"></i> 受付番号 #0042 / 決済済み</div>
            `);
            document.getElementById('statusPanel').classList.remove('square-mode');
            setTimeout(() => {
                window.location.href = 'table_cleanup.html';
            }, 2600);
        }

        fitFrame();
        window.addEventListener('resize', fitFrame);

        setInterval(() => {
            const now = new Date();
            const y = now.getFullYear();
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('ctxDate').textContent = `${y}/${mo}/${d} ${hh}:${mm}`;
        }, 1000);
    </script>
</body>
</html>
