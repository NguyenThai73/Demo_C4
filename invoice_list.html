<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入金待ちを確認する | Silica Link</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome 6.x CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --kintone-blue: #3498db;
            --kintone-header-bg: #fff;
            --kintone-body-bg: #f5f6f7;
            --kintone-border: #e3e7e8;
            --kintone-status-blue: #0081cc;
            --kintone-status-bg: #e5f3ff;
            --kintone-rakuten-text: #bf0000;
            --kintone-accent-yellow: #f1c40f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--kintone-body-bg);
            color: #333;
            font-size: 14px;
        }

        /* List Table View */
        .list-card {
            background-color: white;
            border: 1px solid var(--kintone-border);
            border-radius: 2px;
            overflow: hidden;
        }

        .k-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .k-table th {
            background-color: #f7f9fa;
            border: 1px solid #e3e7e8;
            padding: 8px;
            text-align: left;
            font-weight: bold;
            color: #666;
        }
        .k-table td { border: 1px solid #e3e7e8; padding: 12px 8px; background-color: #fff; vertical-align: middle; }

        .badge-waiting {
            background-color: #fff3e0;
            color: #ef6c00;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #ffe0b2;
        }

        .badge-unpaid {
            background-color: #ffebee;
            color: #c62828;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #ffcdd2;
        }

        .action-cell { text-align: right; white-space: nowrap; }
        .action-icon {
            cursor: pointer; font-size: 14px; margin-left: 8px; color: #3498db;
        }
        .action-icon.delete { color: #e74c3c; }

        .link-text { color: var(--kintone-blue); text-decoration: none; font-weight: bold; }
        .link-text:hover { text-decoration: underline; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding-bottom: 20px;
            font-size: 12px;
            color: #666;
        }
        .page-btn {
            border: 1px solid #ccc; background-color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer;
        }
        .page-btn:disabled { color: #ccc; cursor: default; }

        /* Alignment Helpers */
        .text-right { text-align: right !important; }
        .text-center { text-align: center !important; }
        .text-left { text-align: left !important; }

    </style>
</head>
<body>

    <div class="kintone-header-top">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="header-logo">
                <div class="k-icon-box">受</div>
                受発注管理システム
            </div>
            <div class="header-user">
                <div class="mail-icon"><i class="fas fa-envelope"></i></div>
                <div style="display: flex; align-items: center; gap: 8px; margin-left: 10px;">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="User">
                    <span>Administrator</span>
                    <span style="font-size: 10px;">▼</span>
                </div>
            </div>
        </div>
    </div>

    <div class="kintone-header-sub">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="header-sub-left">
                <span><i class="fas fa-bars"></i></span>
                <span><i class="fas fa-house" onclick="location.href='index.html'"></i></span>
                <span><i class="fas fa-bell"></i></span>
                <span><i class="fas fa-star"></i></span>
            </div>
            <div class="header-sub-right">
                <span><i class="fas fa-cog"></i></span>
                <span><i class="fas fa-question-circle"></i></span>
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="アプリ内検索">
                    <div class="search-icon-btn"><i class="fas fa-search"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div class="kintone-app-title-bar">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px; justify-content: flex-start;">
            <div class="app-icon-box" style="margin-left: -40px;">💰</div>
            <div class="app-title">入金待ちを確認する</div>
        </div>
    </div>

    <div class="kintone-sub-nav">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="sub-nav-left">
                <i class="fas fa-house" onclick="location.href='index.html'" style="cursor:pointer;"></i>
                <i class="fas fa-chevron-right" style="font-size: 8px;"></i>
                <span style="margin-left: 10px;">アプリ: 入金待ちを確認する</span>
            </div>
            <div class="sub-nav-right">
                <i class="fas fa-thumbtack"></i>
                <i class="fas fa-info-circle"></i>
            </div>
        </div>
    </div>

    <div class="kintone-toolbar">
        <div class="header-content-inner" style="max-width: none; padding: 0 40px;">
            <div class="view-selector">
                <i class="fas fa-table"></i>
                💰 入金待ち一覧
                <i class="fas fa-chevron-down" style="font-size: 10px; margin-left: 10px;"></i>
            </div>
            <div class="toolbar-icon-btn"><i class="fas fa-chart-line"></i></div>
            <div class="toolbar-icon-btn"><i class="fas fa-filter"></i></div>
            <div class="toolbar-icon-btn"><i class="fas fa-arrow-up-9-1"></i></div>

            <div class="toolbar-right">
                <button class="btn-add" onclick="alert('ここでは直接作成できません。')">+</button>
                <div class="toolbar-icon-btn"><i class="fas fa-cog"></i></div>
                <div class="toolbar-icon-btn"><i class="fas fa-ellipsis"></i></div>
            </div>
        </div>
    </div>

    <div class="main-container" style="max-width: 100%; margin: 0; padding: 20px;">

    <div class="list-card">
        <table class="k-table">
            <thead>
                <tr>
                    <th class="text-center">請求ID</th>
                    <th>請求日</th>
                    <th>取引先名</th>
                    <th class="text-right">請求金額</th>
                    <th>仮想口座ID</th>
                    <th>支払期日</th>
                    <th>入金日</th>
                    <th class="text-center">送付状況</th>
                    <th class="text-center">承認ステータス</th>
                    <th>関連ID</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="text-center"><a href="invoiceapp_76.html" class="link-text">76</a></td>
                    <td>2026-03-27</td>
                    <td style="color: #3498db;">株式会社サンプル商事</td>
                    <td class="text-right">¥ 245,000</td>
                    <td>1234567</td>
                    <td>2026-04-01</td>
                    <td>---</td>
                    <td class="text-center"><span class="badge-waiting">未送付</span></td>
                    <td class="text-center"><span class="badge-unpaid" style="background-color: #f39c12; color: white;">承認待ち</span></td>
                    <td><a href="order_detail_agency_303.html" class="link-text">303</a></td>
                    <td class="action-cell">
                        <span class="action-icon">✎</span>
                        <span class="action-icon delete">✖</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="page-btn" disabled>⏮ 最初</button>
        <button class="page-btn" disabled>◀ 前へ</button>
        <span>ページ <strong>1 / 1</strong> (全 <strong>1</strong> 件)</span>
        <button class="page-btn" disabled>次へ ▶</button>
        <button class="page-btn" disabled>最後 ⏭</button>
        <select style="margin-left: 10px; padding: 4px;">
            <option>10件/ページ</option>
            <option>20件/ページ</option>
            <option>50件/ページ</option>
        </select>
    </div>
</div>

</body>
</html>
