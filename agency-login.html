<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency Login | Silica Link</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6.x CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #ffffff 50%, #e0f2fe 100%);
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.15), 
                         0 4px 12px -2px rgba(124, 58, 237, 0.05);
            border: 1px solid rgba(124, 58, 237, 0.1);
        }

        .btn-agency {
            background: linear-gradient(135deg, #9333ea 0%, #7c3aed 100%);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-agency:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px -8px rgba(124, 58, 237, 0.4);
        }

        .input-agency:focus {
            border-color: #9333ea;
            box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.1);
            outline: none;
        }

        .dot-pattern {
            background-image: radial-gradient(#9333ea 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            opacity: 0.1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute inset-0 dot-pattern"></div>

    <div class="premium-card max-w-md w-full p-12 space-y-10 relative z-10">
        <!-- Header -->
        <div class="text-center space-y-4">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-tr from-purple-600 to-indigo-600 rounded-3xl rotate-12 shadow-xl shadow-purple-200">
                <i class="fas fa-handshake text-white text-3xl"></i>
            </div>
            <div class="pt-4">
                <h1 class="text-3xl font-extrabold text-[#1a1c1e] tracking-tight">Agency Portal</h1>
                <p class="text-slate-500 font-semibold tracking-wide mt-1 uppercase text-xs">Silica Link Management</p>
            </div>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-xs font-extrabold text-slate-500 uppercase tracking-widest ml-1">Agency Account</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-purple-600 transition-colors">
                        <i class="fas fa-user-tie"></i>
                    </span>
                    <input type="text" value="agency-zenshin" required
                        class="input-agency w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 transition-all font-medium">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-extrabold text-slate-500 uppercase tracking-widest ml-1">Secure Key</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-purple-600 transition-colors">
                        <i class="fas fa-fingerprint"></i>
                    </span>
                    <input type="password" value="••••••••" required
                        class="input-agency w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 transition-all font-medium">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center text-sm text-slate-500 font-bold cursor-pointer group">
                    <input type="checkbox" checked class="mr-2 rounded border-purple-300 text-purple-600 focus:ring-purple-500 bg-slate-50">
                    Stay logged in
                </label>
            </div>

            <button type="submit" class="btn-agency w-full py-5 text-white font-extrabold rounded-2xl shadow-xl flex items-center justify-center gap-4 text-base tracking-wide">
                <span>AUTHORIZE & ENTER</span>
                <i class="fas fa-right-to-bracket text-xs opacity-50"></i>
            </button>
        </form>

        <div class="text-center">
            <span class="text-xs text-slate-400 font-bold tracking-widest uppercase">Secured by amcolab</span>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> AUTHORIZING...';
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'order_list_view.html';
            }, 1000);
        }
    </script>
</body>
</html>
