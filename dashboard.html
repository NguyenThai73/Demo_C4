<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テーブルセッション開始</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 880px;
            height: 640px;
            border-radius: 16px;
            padding: 36px 48px 36px;
            position: relative;
            overflow-y: auto;
        }

        .staff-badge {
            position: absolute;
            top: 24px;
            right: 28px;
            background: #ef4444;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .page-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
            margin-top: 8px;
        }

        .page-subtitle {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            background: #fff;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #999;
        }

        .input-wrapper input:focus {
            border-color: #2d3a2e;
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            pointer-events: none;
        }

        /* 状態凡例 */
        .table-legend {
            display: flex;
            gap: 18px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #555;
        }

        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .legend-swatch.empty    { background: #fff; }
        .legend-swatch.selected { background: #8B6914; border-color: #8B6914; }
        .legend-swatch.occupied { background: #fce4e4; border-color: #fca5a5; }

        /* Carousel wrapper */
        .carousel-wrapper {
            position: relative;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.3s ease;
            cursor: grab;
        }

        .carousel-track.dragging {
            transition: none;
            cursor: grabbing;
        }

        .carousel-page {
            min-width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 2px;
        }

        .table-btn {
            padding: 12px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            user-select: none;
        }

        .table-btn:hover {
            border-color: #8B6914;
            background: #f5f5f5;
        }

        /* 選択中 — 茶色 */
        .table-btn.selected {
            background: #8B6914;
            color: #fff;
            border-color: #8B6914;
        }

        /* 利用中 — 赤 */
        .table-btn.occupied {
            background: #fce4e4;
            color: #e53e3e;
            border-color: #fca5a5;
        }

        /* 利用中 + 選択中 — 赤ベース＋茶色ボーダー */
        .table-btn.occupied.selected {
            background: #e53e3e;
            color: #fff;
            border-color: #8B6914;
            box-shadow: 0 0 0 3px #8B6914;
        }

        /* Pagination dots */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
            min-height: 18px;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .carousel-dot.active {
            background: #8B6914;
            width: 24px;
            border-radius: 4px;
        }

        /* No results */
        .no-results {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 24px 0;
            display: none;
        }

        /* 選択中テーブル表示バー */
        .selection-bar {
            background: #f7f3e8;
            border: 1px solid #d4b858;
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #6b5a1e;
            display: none;
        }

        .selection-bar.visible {
            display: block;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            background: #2d3a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 28px;
        }

        .start-btn:hover {
            background: #3a4a3b;
        }

        .active-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .active-table-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .active-table-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .active-table-item:last-child {
            border-bottom: none;
        }

        .active-table-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .green-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
        }

        .active-table-name {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .active-table-guests {
            font-size: 14px;
            color: #555;
            margin-left: 4px;
        }

        .active-table-time {
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="staff-badge">Staff only</div>

        <div class="page-title">テーブルセッション開始</div>
        <div class="page-subtitle">テーブル番号を入力してください</div>

        <label class="form-label">テーブル番号（複数選択可）</label>
        <div class="input-wrapper">
            <input type="text" id="tableInput" placeholder="テーブル検索　例: T-01">
            <span class="search-icon">&#128269;</span>
        </div>

        <div class="table-legend">
            <div class="legend-item"><span class="legend-swatch empty"></span>空席</div>
            <div class="legend-item"><span class="legend-swatch selected"></span>選択中</div>
            <div class="legend-item"><span class="legend-swatch occupied"></span>利用中</div>
        </div>

        <div class="carousel-wrapper" id="carouselWrapper">
            <div class="carousel-track" id="carouselTrack"></div>
        </div>
        <div class="carousel-dots" id="carouselDots"></div>
        <div class="no-results" id="noResults">該当するテーブルが見つかりません</div>

        <div id="selectionBar" class="selection-bar">
            選択中: <span id="selectionText"></span>
        </div>

        <button class="start-btn">このテーブルで受付開始</button>

        <div class="active-section-title">現在のアクティブテーブル</div>
        <div class="active-table-list">
            <div class="active-table-item">
                <div class="active-table-left">
                    <span class="green-dot"></span>
                    <span class="active-table-name">T-03</span>
                    <span class="active-table-guests">4名様</span>
                </div>
                <span class="active-table-time">15:23 開始</span>
            </div>
            <div class="active-table-item">
                <div class="active-table-left">
                    <span class="green-dot"></span>
                    <span class="active-table-name">T-06</span>
                    <span class="active-table-guests">2名様</span>
                </div>
                <span class="active-table-time">15:45 開始</span>
            </div>
            <div class="active-table-item">
                <div class="active-table-left">
                    <span class="green-dot"></span>
                    <span class="active-table-name">T-11</span>
                    <span class="active-table-guests">6名様</span>
                </div>
                <span class="active-table-time">16:10 開始</span>
            </div>
        </div>
    </div>

    <script>
        // --- Data ---
        const allTables = [
            'T-01','T-02','T-03','T-04','T-05','T-06','T-07','T-08',
            'T-09','T-10','T-11','T-12','T-13','T-14','T-15','T-16',
            'T-17','T-18','T-19','T-20'
        ];
        const occupiedTables = ['T-03', 'T-06', 'T-11'];
        const selectedTables = new Set();
        const ITEMS_PER_PAGE = 8; // 4 columns x 2 rows

        let currentPage = 0;
        let filteredTables = [...allTables];

        // --- Render ---
        function renderCarousel() {
            const track = document.getElementById('carouselTrack');
            const dots = document.getElementById('carouselDots');
            const noResults = document.getElementById('noResults');

            const totalPages = Math.ceil(filteredTables.length / ITEMS_PER_PAGE);

            if (filteredTables.length === 0) {
                track.innerHTML = '';
                dots.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';

            // Clamp current page
            if (currentPage >= totalPages) currentPage = totalPages - 1;
            if (currentPage < 0) currentPage = 0;

            // Build pages
            let pagesHTML = '';
            for (let p = 0; p < totalPages; p++) {
                const start = p * ITEMS_PER_PAGE;
                const pageTables = filteredTables.slice(start, start + ITEMS_PER_PAGE);
                let btns = '';
                for (const t of pageTables) {
                    const isOccupied = occupiedTables.includes(t);
                    const isSelected = selectedTables.has(t);
                    let cls = 'table-btn';
                    if (isOccupied) cls += ' occupied';
                    if (isSelected) cls += ' selected';
                    btns += `<button class="${cls}" data-table="${t}" onclick="clickTable(this,'${t}')">${t}</button>`;
                }
                pagesHTML += `<div class="carousel-page">${btns}</div>`;
            }
            track.innerHTML = pagesHTML;
            track.style.transform = `translateX(-${currentPage * 100}%)`;

            // Build dots
            let dotsHTML = '';
            for (let p = 0; p < totalPages; p++) {
                dotsHTML += `<button class="carousel-dot${p === currentPage ? ' active' : ''}" onclick="goToPage(${p})"></button>`;
            }
            dots.innerHTML = dotsHTML;
        }

        function goToPage(p) {
            currentPage = p;
            const track = document.getElementById('carouselTrack');
            track.style.transform = `translateX(-${currentPage * 100}%)`;
            updateDots();
        }

        function updateDots() {
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentPage);
            });
        }

        // --- Table click ---
        function clickTable(btn, tableId) {
            if (selectedTables.has(tableId)) {
                selectedTables.delete(tableId);
                btn.classList.remove('selected');
            } else {
                selectedTables.add(tableId);
                btn.classList.add('selected');
            }
            updateSelectionBar();
        }

        // --- Selection bar ---
        function updateSelectionBar() {
            const bar = document.getElementById('selectionBar');
            const text = document.getElementById('selectionText');
            if (selectedTables.size === 0) {
                bar.classList.remove('visible');
                return;
            }
            const sorted = Array.from(selectedTables).sort();
            text.textContent = sorted.join(', ');
            bar.classList.add('visible');
        }

        // --- Filter / Search ---
        document.getElementById('tableInput').addEventListener('input', function () {
            const q = this.value.trim().toUpperCase();
            if (q === '') {
                filteredTables = [...allTables];
            } else {
                filteredTables = allTables.filter(t => t.includes(q));
            }
            currentPage = 0;
            renderCarousel();
        });

        // --- Swipe / Drag ---
        (function initSwipe() {
            const track = document.getElementById('carouselTrack');
            let startX = 0, currentX = 0, isDragging = false;

            function onStart(x) {
                isDragging = true;
                startX = x;
                currentX = x;
                track.classList.add('dragging');
            }
            function onMove(x) {
                if (!isDragging) return;
                currentX = x;
                const diff = currentX - startX;
                const base = -currentPage * 100;
                const wrapper = document.getElementById('carouselWrapper');
                const pct = (diff / wrapper.offsetWidth) * 100;
                track.style.transform = `translateX(${base + pct}%)`;
            }
            function onEnd() {
                if (!isDragging) return;
                isDragging = false;
                track.classList.remove('dragging');
                const diff = currentX - startX;
                const wrapper = document.getElementById('carouselWrapper');
                const totalPages = Math.ceil(filteredTables.length / ITEMS_PER_PAGE);
                if (diff < -50 && currentPage < totalPages - 1) {
                    currentPage++;
                } else if (diff > 50 && currentPage > 0) {
                    currentPage--;
                }
                track.style.transform = `translateX(-${currentPage * 100}%)`;
                updateDots();
            }

            // Mouse events
            track.addEventListener('mousedown', e => { e.preventDefault(); onStart(e.clientX); });
            window.addEventListener('mousemove', e => onMove(e.clientX));
            window.addEventListener('mouseup', () => onEnd());

            // Touch events
            track.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
            track.addEventListener('touchmove', e => onMove(e.touches[0].clientX), { passive: true });
            track.addEventListener('touchend', () => onEnd());
        })();

        // --- Start button ---
        document.querySelector('.start-btn').addEventListener('click', function (e) {
            e.preventDefault();
            if (selectedTables.size === 0) {
                alert('テーブルを選択してください。');
                return;
            }
            const occupiedSelected = Array.from(selectedTables).filter(t => occupiedTables.includes(t));
            if (occupiedSelected.length > 0) {
                const msg = '以下のテーブルは現在利用中です:\n'
                    + occupiedSelected.join(', ')  
                    + '\n\nテーブルを合席してもよろしいですか？';
                if (!confirm(msg)) return;
            }

            // Save to localStorage
            const sorted = Array.from(selectedTables).sort();
            localStorage.setItem('selectedTables', JSON.stringify(sorted));
            localStorage.setItem('occupiedInSelection', JSON.stringify(occupiedSelected));

            window.location.href = 'order.html';
        });

        // --- Init ---
        renderCarousel();
    </script>
</body>
</html>
