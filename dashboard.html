<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テーブルセッション開始</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
            height: 100vh;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 880px;
            height: 640px;
            border-radius: 16px;
            padding: 36px 48px 36px;
            position: relative;
            overflow-y: auto;
        }

        .staff-badge {
            position: absolute;
            top: 24px;
            right: 28px;
            background: #ef4444;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
        }

        .page-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
            margin-top: 8px;
        }

        .page-subtitle {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            display: block;
        }

        .select-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .select-wrapper select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            color: #999;
            background: #fff;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        .select-wrapper select:focus {
            border-color: #2d3a2e;
        }

        .select-arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 12px;
            color: #999;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .table-btn {
            padding: 12px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .table-btn:hover {
            border-color: #2d3a2e;
            background: #f5f5f5;
        }

        .table-btn.selected {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        .table-btn.active {
            background: #fce4e4;
            color: #e53e3e;
            border-color: #fca5a5;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            background: #2d3a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 28px;
        }

        .start-btn:hover {
            background: #3a4a3b;
        }

        .active-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .active-table-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .active-table-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .active-table-item:last-child {
            border-bottom: none;
        }

        .active-table-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .green-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
        }

        .active-table-name {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .active-table-guests {
            font-size: 14px;
            color: #555;
            margin-left: 4px;
        }

        .active-table-time {
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="staff-badge">Staff only</div>

        <div class="page-title">テーブルセッション開始</div>
        <div class="page-subtitle">テーブル番号を入力してください</div>

        <label class="form-label">テーブル番号</label>
        <div class="select-wrapper">
            <select id="tableSelect" onchange="selectTable(this.value)">
                <option value="">例:T-01</option>
                <option value="T-01">T-01</option>
                <option value="T-02">T-02</option>
                <option value="T-03">T-03</option>
                <option value="T-04">T-04</option>
                <option value="T-05">T-05</option>
                <option value="T-06">T-06</option>
                <option value="T-07">T-07</option>
                <option value="T-08">T-08</option>
            </select>
            <span class="select-arrow">&#9662;</span>
        </div>

        <div class="table-grid">
            <button class="table-btn selected" onclick="clickTable(this, 'T-01')">T-01</button>
            <button class="table-btn" onclick="clickTable(this, 'T-02')">T-02</button>
            <button class="table-btn active" onclick="clickTable(this, 'T-03')">T-03</button>
            <button class="table-btn" onclick="clickTable(this, 'T-04')">T-04</button>
            <button class="table-btn" onclick="clickTable(this, 'T-05')">T-05</button>
            <button class="table-btn active" onclick="clickTable(this, 'T-06')">T-06</button>
            <button class="table-btn" onclick="clickTable(this, 'T-07')">T-07</button>
            <button class="table-btn" onclick="clickTable(this, 'T-08')">T-08</button>
        </div>

        <button class="start-btn" onclick="window.location.href='order.html'">Start</button>

        <div class="active-section-title">現在のアクティブテーブル</div>
        <div class="active-table-list">
            <div class="active-table-item">
                <div class="active-table-left">
                    <span class="green-dot"></span>
                    <span class="active-table-name">T-03</span>
                    <span class="active-table-guests">4名様</span>
                </div>
                <span class="active-table-time">15:23 開始</span>
            </div>
            <div class="active-table-item">
                <div class="active-table-left">
                    <span class="green-dot"></span>
                    <span class="active-table-name">T-06</span>
                    <span class="active-table-guests">2名様</span>
                </div>
                <span class="active-table-time">15:45 開始</span>
            </div>
        </div>
    </div>

    <script>
        const activeTables = ['T-03', 'T-06'];

        function clickTable(btn, tableId) {
            if (activeTables.includes(tableId)) return;
            document.querySelectorAll('.table-btn').forEach(b => {
                if (!activeTables.includes(b.textContent)) {
                    b.classList.remove('selected');
                }
            });
            btn.classList.add('selected');
            document.getElementById('tableSelect').value = tableId;
        }

        function selectTable(val) {
            document.querySelectorAll('.table-btn').forEach(b => {
                if (!activeTables.includes(b.textContent)) {
                    b.classList.remove('selected');
                }
                if (b.textContent === val && !activeTables.includes(val)) {
                    b.classList.add('selected');
                }
            });
        }
    </script>
</body>
</html>
