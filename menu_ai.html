<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posSpeak – AI Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d3a2e;
            --primary-light: #3f5240;
            --accent: #d4a373;
            --bg: #f0ece4;
            --card-bg: #ffffff;
            --footer-bg: #e8e4dc;
            --border: #e0dcd4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .ipad-frame {
            width: 1280px;
            height: 800px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            position: relative;
        }

        .context-bar {
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            font-size: 13px;
            flex-shrink: 0;
            z-index: 10;
        }

        .context-left {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .context-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .context-value {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .context-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
        }

        .context-date {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
        }

        .ai-banner {
            background: var(--primary);
            padding: 0 20px;
            height: 52px;
            display: none;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            z-index: 100;
        }

        .banner-speaker {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.13);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .banner-speaker::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.22);
            animation: spk-pulse 2.2s ease-out infinite;
        }

        .banner-speaker svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        @keyframes spk-pulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1.6);
                opacity: 0;
            }
        }

        .banner-staff {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .banner-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .banner-staff-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.28);
            display: block;
        }

        .banner-avatar-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7ecb8f;
            border: 2px solid var(--primary);
            animation: dot-blink 1.4s ease-in-out infinite;
        }

        @keyframes dot-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        .banner-staff-text {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .banner-staff-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .banner-staff-label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.48);
            letter-spacing: 0.03em;
        }

        .banner-divider {
            width: 1px;
            height: 26px;
            background: rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        .banner-ticker {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .ticker-text {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .ticker-text.fading {
            opacity: 0;
        }

        .ticker-text.streaming::after {
            content: '▋';
            display: inline-block;
            font-size: 13px;
            margin-left: 2px;
            vertical-align: middle;
            animation: cur-blink 0.6s step-end infinite;
        }

        @keyframes cur-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .category-tabs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 20px 12px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        .cat-tab {
            padding: 7px 22px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #666;
            background: transparent;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .cat-tab:hover {
            color: var(--primary);
        }

        .cat-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .section-label {
            padding: 14px 32px 6px;
            flex-shrink: 0;
            opacity: 0;
            transform: translateY(6px);
            transition: 0.5s;
        }

        .section-label.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-label-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label-badge {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.04em;
        }

        .section-label-text {
            font-size: 13px;
            font-weight: 600;
            color: #888;
        }

        .menu-grid-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 12px 28px 20px;
        }

        .menu-grid-wrapper::-webkit-scrollbar {
            width: 4px;
        }

        .menu-grid-wrapper::-webkit-scrollbar-thumb {
            background: #d0ccc4;
            border-radius: 4px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .menu-card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1.5px solid var(--border);
            transition: 0.18s, opacity 0.6s, filter 0.6s;
        }

        .menu-card.blurring {
            opacity: 0.18;
            filter: blur(3px);
        }

        .menu-card.revealed {
            animation: card-pop 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes card-pop {
            from {
                opacity: 0.18;
                filter: blur(3px);
                transform: translateY(10px) scale(0.97);
            }

            to {
                opacity: 1;
                filter: blur(0px);
                transform: translateY(0) scale(1);
            }
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.1);
        }

        .menu-card-img-wrap {
            position: relative;
            width: 100%;
            padding-top: 72%;
            overflow: hidden;
        }

        .menu-card-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #f5f3ef;
        }

        .ai-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(20, 28, 20, 0.78) 0%, rgba(20, 28, 20, 0) 100%);
            color: #fff;
            font-size: 11.5px;
            font-weight: 600;
            padding: 22px 10px 9px;
            display: flex;
            align-items: flex-end;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.4s 0.2s;
        }

        .menu-card.revealed .ai-badge {
            opacity: 1;
        }

        .ai-badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #7ecb8f;
            flex-shrink: 0;
            margin-bottom: 2px;
            animation: dot-blink 1.4s infinite;
        }

        .menu-card-body {
            padding: 11px 13px 13px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .menu-card-name {
            font-size: 14px;
            font-weight: 700;
            color: #2e3335;
            margin-bottom: 6px;
        }

        .menu-card-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 10px;
            flex: 1;
        }

        .menu-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-card-price {
            font-size: 18px;
            font-weight: 700;
        }

        .menu-card-price::before {
            content: '¥';
            font-size: 12px;
            margin-right: 1px;
        }

        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #fff;
            color: #2e3335;
            border: 1.5px solid #d0ccc6;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        .add-btn:hover {
            border-color: var(--primary);
            background: #f5f3ef;
        }

        .bottom-nav {
            display: flex;
            background: var(--footer-bg);
            border-top: 1px solid var(--border);
            padding: 10px 0 20px;
            width: 100%;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #888;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 22px;
        }

        .voice-guide-container {
            position: absolute;
            bottom: 86px;
            right: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 150;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
        }

        .voice-guide-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .voice-order-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 6px 24px rgba(45, 58, 46, 0.38);
            transition: 0.15s;
        }

        .voice-order-btn::before {
            content: '';
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.28);
            pointer-events: none;
        }

        .voice-order-btn::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid rgba(45, 58, 46, 0.28);
            animation: voice-pulse 2.2s ease-out infinite;
        }

        @keyframes voice-pulse {
            0% {
                transform: scale(1);
                opacity: 0.55;
            }

            100% {
                transform: scale(1.45);
                opacity: 0;
            }
        }

        .voice-order-btn svg {
            width: 36px;
            height: 36px;
            fill: rgba(255, 255, 255, 0.88);
        }

        .voice-order-text {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.82);
            letter-spacing: 0.06em;
            line-height: 1.25;
            text-align: center;
        }

        .chat-switch-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid #d8d4cc;
            background: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            transition: 0.15s;
        }

        .chat-switch-link:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: #fff;
        }

        .replay-btn {
            position: absolute;
            top: 62px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(45, 58, 46, 0.08);
            border: 1.5px solid var(--primary);
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            transition: 0.15s;
            z-index: 5;
        }

        .replay-btn:hover {
            background: rgba(45, 58, 46, 0.12);
        }

        /* Cart Alert Message */
        .cart-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(45, 58, 46, 0.95);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .cart-alert.show {
            opacity: 1;
        }

        /* LowCal filter styles */
        .lowcal-filtered {
            filter: blur(4px) !important;
            opacity: 0.4 !important;
            pointer-events: none !important;
        }

        .lowcal-highlighted {
            transform: scale(1.04) !important;
            border-color: rgba(45, 58, 46, 0.4) !important;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.12) !important;
            z-index: 10 !important;
        }
    </style>
</head>

<body>
    <div class="ipad-frame">
        <div class="ai-banner" id="aiBanner">
            <div class="banner-speaker"><svg viewBox="0 0 24 24">
                    <path
                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />

                <div class="banner-staff-text">

        <div class="context-bar">

                <div class="context-item"><span class="context-label">端末</span><span

        <div class="category-tabs">

        <div class="section-label" id="sectionLabel">

        <div class="menu-grid-wrapper">

        <div class="bottom-nav">

        <button class="replay-btn" onclick="runDemo()"><i class="fa-solid fa-rotate-right"></i> デモ再生</button>

                <span class="voice-order-text" id="voiceOrderText">ボイス<br>オーダー</span>

            <a class="chat-switch-link" id="chatLink" onclick="window.location.href='chat_ai.html'">

    </div>

    <script>
        const regularMenuItems = [
            { name: '牛カルビ焼き', desc: '厳選和牛カルビをじっくり炭火で焼き上げた看板メニュー', price: '1680', img: 'https://images.unsplash.com/photo-1529694157872-4e0c0f3b238b?w=600&q=80' },

            { name: '特製ラーメン', desc: '12時間煮込んだ濃厚とんこつスープ。自家製麺使用', price: '980', img: 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=600&q=80' },

            { name: 'マルゲリータピザ', desc: '石窯焼きのもちもち生地にフレッシュトマトとモッツァレラ', price: '1280', img: 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=600&q=80' }
        ];

        const coolMenuItems = [
            { name: '冷やしラーメン', desc: '濃厚なゴマだれに冷たい麺。夏の定番の一品', price: '950', img: 'https://images.unsplash.com/photo-1585032226651-759b368d7246?w=400&q=80', reason: '🌡️ 暑い日に体を冷やす', lowCal: false },

        function streamText(text, charDelay, pauseAfter, onDone) {
            const el = document.getElementById('tickerText');
            el.classList.add('fading');
            clearInterval(streamInterval);
            clearTimeout(streamTimer);
            setTimeout(() => {
                el.textContent = ''; el.classList.remove('fading'); el.classList.add('streaming');
                let i = 0;
                streamInterval = setInterval(() => {
                    if (i < text.length) { el.textContent += text[i++]; }
                    else {
                        clearInterval(streamInterval); el.classList.remove('streaming');
                        if (onDone) streamTimer = setTimeout(onDone, pauseAfter);
                    }
                }, charDelay);
            }, 420);
        }

            `;
            sub.textContent = text;
            document.body.appendChild(sub);

            if (!document.getElementById('bubble-style')) {
                const style = document.createElement('style');
                style.id = 'bubble-style';
                style.innerHTML = `

                        to { opacity: 1; transform: translate(-50%, 0); }
                    }

                document.head.appendChild(style);

                setTimeout(() => sub.remove(), 500);
            }, 3000);

                    // Simulate user ordering the wine
                    setTimeout(() => {
                        showUserSpeechBubble('このワインを1つください');
                    }, 500);

                    setTimeout(() => {
                        streamText('かしこまりました！ ' + selectedWine.name + ' を 1 つカートに追加いたします。', 45, 2000, () => {
                            // Show cart alert and end extended flow
                            addToCart(selectedWine.name, true);
                        });
                    }, 2000);
                }

            } else {
                // Normal page load - show welcome message
                setTimeout(() => {
                    const tickerText = document.getElementById('tickerText');
                    if (tickerText) {
                        tickerText.textContent = '';
                        tickerText.classList.add('streaming');

                        const fullText = 'ようこそいらっしゃいませ！\nご来店ありがとうございます。ご注文やおすすめについて、お気軽にお話しください。';
                        let i = 0;
                        const speed = 45;

                        function typeWriter() {
                            if (i < fullText.length) {
                                tickerText.textContent += fullText.charAt(i);
                                i++;
                                setTimeout(typeWriter, speed);
                            } else {
                                tickerText.classList.remove('streaming');
                                // Show voice guide after message completes
                                setTimeout(showVoiceGuide, 1000);
                            }
                        }

                        typeWriter();
                    }
                }, 500);
            }
        });
    </script>

    <!-- Cart Alert Container -->
    <div id="cartAlertContainer"></div>
</body>

</html>
